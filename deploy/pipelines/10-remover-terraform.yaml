---
# /*---------------------------------------------------------------------------8
# |                                                                            |
# |      This pipeline removes the SAP systems, the workload zone (landscape)  |
# |      using Terraform.                                                      |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

parameters:
  - name: cleanup_sap
    displayName: Remove the SAP system
    type: boolean
    default: true

  - name: sap_system
    displayName: "SAP System configuration name, use this format: ENV-LOCA-VNET-SID"
    type: string
    default: DEV-WEEU-SAP01-X00

  - name: cleanup_zone
    displayName: Remove the SAP workload zone
    type: boolean
    default: true

  - name: workload_zone
    displayName: "SAP workload zone configuration name, use this format: ENV-LOCA-VNET-INFRASTRUCTURE"
    type: string
    default: DEV-WEEU-SAP01-INFRASTRUCTURE

  - name: cleanup_region
    displayName: Remove the control plane
    type: boolean
    default: true

  - name: deployer
    displayName: "Deployer configuration name, use this format: ENV-LOCA-VNET-INFRASTRUCTURE"
    type: string
    default: MGMT-WEEU-DEP00-INFRASTRUCTURE

  - name: library
    displayName: "Library configuration name, use this format: ENV-LOCA-SAP_LIBRARY"
    type: string
    default: MGMT-WEEU-SAP_LIBRARY

  - name: workload_environment
    displayName: Environment (DEV, QUA, PRD)
    type: string
    default: DEV

  - name: deployer_environment
    displayName: Environment (MGMT)
    type: string
    default: MMGMT

  - name: use_deployer
    displayName: Run removal on self hosted agent
    type: boolean
    default: true

  - name: sap_automation_repo_path
    displayName: The local path on the agent where the sap_automation repo can be found
    type: string

  - name: config_repo_path
    displayName: The local path on the agent where the config repo can be found
    type: string

stages:
  - stage: Remove_SAP_systems
    displayName: "Removing the SAP System"
    condition: and(not(failed()), not(canceled()), eq(${{ parameters.cleanup_sap }}, true))
    variables:
      - template: variables/10-remover-terraform-variables.yaml
        parameters:
          deployer_environment: ${{ parameters.deployer_environment }}
          workload_environment: ${{ parameters.workload_environment }}
          workload_zone: ${{ parameters.workload_zone }}
          sap_system: ${{ parameters.sap_system }}
    jobs:
      - job: Remove_SAP_systems
        displayName: "Removing the SAP System"
        variables:
          - group: SDAF-${{ parameters.workload_environment }}
        workspace:
          clean: all
        steps:
          - template: templates\download.yaml
          - bash: |
              #!/bin/bash
              green="\e[1;32m"
              reset="\e[0m"
              boldred="\e[1;31m"
              cyan="\e[1;36m"

              #External helper functions
              source "sap-automation/deploy/pipelines/helper.sh"

              debug=False

              if [ "$SYSTEM_DEBUG" = True ]; then
                  set -x
                  set -o errexit
                  debug=True
                  export debug
              fi
              set -eu

              echo "##vso[build.updatebuildnumber]Deploying the SAP System defined in $(sap_system_folder)"

              tfvarsFile="SYSTEM/$(sap_system_folder)/$(sap_system_configuration)"

              echo -e "$green--- Checkout $(Build.SourceBranchName) ---$reset"

              cd "${CONFIG_REPO_PATH}" || exit
              mkdir -p .sap_deployment_automation
              git checkout -q "$(Build.SourceBranchName)"

              if [ ! -f "$CONFIG_REPO_PATH/SYSTEM/$(sap_system_folder)/$(sap_system_configuration)" ]; then
                  echo -e "$boldred--- $(sap_system_configuration) was not found ---$reset"
                  echo "##vso[task.logissue type=error]File $(sap_system_configuration) was not found."
                  exit 2
              fi

              echo -e "$green--- Validations ---$reset"
              if [ "$USE_MSI" != "true" ]; then

                  if [ -z "$WL_ARM_SUBSCRIPTION_ID" ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_SUBSCRIPTION_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ "$WL_ARM_SUBSCRIPTION_ID" == '$$(ARM_SUBSCRIPTION_ID)' ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_SUBSCRIPTION_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ -z "$WL_ARM_CLIENT_ID" ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_CLIENT_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ "$WL_ARM_CLIENT_ID" == '$$(ARM_CLIENT_ID)' ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_CLIENT_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ -z "$WL_ARM_CLIENT_SECRET" ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_CLIENT_SECRET was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ "$WL_ARM_CLIENT_SECRET" == '$$(ARM_CLIENT_SECRET)' ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_CLIENT_SECRET was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ -z "$WL_ARM_TENANT_ID" ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_TENANT_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ "$WL_ARM_TENANT_ID" == '$$(ARM_TENANT_ID)' ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_TENANT_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ -z "$CP_ARM_SUBSCRIPTION_ID" ]; then
                      echo "##vso[task.logissue type=error]Variable CP_ARM_SUBSCRIPTION_ID was not defined in the $(parent_variable_group) variable group."
                      exit 2
                  fi
              fi

              # Set logon variables
              ARM_CLIENT_ID="$WL_ARM_CLIENT_ID"
              export ARM_CLIENT_ID
              ARM_CLIENT_SECRET="$WL_ARM_CLIENT_SECRET"
              export ARM_CLIENT_SECRET
              ARM_TENANT_ID=$WL_ARM_TENANT_ID
              export ARM_TENANT_ID
              ARM_SUBSCRIPTION_ID=$WL_ARM_SUBSCRIPTION_ID
              export ARM_SUBSCRIPTION_ID

              # Check if running on deployer
              if [[ ! -f /etc/profile.d/deploy_server.sh ]]; then
                  configureNonDeployer "$(tf_version)"  || true
                  echo -e "$green--- az login ---$reset"
                  LogonToAzure false  || true
              else
                  LogonToAzure "$USE_MSI" || true
              fi
              return_code=$?
              if [ 0 != $return_code ]; then
                  echo -e "$boldred--- Login failed ---$reset"
                  echo "##vso[task.logissue type=error]az login failed."
                  exit $return_code
              fi

              ARM_SUBSCRIPTION_ID=$WL_ARM_SUBSCRIPTION_ID
              export ARM_SUBSCRIPTION_ID
              az account set --subscription "$ARM_SUBSCRIPTION_ID"

              echo -e "$green--- Read deployment details ---$reset"
              dos2unix -q tfvarsFile

              ENVIRONMENT=$(grep -m1 "^environment" "$tfvarsFile" | awk -F'=' '{print $2}' | tr -d ' \t\n\r\f"')
              LOCATION=$(grep -m1 "^location" "$tfvarsFile" | awk -F'=' '{print $2}' | tr '[:upper:]' '[:lower:]' | tr -d ' \t\n\r\f"')
              NETWORK=$(grep -m1 "^network_logical_name" "$tfvarsFile" | awk -F'=' '{print $2}' | tr -d ' \t\n\r\f"')
              SID=$(grep -m1 "^sid" "$tfvarsFile" | awk -F'=' '{print $2}' | tr -d ' \t\n\r\f"')

              ENVIRONMENT_IN_FILENAME=$(echo $(sap_system_folder) | awk -F'-' '{print $1}')

              LOCATION_CODE=$(echo $(sap_system_folder) | awk -F'-' '{print $2}')
              LOCATION_IN_FILENAME=$(get_region_from_code "$LOCATION_CODE" || true)

              NETWORK_IN_FILENAME=$(echo $(sap_system_folder) | awk -F'-' '{print $3}')

              SID_IN_FILENAME=$(echo $(sap_system_folder) | awk -F'-' '{print $4}')

              echo "System TFvars:                       $(sap_system_configuration)"
              echo "Environment:                         $ENVIRONMENT"
              echo "Location:                            $LOCATION"
              echo "Network:                             $NETWORK"
              echo "SID:                                 $SID"

              echo "Environment(filename):               $ENVIRONMENT_IN_FILENAME"
              echo "Location(filename):                  $LOCATION_IN_FILENAME"
              echo "Network(filename):                   $NETWORK_IN_FILENAME"
              echo "SID(filename):                       $SID_IN_FILENAME"

              echo ""

              echo "Agent pool:                          $(this_agent)"
              echo "Organization:                        $(System.CollectionUri)"
              echo "Project:                             $(System.TeamProject)"
              echo ""
              echo "Azure CLI version:"
              echo "-------------------------------------------------"
              az --version

              if [ "$ENVIRONMENT" != "$ENVIRONMENT_IN_FILENAME" ]; then
                  echo "##vso[task.logissue type=error]The environment setting in $(sap_system_configuration) '$ENVIRONMENT' does not match the $(sap_system_configuration) file name '$ENVIRONMENT_IN_FILENAME'. Filename should have the pattern [ENVIRONMENT]-[REGION_CODE]-[NETWORK_LOGICAL_NAME]-INFRASTRUCTURE"
                  exit 2
              fi

              if [ "$LOCATION" != "$LOCATION_IN_FILENAME" ]; then
                  echo "##vso[task.logissue type=error]The location setting in $(sap_system_configuration) '$LOCATION' does not match the $(sap_system_configuration) file name '$LOCATION_IN_FILENAME'. Filename should have the pattern [ENVIRONMENT]-[REGION_CODE]-[NETWORK_LOGICAL_NAME]-INFRASTRUCTURE"
                  exit 2
              fi

              if [ "$NETWORK" != "$NETWORK_IN_FILENAME" ]; then
                  echo "##vso[task.logissue type=error]The network_logical_name setting in $(sap_system_configuration) '$NETWORK' does not match the $(sap_system_configuration) file name '$NETWORK_IN_FILENAME-. Filename should have the pattern [ENVIRONMENT]-[REGION_CODE]-[NETWORK_LOGICAL_NAME]-INFRASTRUCTURE"
                  exit 2
              fi

              if [ "$SID" != "$SID_IN_FILENAME" ]; then
                  echo "##vso[task.logissue type=error]The sid setting in $(sap_system_configuration) '$SID' does not match the $(sap_system_configuration) file name '$SID_IN_FILENAME-. Filename should have the pattern [ENVIRONMENT]-[REGION_CODE]-[NETWORK_LOGICAL_NAME]-[SID]"
                  exit 2
              fi

              workload_environment_file_name="$CONFIG_REPO_PATH/.sap_deployment_automation/${ENVIRONMENT}${LOCATION_CODE}${NETWORK}"
              echo "Workload Zone Environment File:      $workload_environment_file_name"

              echo -e "$green--- Configure devops CLI extension ---$reset"
              az config set extension.use_dynamic_install=yes_without_prompt --output none --only-show-errors

              az extension add --name azure-devops --output none --only-show-errors

              az devops configure --defaults organization=$(System.CollectionUri) project='$(System.TeamProject)' --output none

              VARIABLE_GROUP_ID=$(az pipelines variable-group list --query "[?name=='$(variable_group)'].id | [0]")

              if [ -z "${VARIABLE_GROUP_ID}" ]; then
                  echo "##vso[task.logissue type=error]Variable group $(variable_group) could not be found."
                  exit 2
              fi
              export VARIABLE_GROUP_ID

              printf -v tempval '%s id:' "$(variable_group)"
              printf -v val '%-20s' "${tempval}"
              echo "$val                 $VARIABLE_GROUP_ID"

              echo -e "$green--- Read parameter values ---$reset"

              dos2unix -q "${workload_environment_file_name}"

              prefix="${ENVIRONMENT}${LOCATION_CODE}${NETWORK}"

              deployer_tfstate_key=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "Deployer_State_FileName" "${workload_environment_file_name}" "deployer_tfstate_key" || true)
              export deployer_tfstate_key

              key_vault=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "Deployer_Key_Vault" "${workload_environment_file_name}" "keyvault" || true)
              export key_vault

              REMOTE_STATE_SA=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "Terraform_Remote_Storage_Account_Name" "${workload_environment_file_name}" "REMOTE_STATE_SA" || true)
              export REMOTE_STATE_SA

              STATE_SUBSCRIPTION=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "Terraform_Remote_Storage_Subscription" "${workload_environment_file_name}" "STATE_SUBSCRIPTION" || true)
              export STATE_SUBSCRIPTION

              workload_key_vault=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "${prefix}Workload_Key_Vault" "${workload_environment_file_name}" "workloadkeyvault" || true)
              export workload_key_vault

              landscape_tfstate_key=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "${prefix}Workload_Zone_State_FileName" "${workload_environment_file_name}" "deployer_tfstate_key" || true)
              export landscape_tfstate_key

              echo "Deployer statefile:                  $deployer_tfstate_key"
              echo "Workload statefile:                  $landscape_tfstate_key"
              echo "Deployer Key vault:                  $key_vault"
              echo "Workload Key vault:                  ${workload_key_vault}"
              echo "Target subscription                  $WL_ARM_SUBSCRIPTION_ID"

              echo "Terraform state file subscription:   $STATE_SUBSCRIPTION"
              echo "Terraform state file storage account:$REMOTE_STATE_SA"

              tfstate_resource_id=$(az resource list --name "${REMOTE_STATE_SA}" --subscription "$STATE_SUBSCRIPTION" --resource-type Microsoft.Storage/storageAccounts --query "[].id | [0]" -o tsv)
              export tfstate_resource_id

              echo -e "$green--- Run the remover script that destroys the SAP system ---$reset"

              cd "$CONFIG_REPO_PATH/SYSTEM/$(sap_system_folder)" || exit

              ${SAP_AUTOMATION_REPO_PATH}/deploy/scripts/remover.sh  \
                --parameterfile $(sap_system_configuration)          \
                --type sap_system                                    \
                --state_subscription "${STATE_SUBSCRIPTION}"         \
                --storageaccountname "${REMOTE_STATE_SA}"            \
                --deployer_tfstate_key "${deployer_tfstate_key}"     \
                --landscape_tfstate_key "${landscape_tfstate_key}"   \
                --auto-approve

              return_code=$?
              echo -e "$green--- Pull latest from DevOps Repository ---$reset"
              git checkout -q "$(Build.SourceBranchName)"
              git pull

              #stop the pipeline after you have reset the whitelisting on your resources
              echo "Return code from remover.sh:         $return_code."
              if [ 0 != $return_code ]; then
                  echo "##vso[task.logissue type=error]Return code from remover.sh $return_code."
                  exit $return_code
              fi

              echo -e "$green--- Add & update files in the DevOps Repository ---$reset"
              cd "$(Build.Repository.LocalPath)"

              changed=0
              # Pull changes
              git checkout -q "$(Build.SourceBranchName)"
              git pull origin "$(Build.SourceBranchName)"

              cd "${CONFIG_REPO_PATH}/SYSTEM/$(sap_system_folder)" || exit

              if [ 0 == $return_code ]; then

                  if [ -d ".terraform" ]; then
                      git rm -q -r  --ignore-unmatch -f ".terraform"
                      changed=1
                  fi

                  if [ -f $(sap_system_configuration) ]; then
                      git add    $(sap_system_configuration)
                      added=1
                  fi

                  if [ -f  "sap-parameters.yaml" ]; then
                      git rm  --ignore-unmatch  -q    "sap-parameters.yaml"
                      changed=1
                  fi

                  if [ -f "${SID}_hosts.yaml" ] ; then
                      git rm  --ignore-unmatch -q    "${SID}_hosts.yaml"
                      changed=1
                  fi

                  if [ -f "${SID}.md" ] ; then
                      git rm  --ignore-unmatch -q    "${SID}.md"
                      changed=1
                  fi

                  if [ -f "${SID}_virtual_machines.json" ] ; then
                      git rm  --ignore-unmatch -q    "${SID}_virtual_machines.json"
                      changed=1
                  fi

                  if [ 1 == $changed ]; then
                      git config --global user.email "$(Build.RequestedForEmail)"
                      git config --global user.name "$(Build.RequestedFor)"
                      git commit -m "Infrastructure for $(sap_system_configuration) removed. [skip ci]"
                      if git -c http.extraheader="AUTHORIZATION: bearer $(System.AccessToken)" push --set-upstream origin "$(Build.SourceBranchName)" --force; then
                          echo "##vso[task.logissue type=warning]Changes pushed to $(Build.SourceBranchName)"
                      else
                          echo "##vso[task.logissue type=error]Failed to push changes to $(Build.SourceBranchName)"
                      fi
                  fi
              fi

              exit $return_code

            displayName: "Remove SAP system"
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              WL_ARM_SUBSCRIPTION_ID: $(WL_ARM_SUBSCRIPTION_ID)
              WL_ARM_CLIENT_ID: $(WL_ARM_CLIENT_ID)
              WL_ARM_CLIENT_SECRET: $(WL_ARM_CLIENT_SECRET)
              WL_ARM_TENANT_ID: $(WL_ARM_TENANT_ID)
              AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
              SAP_AUTOMATION_REPO_PATH: ${{ parameters.sap_automation_repo_path }}
              CONFIG_REPO_PATH: ${{ parameters.config_repo_path }}/$(Deployment_Configuration_Path)
              LOGON_USING_SPN: $(Logon_Using_SPN)
              USE_MSI: $(Use_MSI)

            failOnStderr: false

  - stage: Remove_SAP_workload_zone
    displayName: "Removing the SAP workload zone"
    condition: and(not(failed()), not(canceled()), eq(${{ parameters.cleanup_zone }}, true))
    variables:
      - template: variables/10-remover-terraform-variables.yaml
        parameters:
          deployer_environment: ${{ parameters.deployer_environment }}
          workload_environment: ${{ parameters.workload_environment }}
          workload_zone: ${{ parameters.workload_zone }}
          sap_system: ${{ parameters.sap_system }}

    jobs:
      - job: Remove_SAP_workload_zone
        displayName: Remove the SAP Workload Zone
        variables:
          - group: SDAF-${{ parameters.workload_environment }}
        workspace:
          clean: all
        steps:
          - template: templates\download.yaml
          - bash: |
              #!/bin/bash
              green="\e[1;32m"
              reset="\e[0m"
              boldred="\e[1;31m"
              cyan="\e[1;36m"

              #External helper functions
              source "sap-automation/deploy/pipelines/helper.sh"

              debug=False

              if [ "$SYSTEM_DEBUG" = True ]; then
                  set -x
                  set -o errexit
                  debug=True
                  export debug
              fi
              set -eu

              echo "##vso[build.updatebuildnumber]Deploying the SAP System defined in $(sap_system_folder)"

              tfvarsFile="SYSTEM/$(sap_system_folder)/$(sap_system_configuration)"

              echo -e "$green--- Checkout $(Build.SourceBranchName) ---$reset"

              cd "${CONFIG_REPO_PATH}" || exit
              mkdir -p .sap_deployment_automation
              git checkout -q "$(Build.SourceBranchName)"

              if [ ! -f "$CONFIG_REPO_PATH/SYSTEM/$(sap_system_folder)/$(sap_system_configuration)" ]; then
                  echo -e "$boldred--- $(sap_system_configuration) was not found ---$reset"
                  echo "##vso[task.logissue type=error]File $(sap_system_configuration) was not found."
                  exit 2
              fi

              echo -e "$green--- Validations ---$reset"
              if [ "$USE_MSI" != "true" ]; then

                  if [ -z "$WL_ARM_SUBSCRIPTION_ID" ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_SUBSCRIPTION_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ "$WL_ARM_SUBSCRIPTION_ID" == '$$(ARM_SUBSCRIPTION_ID)' ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_SUBSCRIPTION_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ -z "$WL_ARM_CLIENT_ID" ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_CLIENT_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ "$WL_ARM_CLIENT_ID" == '$$(ARM_CLIENT_ID)' ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_CLIENT_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ -z "$WL_ARM_CLIENT_SECRET" ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_CLIENT_SECRET was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ "$WL_ARM_CLIENT_SECRET" == '$$(ARM_CLIENT_SECRET)' ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_CLIENT_SECRET was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ -z "$WL_ARM_TENANT_ID" ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_TENANT_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ "$WL_ARM_TENANT_ID" == '$$(ARM_TENANT_ID)' ]; then
                      echo "##vso[task.logissue type=error]Variable ARM_TENANT_ID was not defined in the $(variable_group) variable group."
                      exit 2
                  fi

                  if [ -z "$CP_ARM_SUBSCRIPTION_ID" ]; then
                      echo "##vso[task.logissue type=error]Variable CP_ARM_SUBSCRIPTION_ID was not defined in the $(parent_variable_group) variable group."
                      exit 2
                  fi
              fi

              # Set logon variables
              ARM_CLIENT_ID="$WL_ARM_CLIENT_ID"
              export ARM_CLIENT_ID
              ARM_CLIENT_SECRET="$WL_ARM_CLIENT_SECRET"
              export ARM_CLIENT_SECRET
              ARM_TENANT_ID=$WL_ARM_TENANT_ID
              export ARM_TENANT_ID
              ARM_SUBSCRIPTION_ID=$WL_ARM_SUBSCRIPTION_ID
              export ARM_SUBSCRIPTION_ID

              # Check if running on deployer
              if [[ ! -f /etc/profile.d/deploy_server.sh ]]; then
                  configureNonDeployer "$(tf_version)"  || true
                  echo -e "$green--- az login ---$reset"
                  LogonToAzure false  || true
              else
                  LogonToAzure "$USE_MSI" || true
              fi
              return_code=$?
              if [ 0 != $return_code ]; then
                  echo -e "$boldred--- Login failed ---$reset"
                  echo "##vso[task.logissue type=error]az login failed."
                  exit $return_code
              fi

              ARM_SUBSCRIPTION_ID=$WL_ARM_SUBSCRIPTION_ID
              export ARM_SUBSCRIPTION_ID
              az account set --subscription "$ARM_SUBSCRIPTION_ID"

              echo -e "$green--- Read deployment details ---$reset"
              dos2unix -q tfvarsFile

              ENVIRONMENT=$(grep -m1 "^environment" "$tfvarsFile" | awk -F'=' '{print $2}' | tr -d ' \t\n\r\f"')
              LOCATION=$(grep -m1 "^location" "$tfvarsFile" | awk -F'=' '{print $2}' | tr '[:upper:]' '[:lower:]' | tr -d ' \t\n\r\f"')
              NETWORK=$(grep -m1 "^network_logical_name" "$tfvarsFile" | awk -F'=' '{print $2}' | tr -d ' \t\n\r\f"')
              SID=$(grep -m1 "^sid" "$tfvarsFile" | awk -F'=' '{print $2}' | tr -d ' \t\n\r\f"')

              ENVIRONMENT_IN_FILENAME=$(echo $(sap_system_folder) | awk -F'-' '{print $1}')

              LOCATION_CODE=$(echo $(sap_system_folder) | awk -F'-' '{print $2}')
              LOCATION_IN_FILENAME=$(get_region_from_code "$LOCATION_CODE" || true)

              NETWORK_IN_FILENAME=$(echo $(sap_system_folder) | awk -F'-' '{print $3}')

              SID_IN_FILENAME=$(echo $(sap_system_folder) | awk -F'-' '{print $4}')

              echo "System TFvars:                       $(sap_system_configuration)"
              echo "Environment:                         $ENVIRONMENT"
              echo "Location:                            $LOCATION"
              echo "Network:                             $NETWORK"
              echo "SID:                                 $SID"

              echo "Environment(filename):               $ENVIRONMENT_IN_FILENAME"
              echo "Location(filename):                  $LOCATION_IN_FILENAME"
              echo "Network(filename):                   $NETWORK_IN_FILENAME"
              echo "SID(filename):                       $SID_IN_FILENAME"

              echo ""

              echo "Agent pool:                          $(this_agent)"
              echo "Organization:                        $(System.CollectionUri)"
              echo "Project:                             $(System.TeamProject)"
              echo ""
              echo "Azure CLI version:"
              echo "-------------------------------------------------"
              az --version

              if [ "$ENVIRONMENT" != "$ENVIRONMENT_IN_FILENAME" ]; then
                  echo "##vso[task.logissue type=error]The environment setting in $(sap_system_configuration) '$ENVIRONMENT' does not match the $(sap_system_configuration) file name '$ENVIRONMENT_IN_FILENAME'. Filename should have the pattern [ENVIRONMENT]-[REGION_CODE]-[NETWORK_LOGICAL_NAME]-INFRASTRUCTURE"
                  exit 2
              fi

              if [ "$LOCATION" != "$LOCATION_IN_FILENAME" ]; then
                  echo "##vso[task.logissue type=error]The location setting in $(sap_system_configuration) '$LOCATION' does not match the $(sap_system_configuration) file name '$LOCATION_IN_FILENAME'. Filename should have the pattern [ENVIRONMENT]-[REGION_CODE]-[NETWORK_LOGICAL_NAME]-INFRASTRUCTURE"
                  exit 2
              fi

              if [ "$NETWORK" != "$NETWORK_IN_FILENAME" ]; then
                  echo "##vso[task.logissue type=error]The network_logical_name setting in $(sap_system_configuration) '$NETWORK' does not match the $(sap_system_configuration) file name '$NETWORK_IN_FILENAME-. Filename should have the pattern [ENVIRONMENT]-[REGION_CODE]-[NETWORK_LOGICAL_NAME]-INFRASTRUCTURE"
                  exit 2
              fi

              if [ "$SID" != "$SID_IN_FILENAME" ]; then
                  echo "##vso[task.logissue type=error]The sid setting in $(sap_system_configuration) '$SID' does not match the $(sap_system_configuration) file name '$SID_IN_FILENAME-. Filename should have the pattern [ENVIRONMENT]-[REGION_CODE]-[NETWORK_LOGICAL_NAME]-[SID]"
                  exit 2
              fi

              workload_environment_file_name="$CONFIG_REPO_PATH/.sap_deployment_automation/${ENVIRONMENT}${LOCATION_CODE}${NETWORK}"
              echo "Workload Zone Environment File:      $workload_environment_file_name"

              echo -e "$green--- Configure devops CLI extension ---$reset"
              az config set extension.use_dynamic_install=yes_without_prompt --output none --only-show-errors

              az extension add --name azure-devops --output none --only-show-errors

              az devops configure --defaults organization=$(System.CollectionUri) project='$(System.TeamProject)' --output none

              VARIABLE_GROUP_ID=$(az pipelines variable-group list --query "[?name=='$(variable_group)'].id | [0]")

              if [ -z "${VARIABLE_GROUP_ID}" ]; then
                  echo "##vso[task.logissue type=error]Variable group $(variable_group) could not be found."
                  exit 2
              fi
              export VARIABLE_GROUP_ID

              printf -v tempval '%s id:' "$(variable_group)"
              printf -v val '%-20s' "${tempval}"
              echo "$val                 $VARIABLE_GROUP_ID"

              echo -e "$green--- Read parameter values ---$reset"

              dos2unix -q "${workload_environment_file_name}"

              prefix="${ENVIRONMENT}${LOCATION_CODE}${NETWORK}"

              deployer_tfstate_key=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "Deployer_State_FileName" "${workload_environment_file_name}" "deployer_tfstate_key" || true)
              export deployer_tfstate_key

              key_vault=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "Deployer_Key_Vault" "${workload_environment_file_name}" "keyvault" || true)
              export key_vault

              REMOTE_STATE_SA=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "Terraform_Remote_Storage_Account_Name" "${workload_environment_file_name}" "REMOTE_STATE_SA" || true)
              export REMOTE_STATE_SA

              STATE_SUBSCRIPTION=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "Terraform_Remote_Storage_Subscription" "${workload_environment_file_name}" "STATE_SUBSCRIPTION" || true)
              export STATE_SUBSCRIPTION

              workload_key_vault=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "${prefix}Workload_Key_Vault" "${workload_environment_file_name}" "workloadkeyvault" || true)
              export workload_key_vault

              landscape_tfstate_key=$(getVariableFromVariableGroup "${VARIABLE_GROUP_ID}" "${prefix}Workload_Zone_State_FileName" "${workload_environment_file_name}" "deployer_tfstate_key" || true)
              export landscape_tfstate_key

              echo "Deployer statefile:                  $deployer_tfstate_key"
              echo "Workload statefile:                  $landscape_tfstate_key"
              echo "Deployer Key vault:                  $key_vault"
              echo "Workload Key vault:                  ${workload_key_vault}"
              echo "Target subscription                  $WL_ARM_SUBSCRIPTION_ID"

              echo "Terraform state file subscription:   $STATE_SUBSCRIPTION"
              echo "Terraform state file storage account:$REMOTE_STATE_SA"

              tfstate_resource_id=$(az resource list --name "${REMOTE_STATE_SA}" --subscription "$STATE_SUBSCRIPTION" --resource-type Microsoft.Storage/storageAccounts --query "[].id | [0]" -o tsv)
              export tfstate_resource_id



              echo -e "$green --- Run the remover script that destroys the SAP workload zone (landscape) ---$reset"
              cd "$CONFIG_REPO_PATH/LANDSCAPE/$(workload_zone_folder)" || exit

              $SAP_AUTOMATION_REPO_PATH/deploy/scripts/remover.sh \
              --parameterfile $(workload_zone_configuration_file) \
              --type sap_landscape \
              --deployer_tfstate_key "${deployer_tfstate_key}"     \
              --state_subscription ${STATE_SUBSCRIPTION} \
              --storageaccountname "${REMOTE_STATE_SA}" \
              --auto-approve

              return_code=$?

              #stop the pipeline after you have reset the whitelisting on your resources
              echo "Return code from remover.sh:         $return_code."
              if [ 0 != $return_code ]; then
                  echo "##vso[task.logissue type=error]Return code from remover.sh $return_code."
                  exit $return_code
              fi

              echo -e "$green--- Add & update files in the DevOps Repository ---$reset"
              cd $(Build.Repository.LocalPath)
              changed=0
              git checkout -q $(Build.SourceBranchName)
              git pull

              if [ 0 == $return_code ]; then

                  if [ -f  "${workload_environment_file_name}" ]; then
                      git rm -q -f ${workload_environment_file_name}
                      echo "Removed ${workload_environment_file_name}"

                      changed=1
                  fi

                  if [ -f  "${workload_environment_file_name}.md" ]; then
                      git rm -q  --ignore-unmatch -f ${workload_environment_file_name}.md
                      changed=1
                  fi

                  if [ -d $(Deployment_Configuration_Path)/LANDSCAPE/$(workload_zone_folder)/.terraform ]; then
                      git rm -r  --ignore-unmatch -f $(Deployment_Configuration_Path)/LANDSCAPE/$(workload_zone_folder)/.terraform
                      changed=1
                  fi

                  if [ 1 == $changed ] ; then
                      git config --global user.email "$(Build.RequestedForEmail)"
                      git config --global user.name "$(Build.RequestedFor)"
                      git commit -m "Workload zone ${workload_zone_folder} removal.[skip ci]"
                      git -c http.extraheader="AUTHORIZATION: bearer $(System.AccessToken)" push --set-upstream origin $(Build.SourceBranchName)
                  fi

                  prefix="${ENVIRONMENT}${LOCATION_CODE}${NETWORK}"

                  echo -e "$green--- Deleting variables ---$reset"
                  if [ -n "${VARIABLE_GROUP_ID}" ]; then
                      echo "Deleting variables"

                      az_var=$(az pipelines variable-group variable list --group-id "${VARIABLE_GROUP_ID}" --query "${prefix}Workload_Key_Vault.value")
                      if [ -n "${az_var}" ]; then
                          az pipelines variable-group variable delete --group-id "${VARIABLE_GROUP_ID}" --name "${prefix}Workload_Key_Vault"           --yes --only-show-errors
                      fi

                      az_var=$(az pipelines variable-group variable list --group-id "${VARIABLE_GROUP_ID}" --query "${prefix}Workload_Zone_State_FileName.value")
                      if [ -n "${az_var}" ]; then
                          az pipelines variable-group variable delete --group-id "${VARIABLE_GROUP_ID}" --name "${prefix}Workload_Zone_State_FileName" --yes --only-show-errors
                      fi

                      az_var=$(az pipelines variable-group variable list --group-id "${VARIABLE_GROUP_ID}" --query "${prefix}Workload_Secret_Prefix.value --output table)
                      if [ -n "${az_var}" ]; then
                          az pipelines variable-group variable delete --group-id "${VARIABLE_GROUP_ID}" --name "${prefix}Workload_Secret_Prefix" --yes --only-show-errors
                      fi

                  fi
              fi

              exit $return_code
            displayName: Remove SAP workload_zone
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              WL_ARM_SUBSCRIPTION_ID: $(WL_ARM_SUBSCRIPTION_ID)
              WL_ARM_CLIENT_ID: $(WL_ARM_CLIENT_ID)
              WL_ARM_CLIENT_SECRET: $(WL_ARM_CLIENT_SECRET)
              WL_ARM_TENANT_ID: $(WL_ARM_TENANT_ID)
              AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
              SAP_AUTOMATION_REPO_PATH: ${{ parameters.sap_automation_repo_path }}
              CONFIG_REPO_PATH: ${{ parameters.config_repo_path }}/$(Deployment_Configuration_Path)
              LOGON_USING_SPN: $(Logon_Using_SPN)
              USE_MSI: $(Use_MSI)

            failOnStderr: false
