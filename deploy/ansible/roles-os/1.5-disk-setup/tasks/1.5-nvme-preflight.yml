# -------------------------------------+---------------------------------------8
#
# Task: 1.5.4 - NVMe Support - Prepare Linux VM for NVMe disk controller
#
# -------------------------------------+---------------------------------------8

# Configure Azure NVME Utils repository
- name:                                "1.5.4 NVMe Support - Configure Azure NVME Utils Repository"
  block:
    - name:                            "1.5.4 NVMe Support - Configure Azure NVME Utils repository for RHEL"
      when:
                                       - ansible_distribution == 'RedHat'
                                       - ansible_distribution_version is version('8.6', '>=')
      become:                          true
      become_user:                     root
      block:
        - name:                        "1.5.4 NVMe Support - Add Azure NVME Utils repository for RHEL"
          ansible.builtin.yum_repository:
            name:                      azure_nvme_utils
            description:               "Copr repo for azure-nvme-utils owned by cjp256"
            baseurl:                   "https://download.copr.fedorainfracloud.org/results/cjp256/azure-nvme-utils/rhel-{{ ansible_distribution_major_version }}-x86_64/"
            gpgcheck:                  true
            gpgkey:                    "https://download.copr.fedorainfracloud.org/results/cjp256/azure-nvme-utils/pubkey.gpg"
            enabled:                   true
            state:                     present
          register:                    repo_added

        - name:                        "1.5.4 NVMe Support - Refresh repository cache for RHEL"
          # when:                        repo_added.changed
          ansible.builtin.shell:       dnf makecache


        - name:                        "1.5.4 NVMe Support - Install Azure NVME Utils package for RHEL"
          ansible.builtin.package:
            name:                      azure-nvme-utils
            state:                     present
          register:                    nvme_utils_installed

    # repo only has SLES 15.5 support, so the when condition is based on SLES 15.5 and SLES_SAP 15.5
    - name:                            "1.5.4 NVMe Support - Configure Azure NVME Utils repository for SLES"
      when: >
                                       (ansible_distribution | upper == 'SLES' and ansible_distribution_version is version('15.5', '>=')) or
                                       (ansible_distribution | upper == 'SLES_SAP' and ansible_distribution_version is version('15.5', '>='))
      become:                          true
      become_user:                     root
      block:

        - name:                        "1.5.4 NVMe Support - Check if Azure NVME Utils repository is already configured"
          community.general.zypper_repository_info: {}
          register:                    repo_facts

        - name:                        "1.5.4 NVMe Support - Ensure Azure NVME Utils repository is configured"
          when:                        not repo_facts.repodatalist | selectattr('alias', 'equalto', 'azure_nvme_utils') | list
          ansible.builtin.debug:
            msg:                       "Azure NVME Utils repository is not configured, proceeding to add it."

        - name:                        "1.5.4 NVMe Support - Add Azure NVME Utils repository for SLES"
          when:                        not repo_facts.repodatalist | selectattr('name', 'equalto', 'azure_nvme_utils') | list
          community.general.zypper_repository:
            name:                      azure_nvme_utils
            description:               "Copr repo for azure-nvme-utils owned by cjp256"
            repo:                      "https://download.copr.fedorainfracloud.org/results/cjp256/azure-nvme-utils/opensuse-leap-15.5-x86_64/"
            priority:                  100
            state:                     present
            auto_import_keys:          true
            disable_gpg_check:         true
          register:                    sles_repo_added

        - name:                        "1.5.4 NVMe Support - Import GPG key"
          when:                        sles_repo_added.changed
          ansible.builtin.rpm_key:
            key:                       "https://download.copr.fedorainfracloud.org/results/cjp256/azure-nvme-utils/pubkey.gpg"
            state:                     present

        - name:                        "1.5.4 NVMe Support - Refresh repository cache"
          when:                        sles_repo_added.changed
          community.general.zypper:
            name:                      "*"
            update_cache:              true

        - name:                        "1.5.4 NVMe Support - Install Azure NVME Utils package"
          ansible.builtin.package:
            name:                      azure-nvme-utils
            state:                     present
          register:                    nvme_utils_installed


# Ensure NVMe modules are installed and loaded in initramfs
- name:                                "1.5.4 NVMe Support - Check if NVMe module is available"
  ansible.builtin.shell: |
                                       if grep -q 'nvme' /boot/System.map-$(uname -r); then
                                         echo "built-in"
                                       elif modinfo nvme >/dev/null 2>&1; then
                                         echo "module"
                                       else
                                         echo "missing"
                                       fi
  register:                            nvme_module_check
  changed_when:                        false

- name:                                "1.5.4 NVMe Support - Display NVMe module status"
  ansible.builtin.debug:
    msg:                               "NVMe module status: {{ nvme_module_check.stdout }}"
    verbosity:                         1

- name:                                "1.5.4 NVMe Support - Fail if NVMe module is not available"
  when:                                nvme_module_check.stdout == "missing"
  ansible.builtin.fail:
    msg: |
                                       NVMe module is not available.
                                       Please install NVMe module before changing your instance type to NVMe.

# Check if NVMe module is loaded in initramfs based on distribution
- name:                                "1.5.4 NVMe Support - Set distribution facts"
  ansible.builtin.set_fact:
    is_redhat:                         "{{ ansible_os_family | upper == 'REDHAT' }}"
    is_suse:                           "{{ ansible_os_family | upper == 'SUSE' }}"

- name:                                "1.5.4 NVMe Support - Check if NVMe loaded in initramfs (RHEL)"
  when:                                is_redhat
  ansible.builtin.shell: |
                                       set -o pipefail
                                       lsinitrd /boot/initramfs-$(uname -r).img | grep nvme
  register:                            initramfs_nvme_rhel
  failed_when:                         false
  changed_when:                        false

- name:                                "1.5.4 NVMe Support - Check if NVMe loaded in initramfs (SUSE)"
  when:                                is_suse
  ansible.builtin.shell: |
                                       set -o pipefail
                                       lsinitrd /boot/initrd-$(uname -r) | grep nvme
  register:                            initramfs_nvme_suse
  failed_when:                         false
  changed_when:                        false

- name:                                "1.5.4 NVMe Support - Set initramfs status fact"
  ansible.builtin.set_fact:
    nvme_in_initramfs:                 "{{
                                         (is_redhat and initramfs_nvme_rhel.rc == 0) or
                                         (is_suse and initramfs_nvme_suse.rc == 0)
                                       }}"

# Add NVMe to initramfs if not present
- name:                                "1.5.4 NVMe Support - Create dracut.conf.d directory"
  when:                                not nvme_in_initramfs and (is_redhat or is_suse)
  ansible.builtin.file:
    path:                              /etc/dracut.conf.d
    state:                             directory
    mode:                              '0755'

- name:                                "1.5.4 NVMe Support - Add NVMe drivers to dracut configuration"
  when:                                is_redhat or is_suse  # Only distribution-dependent, not state-dependent
  ansible.builtin.copy:
    src:                               88-nvme-dracut.conf
    dest:                              /etc/dracut.conf.d/nvme.conf
    mode:                              '0644'
    owner:                             root
    group:                             root
    force:                             true
  register: dracut_conf_added

# Check and configure NVMe timeouts in GRUB configuration
- name:                                "1.5.4 NVMe Support - Check if GRUB configuration has NVMe timeout parameters (RHEL)"
  when:                                is_redhat
  ansible.builtin.shell: |
                                       grep "GRUB_CMDLINE_LINUX.*nvme_core.io_timeout=240" /etc/default/grub || true
  register:                            grub_nvme_timeout
  changed_when:                        false
  failed_when:                         false

- name:                                "1.5.4 NVMe Support - Check if GRUB configuration has NVMe timeout parameters (SUSE)"
  when:                                is_suse
  ansible.builtin.shell: |
                                       grep "GRUB_CMDLINE_LINUX_DEFAULT.*nvme_core.io_timeout=240" /etc/default/grub || true
  register:                            grub_nvme_timeout
  changed_when:                        false
  failed_when:                         false

- name:                                "1.5.4 NVMe Support - Show current GRUB configuration"
  ansible.builtin.debug:
    msg:                               "Current GRUB configuration: {{ lookup('file', '/etc/default/grub') | regex_search('GRUB_CMDLINE_LINUX.*=.*') }}"
    verbosity:                         1

- name:                                "1.5.4 NVMe Support - Add NVMe timeout parameters to GRUB CMDLINE for SUSE"
  when:
                                       - is_suse
                                       - grub_nvme_timeout.rc != 0
                                       - grub_nvme_timeout.stdout == ""
  ansible.builtin.replace:
    path:                              /etc/default/grub
    regexp:                            '^(GRUB_CMDLINE_LINUX_DEFAULT=")([^"]*)(")$'
    replace:                           '\1\2 nvme_core.io_timeout=240 nvme_core.admin_timeout=240\3'
  register:                            grub_updated_suse

- name:                                "1.5.4 NVMe Support - Add NVMe timeout parameters to GRUB CMDLINE for RHEL"
  when:
                                       - is_redhat
                                       - grub_nvme_timeout.rc != 0
                                       - grub_nvme_timeout.stdout == ""
  ansible.builtin.replace:
    path:                              /etc/default/grub
    regexp:                            '^(GRUB_CMDLINE_LINUX=")([^"]*)(")$'
    replace:                           '\1\2 nvme_core.io_timeout=240 nvme_core.admin_timeout=240\3'
  register:                            grub_updated_rhel

- name:                                "1.5.4 NVMe Support - Update GRUB configuration for SUSE"
  when:
                                       - is_suse
                                       - grub_updated_suse is defined
                                       - grub_updated_suse.changed
  ansible.builtin.command:             grub2-mkconfig -o /boot/grub2/grub.cfg

# Update GRUB configuration for RHEL based on UEFI or non-UEFI systems
- name:                                "1.5.4 NVMe Support - Update GRUB config for UEFI systems - RHEL"
  when:
                                       - is_redhat
                                       - grub_updated_rhel is defined
                                       - grub_updated_rhel.changed
                                       - "'/boot/efi' in ansible_mounts | map(attribute='mount') | list"
  ansible.builtin.command:             grub2-mkconfig -o /boot/efi/EFI/redhat/grub.cfg
  changed_when:                        false

- name:                                "1.5.4 NVMe Support - Update GRUB config for non UEFI systems - RHEL"
  when:
                                       - is_redhat
                                       - grub_updated_rhel is defined
                                       - grub_updated_rhel.changed
                                       - "'/boot/efi' not in ansible_mounts | map(attribute='mount') | list"
  ansible.builtin.command:             grub2-mkconfig -o /boot/grub2/grub.cfg
  changed_when:                        false

- name:                                "1.5.4 NVMe Support - Verify GRUB configuration has been updated"
  when:                                grub_updated_suse.changed or grub_updated_rhel.changed
  ansible.builtin.shell: |
                                       grep "nvme_core.io_timeout=240" /etc/default/grub
  register:                            grub_verify
  changed_when:                        false
  failed_when:                         false

- name:                                "1.5.4 NVMe Support - Report GRUB configuration status"
  when:                                grub_updated_suse.changed or grub_updated_rhel.changed
  ansible.builtin.debug:
    msg:                               "{{ 'GRUB NVMe timeout parameters successfully configured' if grub_verify.rc == 0 else 'WARNING: Failed to configure GRUB NVMe timeout parameters' }}"

- name:                                "1.5.4 NVMe Support - Rebuild initramfs with dracut (RHEL/SUSE)"
  when:                                dracut_conf_added.changed and (is_redhat or is_suse)
  ansible.builtin.command:             dracut -f -v

# Install udev rules for Azure NVMe disks - /usr/lib/udev/rules.d/88-azure-data-disk.rules
- name:                                "1.5.4 NVMe Support - Install udev rules for Azure NVMe disks"
  ansible.builtin.copy:
    src:                               88-azure-nvme-data-disk.rules
    dest:                              /usr/lib/udev/rules.d/88-azure-data-disk.rules
    owner:                             root
    group:                             root
    force:                             true
    mode:                              '0644'
  register:                            udev_rules_added

- name:                                "1.5.4 NVMe Support - Reload udev rules if added or modified"
  # when:                                udev_rules_added.changed
  ansible.builtin.command:             udevadm control --reload-rules


- name:                                "1.5.4 NVMe Support - Set udev rules installed flag"
  # when:                                udev_rules_added.changed or nvme_udev_rules_installed | default(false)
  ansible.builtin.set_fact:
    nvme_udev_rules_installed:         true

- name:                                "1.5.4 NVMe Support - Reboot the system to apply changes"
  # when:                                dracut_conf_added.changed or nvme_utils_installed.changed or nvme_udev_rules_installed | default(false)
  ansible.builtin.reboot:
    msg:                               "Rebooting to apply NVMe changes"
    test_command:                      uptime
    connect_timeout:                   5
    reboot_timeout:                    600

- name:                                "1.5.4 NVMe Support - Create backup of fstab"
  ansible.builtin.copy:
    src:                               /etc/fstab
    dest:                              "/etc/fstab.backup.{{ ansible_date_time.date }}-{{ ansible_date_time.time }}"
    remote_src:                        true
    mode:                              '0644'
  register:                            fstab_backup

- name:                                "1.5.4 NVMe Support - Find /dev/sd* entries in fstab"
  ansible.builtin.shell: |
                                       set -o pipefail
                                       sed -n 's|^/dev/\(sd[a-z]*[0-9]*\).*|\1|p' </etc/fstab
  register:                            sd_devices
  changed_when:                        false

- name:                                "1.5.4 NVMe Support - Find /dev/disk/azure/scsi1/lun* entries in fstab"
  ansible.builtin.shell: |
                                       set -o pipefail
                                       sed -n 's|^/dev/disk/azure/scsi1/\(lun[0-9]*\).*|\1|p' </etc/fstab
  register:                            azure_scsi_devices
  changed_when:                        false

- name:                                "1.5.4 NVMe Support - Replace /dev/sd* entries with UUID in fstab"
  when:                                sd_devices.stdout_lines | length > 0
  ansible.builtin.shell: |
                                       set -o pipefail
                                       device={{ item }}
                                       uuid=$(ls -l /dev/disk/by-uuid | grep "$device" | sed -n 's/^.* \([^ ]*\) -> .*$/\1/p')
                                       if [ ! -z "$uuid" ]; then
                                         sed -i "s|^/dev/${device}|UUID=${uuid}|" /etc/fstab
                                       fi
  with_items:                          "{{ sd_devices.stdout_lines }}"
  register:                            fstab_sd_updated

- name:                                "1.5.4 NVMe Support - Replace /dev/disk/azure/scsi1/lun* entries with UUID in fstab"
  when:                                azure_scsi_devices.stdout_lines | length > 0
  ansible.builtin.shell: |
                                       set -o pipefail
                                       lun={{ item }}
                                       realdevice=$(realpath /dev/disk/azure/scsi1/${lun} | sed 's+/dev/++g')
                                       uuid=$(ls -l /dev/disk/by-uuid | grep "$realdevice" | sed -n 's/^.* \([^ ]*\) -> .*$/\1/p')
                                       if [ ! -z "$uuid" ]; then
                                         sed -i "s|^/dev/disk/azure/scsi1/${lun}|UUID=${uuid}|" /etc/fstab
                                       fi
  with_items:                          "{{ azure_scsi_devices.stdout_lines }}"
  register: fstab_azure_updated

- name:                               "1.5.4 NVMe Support - Summary Of NVMe Preparation"
  ansible.builtin.debug:
    msg: |
      NVMe Preparation Complete:
      - NVMe Module Status: {{ nvme_module_check.stdout }}
      - NVMe Utils Package: {{ 'Installed' if nvme_utils_installed is defined and nvme_utils_installed.changed else 'Already Installed or Not Required' }}
      - Initramfs Modules: {{ 'Complete' if nvme_in_initramfs else 'Added - Requires Rebuild' }}
      - GRUB Configuration: {{ 'Updated' if (grub_updated_suse is defined and grub_updated_suse.changed) or (grub_updated_rhel is defined and grub_updated_rhel.changed) else 'Already Configured or Not Required' }}
      - Udev Rules: {{ 'Installed' if udev_rules_added.changed else 'Already Installed' }}
      - FSTAB UUID Conversion: {{ 'Performed' if (fstab_sd_updated is defined and fstab_sd_updated.changed) or (fstab_azure_updated is defined and fstab_azure_updated.changed) else 'Not Required' }}
      - System Reboot: {{ 'Performed' if dracut_conf_added.changed or (nvme_utils_installed is defined and nvme_utils_installed.changed) or udev_rules_added.changed else 'Not Required' }}
