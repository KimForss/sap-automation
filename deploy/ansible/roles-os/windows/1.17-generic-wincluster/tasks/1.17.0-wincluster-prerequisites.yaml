---
# Windows cluster pre-requisites

# /*---------------------------------------------------------------------------8
# |                                                                            |
# |     1  Add failover cluster DSC module                                     |
# |     2  Add required cluster features                                       |
# |     3  Reboot the nodes if any of the feature installation requires it     |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

# some modules are added in case we come here directly
- name:                                "WinCluster-PreReq: Calculate clustername for SCS/ERS cluster"
  ansible.builtin.set_fact:
    cluster_name:                      "{{ sap_sid | lower }}scs{{ scs_instance_number }}cl"
  when:
    - node_tier | lower in ['scs','ers']

- name:                                "WinCluster-PreReq: Calculate clustername for DB cluster"
  ansible.builtin.set_fact:
    cluster_name:                      "{{ sap_sid | lower }}{{ db_sid | lower }}db{{ db_instance_number }}cl"
  when:
    - node_tier | lower == 'sqlserver'

- name:                                "WinCluster-PreReq: Ensure DSC modules are installed"
  community.windows.win_psmodule:
    name:                              "{{ item }}"
    state:                             present
    accept_license:                    true
  loop:
                                       - PSDesiredStateConfiguration
                                       - ServerManager
                                       - FailOverClusterDsc
                                       - StorageDsc
                                       - ActiveDirectoryDsc
  register:                            dsc_modules

- name:                                "WinCluster-PreReq: Add the windows AD Powershell features"
  ansible.windows.win_feature:
    name:                              "RSAT-AD-PowerShell"
    state:                             present
  register:                            ad_features

- name:                                "WinCluster-PreReq: Add the windows cluster features"
  ansible.windows.win_feature:
    name:                              "{{ item }}"
    state:                             present
    include_management_tools:          true
    include_sub_features:              true
  with_items:
                                       - Failover-Clustering
                                       - RSAT-Clustering
                                       - RSAT-Clustering-PowerShell
                                       - RSAT-Clustering-CmdInterface
                                       - FS-FileServer
  register:                            cluster_features

- name:                                "WinCluster-PreReq: Ensure Registry Services is Running"
  ansible.windows.win_dsc:
    resource_name:                     Service
    Name:                              "{{ item }}"
    State:                             Running
    StartupType:                       Automatic
  loop:
    - TermService
    - RemoteRegistry

- name:                                "WinCluster-PreReq: add registry key to set keepalive interval"
  ansible.windows.win_regedit:
    path:                              HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters
    name:                              KeepAliveTime
    data:                              120000
    type:                              dword
    state:                             present

- name:                                "WinCluster-PreReq: add registry key to set keepalive interval"
  ansible.windows.win_regedit:
    path:                              HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters
    name:                              KeepAliveInterval
    data:                              120000
    type:                              dword
    state:                             present

- name:                                "Inspect cluster features"
  ansible.builtin.debug:
    msg:                               "{{ cluster_features }}"
    verbosity:                         2


- name:                                "WinCluster-PreReq: Reboot '{{ ansible_hostname }}' if needed"
  ansible.windows.win_reboot:
    post_reboot_delay: 60
  when: (cluster_features.results | selectattr('reboot_required', 'equalto', true)) | list | count > 0

# Pre-task to verify VCO existence. Needs to run only for SCS/ERS nodes.
- name:                                "WinCluster-PreReq: Check if VCO exists in AD"
  when:
    - node_tier | lower in ['scs','ers']
  block:
    # Variables section
    - name:                            "WinCluster-PreReq: Set AD Permission Variables"
      ansible.builtin.set_fact:
        ad_object:
          vco_name:                    "{{ scs_cluster_hostname }}"
          domain:                      "{{ domain_name }}"
          ou_path:                     "{% domain_ou_path if domain_ou_path | length > 1 else 'CN=Computers' %}"
          nodes:
                                       - "{{ primary_node }}"
                                       - "{{ secondary_node }}"
                                       - "{{ cluster_name }}"

    # Check if the computer object for VCO exists in AD
    - name:                            "WinCluster-PreReq: Verify VCO existence using DSC"
      ansible.windows.win_dsc:
        resource_name:                 "ADComputer"
        ComputerName:                  "{{ scs_cluster_hostname }}"
        Ensure:                        "Present"
        Path:                          "{{ ad_object.ou_path }},DC={{ domain_name | regex_replace('\\.', ',DC=') }}"
        PsDscRunAsCredential_username: "{{ domain_service_account }}@{{ domain_name }}"
        PsDscRunAsCredential_password: "{{ domain_service_password }}"
      register:                        vco_dsc_check
      failed_when:                     false

    # Set fact based on check
    - name:                            "WinCluster-PreReq: Set VCO existence status"
      ansible.builtin.set_fact:
        vco_exists:                    "{{ vco_dsc_check is success }}"

  rescue:
    - name:                            "WinCluster-PreReq: Handle VCO check failure"
      ansible.builtin.fail:
        msg: |
                                       Failed to verify VCO existence:
                                       VCO Name: {{ scs_cluster_hostname }}
                                       Domain:   {{ domain_name }}
                                       Error:    {{ vco_dsc_check.stderr | default('Unknown error') }}

# Build LDAP path only if VCO exists
- name:                                "WinCluster-PreReq: Build LDAP path for VCO"
  when:                                vco_exists | default(false)
  ansible.builtin.set_fact:
    ldap_path:                         "CN={{ ad_object.vco_name }},{{ ad_object.ou_path }},DC={{ ad_object.domain | regex_replace('\\.', ',DC=') }}"

# Set permissions for both nodes using win_dsc
- name:                                "WinCluster-PreReq: Set AD Permissions for cluster nodes on VCO"
  when:                                vco_exists | default(false)
  ansible.windows.win_dsc:
    resource_name:                     "ADObjectPermissionEntry"
    Ensure:                            "Present"
    Path:                              "{{ ldap_path }}"
    IdentityReference:                 "{{ ad_object.domain.split('.')[0] | upper }}\\{{ item }}$"
    ActiveDirectoryRights:             "GenericAll"
    AccessControlType:                 "Allow"
    ObjectType:                        "00000000-0000-0000-0000-000000000000"
    ActiveDirectorySecurityInheritance: "None"
    InheritedObjectType:               "00000000-0000-0000-0000-000000000000"
    PsDscRunAsCredential_username:     "{{ domain_service_account }}@{{ domain_name }}"
    PsDscRunAsCredential_password:     "{{ domain_service_password }}"
  loop:                                "{{ ad_object.nodes }}"
  register:                            dsc_results


# Try and use win_acl if DSC fails
- name:                                "WinCluster-PreReq: Set AD Permissions using ACL (fallback)"
  when:
                                       - dsc_results is failed
                                       - vco_exists | default(false)
  become:                              true
  become_method:                       ansible.builtin.runas
  become_user:                         '{{ sap_sid }}adm@{{ domain_name }}'
  ansible.windows.win_acl:
    path:                              "AD:{{ ldap_path }}"
    user:                              "{{ ad_object.domain.split('.')[0] | upper }}\\{{ item }}$"
    rights:                            "FullControl"
    type:                              "allow"
    state:                             "present"
    inheritance:                       "none"
  loop:                                "{{ ad_object.nodes }}"
  register:                            acl_results

# Validation task
- name:                                "WinCluster-PreReq: Validate AD Permissions for cluster nodes"
  when:                                vco_exists | default(false)
  become:                              true
  become_method:                       ansible.builtin.runas
  become_user:                         '{{ sap_sid }}adm@{{ domain_name }}'
  ansible.windows.win_shell: |
                                       $ErrorActionPreference = "Stop"
                                       # Set credentials for AD operations
                                       $domain = "{{ ad_object.domain.split('.')[0] | upper }}"

                                       Import-Module ActiveDirectory

                                       $path = "{{ ldap_path }}"
                                       $nodes = @("{{ primary_node }}","{{ secondary_node }}")
                                       $results = @()

                                       foreach ($node in $nodes) {
                                           $identity = "$domain\$node`$"
                                           try {
                                               $computerObject = Get-ADComputer "{{ scs_cluster_hostname }}" -Properties nTSecurityDescriptor
                                               $acl = $computerObject.nTSecurityDescriptor.Access

                                               $access = $acl | Where-Object {
                                                   $_.IdentityReference.Value -eq $identity -and
                                                   $_.ActiveDirectoryRights -eq "GenericAll" -and
                                                   $_.AccessControlType -eq "Allow"
                                               }

                                               if ($access) {
                                                   $results += "Permission validated: $identity has full control"
                                               } else {
                                                   throw "Permission check failed for $identity"
                                               }
                                           } catch {
                                               throw "Validation failed for $identity`: $_"
                                           }
                                       }
                                       $results
  register:                            validation_result
  changed_when:                        false
  failed_when:                         validation_result.rc != 0

# Display results
- name:                                "WinCluster-PreReq: Display validation results"
  when:
                                       - validation_result is success
                                       - vco_exists | default(false)
  ansible.builtin.debug:
    msg:                               "{{ validation_result.stdout_lines }}"
...
