# # Prepare disks and mount points
# Get all the unique disk types from sap-parameters
# Create LVM for Oracle and SAP file systems.

# -------------------------------------+---------------------------------------8
#
- name:                                "ORACLE ASM: Load the disk configuration settings"
  ansible.builtin.include_vars:        disks_config_asm.yml

- name:                                "ORACLE ASM: Set the NFS Server name list"
  ansible.builtin.set_fact:
    nfs_server_temp:                   "{{ nfs_server_temp | default([]) + [item] }}"
  with_items:
                                       - "{{ query('inventory_hostnames', '{{ sap_sid | upper }}_SCS') }}"
                                       - "{{ query('inventory_hostnames', '{{ sap_sid | upper }}_DB') }}"

# - name:                                "Print unique disks and volume group details"
#   ansible.builtin.debug:
#     var:
#       - volume_groups
#       - disks
#     verbosity:                         2

# CREATE VOLUME GROUPS BASED ON sap-parameters.yaml
# -------------------------------------+---------------------------------------8
#
- name:                                "ORACLE ASM: Volume Group creation"
  when:
                                       - tier == "ora"
                                       - node_tier == "oracle-asm"
  community.general.lvg:
    vg:                                "{{ item.vg }}"
    pvs:                               "{{ item.pvs }}"
    pesize:                            4M
    state:                             present
  loop:                                "{{ volume_groups }}"
  register:                            vgscreated

- name:                                "ORACLE ASM: Filter the vg name from vgscreated results"
  ansible.builtin.set_fact:
    vgcreatedlist:                     "{{ vgscreated | json_query('results[*].item.vg') }}" # noqa: jinja[invalid]

# Debug for testing
- name:                                "ORACLE ASM: Print vgcreated details"
  ansible.builtin.debug:
    var:
                                       - vgcreatedlist
                                       - logical_volumes
                                       - vgscreated.results
    verbosity:                         2

# Debug testing end of line

# CREATE LOGICAL VOLUMES BASED ON VGCREATEDLIST
# -------------------------------------+---------------------------------------8
#
- name:                                "ORACLE ASM: Logical Volume creation"
  when:
                                       - tier == "ora"
                                       - item.node_tier == "oracle-asm"
                                       - item.vg in vgcreatedlist
  community.general.lvol:
    lv:                                "{{ item.lv }}"
    vg:                                "{{ item.vg }}"
    size:                              "{{ item.size }}"
    opts:                              "{{ lvol_opts_from_lv_item }}"
    active:                            true
    state:                             present
    shrink:                            false
    resizefs:                          false
  loop:                                "{{ logical_volumes }}"
  register:                            lvscreated

# Debug for testing
- name:                                "ORACLE ASM: Print lvscreated details"
  ansible.builtin.debug:
    var:                               lvscreated
    verbosity:                         2

- name:                                "ORACLE ASM: Filter the logical volumes created results"
  ansible.builtin.set_fact:
    lvcreatedlist_tmp:                 "{{ lvscreated.results | rejectattr('skipped', 'defined') | list }}"

# Debug for testing
- name:                                "ORACLE ASM: Print vgcreated filtered details"
  ansible.builtin.debug:
    var:                               lvcreatedlist_tmp
    verbosity:                         2


- name:                                "ORACLE ASM: Filter the logical volumes created results1"
  ansible.builtin.set_fact:
    lvcreatedlist:                     "{{ lvcreatedlist_tmp | map(attribute='item.lv') | list }}"


# Debug for testing
- name:                                "ORACLE ASM: Print vgcreated details"
  ansible.builtin.debug:
    var:                               lvcreatedlist
    verbosity:                         2


- name:                                "ORACLE ASM: Filesystem creation"
  when:
                                       - item.tier in ["all", tier ]
                                       - item.node_tier in ["all", node_tier]
                                       - item.fstype is defined
                                       - item.lv in lvcreatedlist
  community.general.filesystem:
    dev:                               "{{ dev_path_from_lv_item }}"
    fstype:                            "{{ item.fstype }}"
    opts:                              "{{ item.fsopts | default('') }}"
  loop:                                "{{ logical_volumes }}"
  register :                           filesystemscreated

# Debug for testing
- name:                                "ORACLE ASM: Print values to be passed for filesystem creation"
  ansible.builtin.debug:
    var:                               filesystemscreated
    verbosity:                         2

# /*---------------------------------------------------------------------------8
# |                                                                            |
# |                         ASM Specific Configuration                         |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

# Create a run flag directory
- name:                                "ORACLE ASM: Create run flag directory"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation
    state:                             directory
    mode:                              0755

- name:                                "ORACLE ASM: Create asm flag directory"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/asm
    state:                             directory
    mode:                              0755

# ORACLE should be the owner of the file systems /oracle directories.

- name:                                "ORACLE ASM: Make orasid:dba as owners"
  ansible.builtin.file:
    path:                              /oracle
    state:                             directory
    mode:                              0755
    owner:                             oracle
    group:                             oinstall

- name:                                "ORACLE ASM: Make orasid:dba as owners"
  ansible.builtin.file:
    path:                              "{{ target_media_location }}"
    state:                             directory
    mode:                              0777

# Setup and configure ORACLE ASM.

- name:                                "ORACLE ASM: check if DISKS are already initialized"
  ansible.builtin.stat:
    path:                              "/etc/sap_deployment_automation/asm/asm_disk_initialized.txt"
  register:                            oracle_asm_initialized

# STEP1 Install ASMLIB and ASMSUPPORT Packages
- name:                                "ORACLE ASM: Disk Initialisation"
  when:                                not oracle_asm_initialized.stat.exists
  block:

    - name:                            "ORACLE ASM: Install Compat Packages"
      ansible.builtin.dnf:
        name:
                                       - "{{ target_media_location }}/RPM/libbpf-0.6.0-6.el8.x86_64.rpm"
        state:                         present
        disable_gpg_check:             true

    - name:                            "ORACLE ASM: Install Compat Packages"
      when:                            distribution_id in ['redhat7', 'oraclelinux7']
      ansible.builtin.dnf:
        name:
                                       - "{{ target_media_location }}/downloads/compat-libcap1-1.10-7.el7.x86_64.rpm"
                                       - "{{ target_media_location }}/downloads/compat-libstdc++-33-3.2.3-72.el7.x86_64.rpm"
        state:                         present
        disable_gpg_check:             true

    - name:                            "ORACLE ASM: check for v3 RPMS"
      ansible.builtin.stat:
        path:                          "{{ target_media_location }}/RPM/oracleasmlib-3.0.0-13.el8.x86_64.rpm"
      register:                        oracle_asm_v3

    - name:                            "ORACLE ASM: Install RPM Packages v3"
      when:                            oracle_asm_v3.stat.exists
      ansible.builtin.dnf:
        name:
                                       - "{{ target_media_location }}/RPM/oracleasmlib-3.0.0-13.el8.x86_64.rpm"
                                       - "{{ target_media_location }}/RPM/oracleasm-support-3.0.0-6.el8.x86_64.rpm"
        state:                         present
        disable_gpg_check:             true

    - name:                            "ORACLE ASM: check for v2 RPMS"
      ansible.builtin.stat:
        path:                          "{{ target_media_location }}/downloads/oracleasmlib-2.0.17-1.el8.x86_64.rpm"
      register:                        oracle_asm_v2

    - name:                            "ORACLE ASM: Install RPM Packages v2"
      when:                            oracle_asm_v2.stat.exists
      ansible.builtin.dnf:
        name:
                                       - "{{ target_media_location }}/downloads/oracleasmlib-2.0.17-1.el8.x86_64.rpm"
                                       - "{{ target_media_location }}/downloads/oracleasm-support-2.1.12-1.el8.x86_64.rpm"
        state:                         present
        disable_gpg_check:             true


    # STEP2 Configure and init ORACLEASM
    # The loop has to be run per host as the sap-parameters file has all the disks.

    - name:                            "ORACLE ASM: Oracle Data Guard: Setting the primary and Secondary DB names"
      ansible.builtin.set_fact:
        current_host:                  "{{ ansible_hostname }}"

    - name:                            "ORACLE ASM: Configuration"
      ansible.builtin.shell: |
                                       set -o errexit
                                       /usr/sbin/oracleasm configure -u {{ grid_user_name }} -g oinstall -e -s y
                                       /usr/sbin/oracleasm init
      register:                        oracle_asm_config_results
      args:
        chdir:                         "/usr/sbin"
        creates:                       /etc/sap_deployment_automation/asm/asm_configured.txt
      failed_when:                     oracle_asm_config_results.rc not in [0, 1]

    - name:                            "ORACLE ASM: Configuration"
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/asm/asm_configured.txt
        state:                         touch
        mode:                          0755

    - name:                            "ORACLE ASM: Start and enable oracleasm service"
      ansible.builtin.systemd:
        name:                          oracleasm
        state:                         restarted
        enabled:                       true


    # STEP3 Initialize Disks for ASM

    # Need to map the LUN id from SAP Parameters file to the scsi1 list to get the list to be used for creating ASM Disks.
    # Capture the list of disks to create list for DATA disk group.

    - name:                            "ORACLE ASM: Capture disks for DATA Group"
      when:
                                       - item.type == "data-asm"
                                       - item.host == current_host
      ansible.builtin.shell: |
                                       set -o errexit
                                       readlink -f lun{{ item.LUN }}

      loop:                            "{{ disks }}"
      register:                        data_group
      args:
        chdir:                         "/dev/disk/azure/scsi1"

    - name:                            "ORACLE ASM: Filter the list from data_group results"
      ansible.builtin.set_fact:
        data_disk_group:               "{{ data_group.results | rejectattr('skipped', 'defined') | list }}"

    - name:                            "ORACLE ASM: Filter the logical volumes created results1"
      ansible.builtin.set_fact:
        data_disk_list:                "{{ data_disk_group | map(attribute='stdout') | list }}"

    - name:                            "ORACLE ASM: Set data_disk_list_rsp"
      ansible.builtin.set_fact:
        data_disk_list_rsp:            "{{ data_disk_list | join('1,') }}"

    # - fail: msg"{{ datadiskcount }}"

    # We need to map the LUN id from SAP Parameters file to the scsi1 list to get the list to be used for creating ASM Disks.
    # Capture the list of disks to create list for ARCH disk group.

    - name:                            "ORACLE ASM: Capture disks for ARCH Group"
      when:
                                       - item.type == "arch-asm"
                                       - item.host == current_host
      ansible.builtin.shell: |
                                       set -o errexit
                                       readlink -f lun{{ item.LUN }}

      loop:                            "{{ disks }}"
      register:                        archive_group
      args:
        chdir:                         "/dev/disk/azure/scsi1"

    - name:                            "ORACLE ASM: Filter the arch disks from the results"
      ansible.builtin.set_fact:
        archive_disk_group:            "{{ archive_group.results | rejectattr('skipped', 'defined') | list }}"

    - name:                            "ORACLE ASM: Create the ARCH DISKS List"
      ansible.builtin.set_fact:
        archive_disk_list:             "{{ archive_disk_group | map(attribute='stdout') | list }}"

    - name:                            "ORACLE ASM: Set archive_disk_list_rsp"
      ansible.builtin.set_fact:
        archive_disk_list_rsp:         "{{ archive_disk_list | join('1,') }}"

    # Capture the list of disks to create list for RECO disk group.

    - name:                            "Capture disks for RECO Group"
      when:
                                       - item.type == "reco-asm"
                                       - item.host == current_host
      ansible.builtin.shell: |
                                       set -o errexit
                                       readlink -f lun{{ item.LUN }}

      loop:                            "{{ disks }}"
      register:                        recovery_group
      args:
        chdir:                         "/dev/disk/azure/scsi1"

    - name:                            "Filter the arch disks from the results"
      ansible.builtin.set_fact:
        recovery_disk_group:           "{{ recovery_group.results | rejectattr('skipped', 'defined') | list }}"

    - name:                            "ORACLE ASM: Create the ARCH DISKS List"
      ansible.builtin.set_fact:
        recovery_disk_list:            "{{ recovery_disk_group | map(attribute='stdout') | list }}"

    - name:                            "ORACLE ASM: Set recovery_disk_list_rsp fact"
      ansible.builtin.set_fact:
        recovery_disk_list_rsp:        "{{ recovery_disk_list | join('1,') }}"

    - name:                            "ORACLE ASM: Print disk information"
      ansible.builtin.debug:
        msg:
          - "Data Disk list:           {{ data_disk_list }}"
          - "Archive Disk list:        {{ archive_disk_list }}"
          - "Recovery Disk list:       {{ recovery_disk_list }}"
          - "Data Disk list rsp:       {{ data_disk_list_rsp }}"
          - "Archive Disk list rsp:    {{ archive_disk_list_rsp }}"
          - "Recovery Disk list rsp:   {{ recovery_disk_list_rsp }}"
        verbosity:                     2


    # ==============================================================================
    # Initialize a Data disk device only if it is not already an ASM disk
    # ==============================================================================
    - name:                            "ORACLE ASM: Query status of disk datadisk1"
      # become:                          true
      # become_user:                     "root"
      ansible.builtin.shell: |
                                       /usr/sbin/oracleasm querydisk "{{ item }}1"
      loop:                            "{{ data_disk_list }}"
      failed_when:                     false
      register:                        data_disk_status
      changed_when:                    data_disk_status.rc == 0

    - name:                            "ORACLE ASM: Ensure that there is one partition that occupies whole data disk"
      become:                          true
      become_user:                     "root"
      community.general.parted:
        device:                        "{{ item }}"
        number:                        1
        state:                         present
        label:                         msdos
        part_type:                     primary
        part_start:                    0%
        part_end:                      100%
      loop:                            "{{ data_disk_list }}"
      register:                        data_partitioned_disks

    - name:                            "ORACLE ASM: Print data_disk_status"
      ansible.builtin.debug:
        msg:
          - "Data Disk Status:         {{ data_disk_status }}"
          - "Data Partitioned Disks:   {{ data_partitioned_disks }}"
        verbosity:                     2

    - name:                            "ORACLE ASM: Initialize ASM DISKS - DATA"
      ansible.builtin.shell: |
                                       /usr/sbin/oracleasm createdisk DATA"{{ db_sid | upper }}"0"{{ ansible_loop.index }}"  "{{ item }}1"
      loop:                            "{{ data_disk_list }}"
      loop_control:
        extended:                      true
      register:                        data_disk_created
      args:
        creates:                      "/etc/sap_deployment_automation/asm/asm_data_disks_created.txt"

    - name:                            "ORACLE ASM: Permissions ASM Disks - DATA"
      become:                          true
      become_user:                     "root"
      ansible.builtin.file:
        path:                          "{{ item }}1"
        owner:                         "{{ grid_user_name }}"
        group:                         oinstall
      loop:                            "{{ data_disk_list }}"
      loop_control:
        extended:                      true

    - name:                            "ORACLE ASM: Print data_disk_created"
      ansible.builtin.debug:
        msg:                           "Data Disk Created: {{ data_disk_created }}"
        verbosity:                     2

    - name:                            "ORACLE ASM: Initialize ASM DISKS Create progress file asm/asm_data_disks_created.txt"
      ansible.builtin.file:
        path:                          "/etc/sap_deployment_automation/asm/asm_data_disks_created.txt"
        mode:                          0755
        state:                         touch
      # when:                           datadiskcreated.rc == 0


    # ==============================================================================
    # Initialize a ARCH disk device only if it is not already an ASM disk
    # ==============================================================================
    - name:                            "ORACLE ASM: Query status of disk archdisk1"
      # become:                          true
      # become_user:                     "root"
      ansible.builtin.shell: |
                                       /usr/sbin/oracleasm querydisk "{{ item }}1"
      loop:                            "{{ archive_disk_list }}"
      failed_when:                     false
      register:                        archive_disk_status
      changed_when:                    archive_disk_status.rc == 0

    - name:                            "ORACLE ASM: Ensure that there is one partition that occupies whole data disk"
      become:                          true
      become_user:                     "root"
      community.general.parted:
        device:                        "{{ item }}"
        number:                        1
        state:                         present
        label:                         msdos
        part_type:                     primary
        part_start:                    0%
        part_end:                      100%
      loop:                            "{{ archive_disk_list }}"
      register:                        arch_partitioned_disks

    - name:                            "ORACLE ASM: Print archive_disk_status"
      ansible.builtin.debug:
        msg:
          - "Archive Disk Status:      {{ archive_disk_status }}"
          - "Archive Partitioned Disks:{{ arch_partitioned_disks }}"
        verbosity:                     2

    - name:                            "ORACLE ASM: Initialize ASM DISKS - ARCH"
      ansible.builtin.shell: |
                                       /usr/sbin/oracleasm createdisk ARCH"{{ db_sid | upper }}"0"{{ ansible_loop.index }}"  "{{ item }}1"
      loop:                            "{{ archive_disk_list }}"
      loop_control:
        extended:                      true
      register:                        archive_disk_created
      args:
        creates:                       "/etc/sap_deployment_automation/asm/asm_archive_disks_created.txt"

    - name:                            "ORACLE ASM: Permissions ASM Disks - ARCH"
      ansible.builtin.file:
        path:                          "{{ item }}1"
        owner:                         "{{ grid_user_name }}"
        group:                         oinstall
      loop:                            "{{ archive_disk_list }}"
      loop_control:
        extended:                      true

    - name:                            "ORACLE ASM: Print archive_disk_created"
      ansible.builtin.debug:
        msg:                           "Archive Disk Created: {{ archive_disk_created }}"
        verbosity:                     2

    - name:                            "ORACLE ASM: Initialize ASM DISKS Create progress file asm/asm_archive_disks_created.txt"
      ansible.builtin.file:
        path:                          "/etc/sap_deployment_automation/asm/asm_archive_disks_created.txt"
        mode:                          0755
        state:                         touch
      # when:                           datadiskcreated.rc == 0

    # ==============================================================================
    # Initialize a RECO disk device only if it is not already an ASM disk
    # ==============================================================================
    - name:                            "ORACLE ASM: Query status of disk recodisk1"
      ansible.builtin.shell: |
                                       /usr/sbin/oracleasm querydisk "{{ item }}1"
      loop:                            "{{ reco_disk_list }}"
      failed_when:                     false
      register:                        recovery_disk_status
      changed_when:                    recovery_disk_status.rc == 0

    - name:                            "ORACLE ASM: Ensure that there is one partition that occupies whole data disk"
      become:                          true
      become_user:                     "root"
      community.general.parted:
        device:                        "{{ item }}"
        number:                        1
        state:                         present
        label:                         msdos
        part_type:                     primary
        part_start:                    0%
        part_end:                      100%
      loop:                            "{{ recovery_disk_list }}"
      register:                        recovery_partitioned_disks

    - name:                            "ORACLE ASM: Print recovery_disk_status"
      ansible.builtin.debug:
        msg:
          - "Recovery Disk Status:       {{ recovery_disk_status }}"
          - "Recovery Partitioned Disks: {{ recovery_partitioned_disks }}"
        verbosity:                     2

    - name:                            "ORACLE ASM: Initialize ASM DISKS - RECO"
      ansible.builtin.shell: |
                                       /usr/sbin/oracleasm createdisk RECO"{{ db_sid | upper }}"0"{{ ansible_loop.index }}"  "{{ item }}1"
      loop:                            "{{ recovery_disk_list }}"
      loop_control:
        extended:                      true
      register:                        recovery_disk_created
      args:
        creates:                       "/etc/sap_deployment_automation/asm/asm_recovery_disks_created.txt"

    - name:                            "ORACLE ASM: Permissions ASM Disks - RECO"
      ansible.builtin.file:
        path:                          "{{ item }}1"
        owner:                         "{{ grid_user_name }}"
        group:                         oinstall
      loop:                            "{{ recovery_disk_list }}"
      loop_control:
        extended:                      true

    - name:                            "ORACLE ASM: Print recovery_disk_created"
      ansible.builtin.debug:
        msg:                           "Recovery Disk Created: {{ recovery_disk_created }}"
        verbosity:                     2

    - name:                            "ORACLE ASM: Initialize ASM DISKS Create progress file asm/asm_recovery_disks_created.txt"
      ansible.builtin.file:
        path:                          "/etc/sap_deployment_automation/asm/asm_recovery_disks_created.txt"
        mode:                          0755
        state:                         touch
