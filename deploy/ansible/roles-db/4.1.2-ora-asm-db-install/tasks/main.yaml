# /*---------------------------------------------------------------------------8
# |                                                                            |
# |                Perform the Oracle Instance installation                    |
# |                  SAP: Register BOM                                         |
# |                  create .params directory                                  |
# |                  Export environment variables for Oracle Installation      |
# |                  Run the Oracle universal installer in silent mode.        |
# |                   SAP Note : 2660017 Oracle Software Installation on Unix  |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

---

- name:                                "ORACLE GRID: Register BoM"
  ansible.builtin.include_role:
    name:                              roles-sap/3.3.1-bom-utility
    tasks_from:                        bom-register
  vars:
    bom_name:                          "{{ bom_base_name }}"
    task_prefix:                       "ORACLE GRID: "
    sa_enabled:                        true
  when:
                                       - bom is undefined

- name:                                "ORACLE GRID: - Validate ORACLE parameters"
  ansible.builtin.assert:
    that:
      - item_to_check.parameter is defined                    # Has the variable been defined
      - item_to_check.parameter | type_debug != 'NoneType'    # and given a value
      - item_to_check.parameter | trim | length > 1
    fail_msg:                      item_to_check.error
  loop:
    - { parameter: 'bom.patch_information.ora_release', error: 'Oracle deployments requires that ora_release is provided' }
    - { parameter: 'bom.patch_information.ora_version', error: 'Oracle deployments requires that ora_version is provided' }
    - { parameter: 'bom.patch_information.oracle_sbp_patch', error: 'Oracle deployments requires that oracle_sbp_patch is provided' }
  loop_control:
    loop_var: item_to_check

- name:                                "ORACLE GRID: Set variables from BoM"
  ansible.builtin.set_fact:
    ora_release:                       "{{ bom.patch_information.ora_release }}"
    ora_version:                       "{{ bom.patch_information.ora_version }}"
    oracle_sbp_patch:                  "{{ bom.patch_information.oracle_sbp_patch }}"

- name:                                "Oracle ASM: - Set DB SID"
  ansible.builtin.debug:
    msg:
                                       - "DB SID: {{ sap_sid | upper }}"
                                       - "Oracle Version: {{ ora_version }}"
                                       - "Oracle Release: {{ ora_release }}"
                                       - "Oracle SBP Patch: {{ oracle_sbp_patch }}"

- name:                                "Oracle ASM: Load the disk configuration settings"
  ansible.builtin.include_vars:        disks_config_asm.yml

- name:                                "ORACLE ASM: Create directories"
  ansible.builtin.file:
    path:                              "{{ item.path }}"
    state:                             "{{ item.state }}"
    recurse:                           true
    mode:                              "{{ item.mode }}"
  loop:
    - { state: 'directory', mode: '0775', path: '/etc/sap_deployment_automation/' }
    - { state: 'directory', mode: '0755', path: '/etc/sap_deployment_automation/oracle' }
    - { state: 'directory', mode: '0755', path: "/etc/sap_deployment_automation/{{ sap_sid | upper }}" }
    - { state: 'directory', mode: '0755', path: "{{ tmp_directory }}/{{ db_sid | upper }}/{{ ora_version }}" }

- name:                                "ORACLE ASM: Create and permission Oracle directories"
  ansible.builtin.file:
    path:                              "{{ item.path }}"
    state:                             "{{ item.state }}"
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall
    recurse:                           true
    mode:                              "{{ item.mode }}"
  loop:
    - { state: 'directory', mode: '0755', path: "/oracle" }

- name:                                "ORACLE ASM: Create and permission Oracle directories"
  ansible.builtin.file:
    path:                              "{{ item.path }}"
    state:                             "{{ item.state }}"
    owner:                             "{{ grid_user_name }}"
    group:                             oinstall
    recurse:                           true
    mode:                              "{{ item.mode }}"
  loop:
    - { state: 'directory', mode: '0775', path: "/oracle/GRID/{{ ora_version }}" }

- name:                                "Oracle ASM: Find Patch ID for GRID"
  become:                              true
  become_user:                         root
  ansible.builtin.find:
    paths:                             "{{ target_media_location }}/SBP/GIRU19P"
    patterns:                          ["bundle.xml"]
    file_type:                         file
    recurse:                           true
  register:                            patch_grid_id_directory

- name:                                "Oracle ASM: Find Patch ID for GRID"
  ansible.builtin.fail:
    msg:                               "No Patch Ids"
  when:                                patch_grid_id_directory.matched != 1

- name:                                "Oracle ASM: OPatch ID"
  ansible.builtin.set_fact:
    patch_grid_path:                   "{{ patch_grid_id_directory.files[0].path | dirname }}"
  when:                                patch_grid_id_directory.matched == 1

- name:                                "Oracle ASM: set ApplyRU and OPatchPath"
  ansible.builtin.set_fact:
    OPatchPath:                        "{{ target_media_location }}/SBP/OPATCH/OPatch"
    ApplyRU:                           "{{ patch_grid_path }}"
    OracleImage:                       "{{ target_media_location }}/oraserver/LINUX_X86_64/db_home/LINUX.X64_193000_db_home.zip"

- name:                                "Oracle ASM: OPatch ID"
  ansible.builtin.debug:
    msg:

      - "Oracle Image: {{ target_media_location }}/oraserver/LINUX_X86_64/db_home/LINUX.X64_193000_db_home.zip"
      - "ApplyRU:      {{ ApplyRU }}"
      - "OPatchPath:   {{ OPatchPath }}"

- name:                                "Oracle ASM: check if installed"
  ansible.builtin.stat:
    path:                              "/etc/sap_deployment_automation/oracle/oracle_installed.txt"
  register:                            oracle_installed

# /*---------------------------------------------------------------------------8
# | Start of Oracle software installation using SAP RUNINSTALLER wrapper.      |
# | Before running Installer set DB_SID and CV_ASSUME_DISTID according to      |
# | SAP Note 2660017 Oracle Software Installation on Unix                      |
# |                                                                            |
# | Step 1 run the pre-installation check                                      |
# +------------------------------------4--------------------------------------*/
- name:                                "Oracle ASM: Installation"
  when:
    - not oracle_installed.stat.exists
  block:

# /*---------------------------------------------------------------------------8
# | Start of Oracle software installation using SAP RUNINSTALLER wrapper.      |
# | Before running Installer set DB_SID and CV_ASSUME_DISTID according to      |
# | SAP Note 2660017 Oracle Software Installation on Unix                      |
# |                                                                            |
# | Step 2 run the installation check                                          |
# +------------------------------------4--------------------------------------*/
    - name:                            "Oracle ASM: Execute RUNINSTALLER command"
      ansible.builtin.debug:
        msg:                           "Running {{ target_media_location }}/RUNINSTALLER/SAP/RUNINSTALLER -oracle_image {{ OracleImage }} -applyRU {{ ApplyRU }} -opatchLocation {{ OPatchPath }} -silent -ignorePrereqWarnings"

    - name:                            "Oracle ASM: Execute RUNINSTALLER"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       {{ target_media_location }}/RUNINSTALLER/SAP/RUNINSTALLER \
                                       -oracle_image {{ OracleImage }}                           \
                                       -applyRU {{ ApplyRU }}                                    \
                                       -opatchLocation {{ OPatchPath }}                          \
                                       -silent -ignorePrereqWarnings
      register:                        orainstaller_results
      failed_when:                     orainstaller_results.rc >= 2              # installer returns rc=1 (exited with warning) by default when run is silent mode as the oratab file is created only after running the root.sh
      environment:
        DB_SID:                        "{{ db_sid }}"
        CV_ASSUME_DISTID:              "{{ CV_ASSUME_DISTID }}"
      args:
        executable:                    /bin/csh
        creates:                       "/etc/sap_deployment_automation/oracle/oracle_installed.txt"

    - name:                            "Oracle ASM: Debug: installer output"
      ansible.builtin.debug:
        var:                           orainstaller_results.stdout_lines
        verbosity:                     2

    - name:                            "Oracle ASM: Debug installer output log"
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/oracle/oracle_install.log"
        content:                       "{{ orainstaller_results.stdout }}"
        mode:                          '0777'
      when:                            orainstaller_results.stdout is defined

    - name:                            "Oracle ASM: Create oracle_installed.txt"
      ansible.builtin.file:
        path:                          "/etc/sap_deployment_automation/oracle/oracle_installed.txt"
        state:                         touch
        mode:                          '0755'
      when:                            orainstaller_results.rc <= 2

# /*---------------------------------------------------------------------------8
# | Start of Oracle software installation using SAP RUNINSTALLER wrapper.      |
# | Before running Installer set DB_SID and CV_ASSUME_DISTID according to      |
# | SAP Note 2660017 Oracle Software Installation on Unix                      |
# |                                                                            |
# | Step 3 Post processing                                                     |
# +------------------------------------4--------------------------------------*/

    - name:                            "Oracle ASM: Post Processing - Run orainstRoot.sh"
      become:                          true
      become_user:                     root
      ansible.builtin.shell:           /oracle/oraInventory/orainstRoot.sh
      register:                        orainstRoot_results
      args:
        creates:                       "/etc/sap_deployment_automation/oracle/orainstRoot_executed.txt"
        executable:                    /bin/csh

    - name:                            "Oracle ASM: Debug: orainstRoot output"
      ansible.builtin.debug:
        var:                           orainstRoot_results.stdout_lines
        verbosity:                     2

    - name:                            "Oracle ASM: Debug installer output log"
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/oracle/orainstRoot.log"
        content:                       "{{ orainstRoot_results.stdout }}"
        mode:                          '0777'
      when:                            orainstRoot_results.stdout is defined

    - name:                            "Oracle ASM: Create orainstRoot_executed.txt"
      ansible.builtin.file:
        path:                          "/etc/sap_deployment_automation/oracle/orainstRoot_executed.txt"
        state:                         touch
        mode:                          '0755'

    - name:                            "Oracle ASM:  Post Processing - Run root.sh"
      become:                          true
      become_user:                     root
      ansible.builtin.shell:           /oracle/{{ db_sid }}/{{ ora_version }}/root.sh
      register:                        rootscript_results
      args:
        creates:                       "/etc/sap_deployment_automation/oracle/rootscripts_executed.txt"
        executable:                    /bin/csh

    - name:                            "Oracle ASM: Debug: rootscript output"
      ansible.builtin.debug:
        var:                           rootscript_results.stdout_lines
        verbosity:                     2

    - name:                            "Oracle ASM: Debug rootscript output log"
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/oracle/rootscript.log"
        content:                       "{{ rootscript_results.stdout }}"
        mode:                          '0777'
      when:                            rootscript_results.stdout is defined

    - name:                            "Oracle ASM: Create rootscripts_executed.txt"
      ansible.builtin.file:
        path:                          "/etc/sap_deployment_automation/oracle/rootscripts_executed.txt"
        state:                         touch
        mode:                         '0755'

    - name:                            "Oracle ASM: Permissions"
      ansible.builtin.file:
        path:                          /oracle/{{ db_sid | upper }}/{{ ora_version }}/bin/oracle
        state:                         file
        owner:                         oracle
        mode:                          '6751'

- name:                                "Oracle ASM: environment variables to the Bash profile"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    path:                              /home/oracle/.bashrc
    insertafter:                       'fi '
    block: |
        # User Specific environment
        export ORACLE_HOME=/oracle/{{ db_sid }}/{{ ora_release }}
        export ORACLE_SID={{ db_sid }}
        export ORACLE_BASE=/oracle/{{ db_sid }}
        export LD_LIBRARY_PATH=$ORACLE_HOME/lib
        export TNS_ADMIN=$ORACLE_HOME/network/admin
        export DB_SID={{ db_sid }}
        PATH="$PATH:$ORACLE_HOME/bin"
        export PATH

- name:                                "Oracle ASM: create .cshrc"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /home/oracle/.cshrc
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
        # User Specific environment
        setenv  ORACLE_HOME /oracle/{{ db_sid }}/{{ ora_release }}
        setenv  ORACLE_SID  {{ db_sid }}
        setenv  ORACLE_BASE /oracle/{{ db_sid }}
        setenv  LD_LIBRARY_PATH $ORACLE_HOME/lib
        setenv  TNS_ADMIN $ORACLE_HOME/network/admin
        setenv  DB_SID {{ db_sid }}
        set path = ($path $ORACLE_HOME/bin)
    mode:                              '0755'

- name:                                "Oracle ASM: Install status"
  when:
    - oracle_installed.stat.exists
  block:

    - name:                            "Oracle ASM: Install status"
      ansible.builtin.debug:
        msg:                           "Oracle ASM: is already installed"

    - name:                            "ORACLE ASM: - return value"
      ansible.builtin.set_fact:
        oracle_already_installed:      true
...
# /*---------------------------------------------------------------------------8
# |                                   END                                      |
# +------------------------------------4--------------------------------------*/
