---
# DGMGRL Config on Secondary for Enabling the Falshback logs.

- name:                                "Oracle Data Guard -  Check SAP Restore on secondary is completed"
  when:                                node_tier in ["oracle","oracle-asm"]
  ansible.builtin.stat:
    path:                              /usr/sap/install/downloads/{{ db_sid | upper }}/post_processing_completed.txt
  register:                            primary_post_processing_completed

# Create the dgmgrl file for enabling the flashback on secondary database.
- name:                                "Oracle Data Guard - Post Processing: Create the secondary_log_apply_off file for Secondary"
  become:                              true
  become_user:                         oracle
  ansible.builtin.template:
    backup:                            true
    src:                               secondary_log_apply_off.j2
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/secondary_log_apply_off.dgmgrl"
    mode:                              '0644'
    force:                             true


- name:                                "Oracle Data Guard - Post Processing: Create the secondary_log_apply_on file for Secondary"
  become:                              true
  become_user:                         oracle
  ansible.builtin.template:
    backup:                            true
    src:                               secondary_log_apply_on.j2
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/secondary_log_apply_on.dgmgrl"
    mode:                              '0644'
    force:                             true

- name:                                "Oracle Data Guard - Post Processing: Execute Block only if secondary DB restore is completed"
  when:
                                       - primary_post_processing_completed.stat.exists
  block:

    # Disable the Log apply on Secondary for enabling Flashback
    - name:                            "Oracle Data Guard - Post Processing: Set Log apply off on Standby"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell:           dgmgrl / as sysdba @secondary_log_apply_off.dgmgrl
      register:                        secondary_log_apply_off_results
      failed_when:                     secondary_log_apply_off_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/secondary_log_apply_off.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh


    - name:                            "Oracle Data Guard - Post Processing: Set Log apply off on Standby (Debug)"
      ansible.builtin.debug:
        var:                           secondary_log_apply_off_results.stdout_lines
        verbosity:                     2

    - name:                            "Oracle Data Guard - Post Processing: Restart lsnrctl on Primary (save output)"
      when:                            secondary_log_apply_off_results.stdout is defined
      ansible.builtin.copy:
        dest:                          /etc/sap_deployment_automation/secondary_log_apply_off.log
        content:                       "{{ secondary_log_apply_off_results.stdout }}"
        mode:                          '0777'

    - name:                            "Oracle Data Guard - Post Processing: Create secondary_log_apply_off.txt"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      when:                            secondary_log_apply_off_results.rc == 0
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/secondary_log_apply_off.txt
        state:                         touch
        mode:                          '0755'

    # Enable Flashback on Secondary
    - name:                            "Oracle Data Guard - Enable Flashback on Oracle Secondary DB"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell:           sqlplus / as sysdba @turn_on_flashback.sql
      register:                        turn_on_flashback_secondary_results
      failed_when:                     turn_on_flashback_secondary_results.rc > 0
      args:
       creates:                        /etc/sap_deployment_automation/dataguard_scripts/turn_on_flashback_secondary.txt
       chdir:                          /etc/sap_deployment_automation/dataguard_scripts
       executable:                     /bin/csh

    - name:                            "Oracle Data Guard - Setup Primary: Enable Flashback on Oracle Primary DB (debug)"
      ansible.builtin.debug:
        var:                           turn_on_flashback_secondary_results.stdout_lines
        verbosity:                     2

    - name:                            "Oracle Data Guard - Setup Primary: Enable Flashback on Oracle Secondary DB (save output)"
      when:                            turn_on_flashback_secondary_results.stdout is defined
      ansible.builtin.copy:
        dest:                          /etc/sap_deployment_automation/dataguard_scripts/turn_on_flashback_secondary.log
        content:                       "{{ turn_on_flashback_secondary_results.stdout }}"
        mode:                          '0755'


    - name:                            "Oracle Data Guard - Setup Primary: Create turn_on_flashback_secondary.txt"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      when:
                                       - turn_on_flashback_secondary_results.rc == 0
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/turn_on_flashback_secondary.txt
        state:                         touch
        mode:                          '0755'


    # Enable the log apply on secondary DB after enabling Flashback
    - name:                            "Oracle Data Guard - Post Processing: Set Log apply on on Standby"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell:           dgmgrl / as sysdba @secondary_log_apply_on.dgmgrl
      register:                        secondary_log_apply_on_results
      failed_when:                     secondary_log_apply_on_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/secondary_log_apply_on.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh


    - name:                            "Oracle Data Guard - Post Processing: Set Log apply off on Standby (Debug)"
      ansible.builtin.debug:
        var:                           secondary_log_apply_off_results.stdout_lines
        verbosity:                     2

    - name:                            "Oracle Data Guard - Post Processing: Restart lsnrctl on Primary (save output)"
      when:                            secondary_log_apply_on_results.stdout is defined
      ansible.builtin.copy:
        dest:                          /etc/sap_deployment_automation/secondary_log_apply_on.log
        content:                       "{{ secondary_log_apply_on_results.stdout }}"
        mode:                          '0777'


    - name:                            "Oracle Data Guard - Post Processing: Create secondary_log_apply_on.txt"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      when:                            secondary_log_apply_off_results.rc == 0
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/secondary_log_apply_on.txt
        state:                         touch
        mode:                          '0755'

    # Stop the Secondary Database.
    - name:                            "Oracle Data Guard - Setup Secondary: Stop secondary DB for oracle clusterware configuration."
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      when:
                                       - current_host == ora_secondary
      ansible.builtin.shell: |
                                       sqlplus / as sysdba @shutdown_secondary.sql
      register:                        secondary_shutdown_cfg_results
      failed_when:                     secondary_shutdown_cfg_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/secondary_shutdown_cfg.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "Oracle Data Guard - Setup Secondary: Stop secondary DB for oracle clusterware configuration. (Debug)"
      when:                            secondary_shutdown_cfg_results.stdout is defined
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/dataguard_scripts/secondary_shutdown.log"
        content:                       "{{ secondary_shutdown_cfg_results.stdout }}"
        mode:                          '0777'

    - name:                            "Oracle Data Guard - Setup Secondary: Create secondary_shutdown.txt"
      become:                          true
      become_user:                     "root"
      when:
                                       - secondary_shutdown_cfg_results.rc == 0
                                       - current_host == ora_secondary
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/secondary_shutdown_cfg.txt
        state:                         touch
        mode:                          '0755'
        owner:                         oracle
        group:                         oinstall

    # Start the Secondary Database for non-ASM.
    - name:                            "Oracle Data Guard - Setup Secondary: Start secondary DB after HA Service configuration on non-ASM."
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      when:
                                       - node_tier == "oracle"
                                       - current_host == ora_secondary
      ansible.builtin.shell: |
                                       sqlplus / as sysdba @oracle_secondary_startup.sql
      register:                        secondary_startup_cfg_results
      failed_when:                     secondary_startup_cfg_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/secondary_startup_cfg.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "Oracle Data Guard - Setup Secondary: Start secondary DB after HA Service configuration on non-ASM (Debug)"
      when:                            secondary_startup_cfg_results.stdout is defined
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/dataguard_scripts/secondary_startup.log"
        content:                       "{{ secondary_startup_cfg_results.stdout }}"
        mode:                          '0777'

    - name:                            "Oracle Data Guard - Setup Secondary: Create secondary_startup_cfg.txt"
      become:                          true
      become_user:                     "root"
      when:
                                       - node_tier == "oracle"
                                       - secondary_startup_cfg_results.rc == 0
                                       - current_host == ora_secondary
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/secondary_startup_cfg.txt
        state:                         touch
        mode:                          '0755'
        owner:                         oracle
        group:                         oinstall


    # Disable the automatic restart for database on Secondary.
    - name:                            "Oracle Data Guard: Disable automatic restart for database on Secondary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       srvctl disable database -d {{ db_sid | upper }}_STDBY -force -noprompt
      environment:
        ORACLE_HOME:                   "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
        PATH:                          "/oracle/GRID/{{ ora_version }}/bin:{{ ansible_env.PATH }}"
      args:
        executable:                    /bin/csh
      register:                        disable_restart_secondary
      failed_when:                     disable_restart_secondary.rc != 0 and 'PRCD-1126' not in disable_restart_secondary.stderr
      changed_when:                    disable_restart_secondary.rc == 0

    - name:                            "Oracle Data Guard: Verify database is mounted on Secondary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       sqlplus -s / as sysdba << EOF
                                       SET HEADING OFF
                                       SET FEEDBACK OFF
                                       SELECT open_mode FROM v\$database;
                                       EXIT;
                                       EOF
      environment:
        ORACLE_SID:                    "{{ db_sid | upper }}"
        ORACLE_HOME:                   "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
      args:
        executable:                    /bin/csh
      register:                        secondary_open_mode
      failed_when:                     false
      changed_when:                    false

    - name:                            "Oracle Data Guard: Ensure database is mounted (not open) on Secondary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       sqlplus -s / as sysdba << EOF
                                       SHUTDOWN IMMEDIATE;
                                       STARTUP MOUNT;
                                       EXIT;
                                       EOF
      environment:
        ORACLE_SID:                    "{{ db_sid | upper }}"
        ORACLE_HOME:                   "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
      args:
        executable:                    /bin/csh
      when:                            "'MOUNTED' not in secondary_open_mode.stdout"
      register:                        mount_secondary

    - name:                            "Oracle Data Guard: Create disable_restart_secondary.txt"
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/disable_restart_secondary.txt
        state:                         touch
        mode:                          '0755'

    - name:                            "Create post processing completed on secondary"
      become:                          true
      become_user:                     root
      ansible.builtin.file:
        path:                          /usr/sap/install/downloads/{{ db_sid | upper }}/post_processing_secondary_completed.txt
        state:                         touch
        mode:                          '0755'
        owner:                         oracle
        group:                         oinstall


    # Create User for SIDADM on Secondary Node.
    - name:                            "2.5.1 SAP Users: -  Create Oracle ASM Users Assignment"
      ansible.builtin.user:
        name:                          "{{ sap_sid | lower }}adm"
        uid:                           "{{ sidadm_uid }}"
        group:                         "sapsys"
        groups:                        asmoper,asmdba,dba,oper,oinstall
        append:                        true
        shell:                         /bin/csh

    # Update the tnsnames.ora for SAP application servers
    - name:                            "Oracle Data Guard - Update tnsnames.ora for SAP application servers"
      become:                          true
      become_user:                     "root"
      ansible.builtin.copy:
        src:                           /etc/sap_deployment_automation/dataguard_scripts/tnsnames.ora
        dest:                          /sapmnt/{{ sap_sid |upper }}/profile/oracle/tnsnames.ora
        remote_src:                    true
        owner:                         '{{ sap_sid |lower }}adm'
        group:                         sapsys
        mode:                          "{{ '0777' | int - (custom_umask | default('022') | int) }}"

...
  # /*---------------------------------------------------------------------------8
  # |                                   END                                      |
  # +------------------------------------4--------------------------------------*/
