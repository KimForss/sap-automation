- name:                                "Oracle Data Guard - Preparation: Create sap_deployment_automation folder"
  become:                              true
  become_user:                         "root"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts
    mode:                              '0755'
    state:                             directory
    owner:                             oracle
    group:                             oinstall

- name:                                "Oracle Data Guard - Preparation: create enable_archive_log.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/enable_archive_log.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
        SHUTDOWN IMMEDIATE;
        STARTUP MOUNT;
        ALTER DATABASE ARCHIVELOG;
        ALTER DATABASE OPEN;
        exit
    mode:                              '0755'


- name:                                "Oracle Data Guard - Preparation: create standby_redo_logs.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/standby_redo_logs.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
        ALTER DATABASE ADD STANDBY LOGFILE '/oracle/{{ db_sid | upper }}/oraarch/standbylog/srl1.dbf' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '/oracle/{{ db_sid | upper }}/oraarch/standbylog/srl2.dbf' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '/oracle/{{ db_sid | upper }}/oraarch/standbylog/srl3.dbf' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '/oracle/{{ db_sid | upper }}/oraarch/standbylog/srl4.dbf' size 400M reuse;
        exit
    mode:                              '0755'
  when:                                node_tier == "oracle"


- name:                                "Oracle Data Guard for oracle asm - Preparation: create standby_redo_logs.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/standby_redo_logs.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
        ALTER DATABASE ADD STANDBY LOGFILE '+ARCH' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '+ARCH' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '+ARCH' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '+ARCH' size 400M reuse;
        exit
    mode:                              '0755'
  when:                                node_tier == "oracle-asm"

- name:                                "Oracle Data Guard for oracle asm - Preparation: create flash_recovery_area_logs.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/flash_recovery_area_logs.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |

        ALTER SYSTEM SET DB_RECOVERY_FILE_DEST_SIZE=400M SCOPE=BOTH;
        ALTER SYSTEM SET DB_RECOVERY_FILE_DEST='+RECO' SCOPE=BOTH;
        exit
    mode:                              '0755'
  when:                                node_tier == "oracle-asm"

- name:                                "Oracle Data Guard - Preparation: create enable_forced_logging.sql"
  become:                              true
  become_user:                         oracle
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/enable_forced_logging.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         ALTER DATABASE FORCE LOGGING;
         ALTER SYSTEM SWITCH LOGFILE;
         exit
    mode:                              '0755'

- name:                                "Oracle Data Guard - Preparation: create turn_on_flashback.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/turn_on_flashback.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         ALTER DATABASE FLASHBACK ON;
         ALTER SYSTEM SET STANDBY_FILE_MANAGEMENT=AUTO;
         exit
    mode:                              '0755'

- name:                                "Oracle Data Guard - Preparation: create create_pfile.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/create_pfile.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         CREATE PFILE FROM SPFILE;
         exit
    mode:                              '0755'

- name:                                "Oracle Data Guard - Preparation: create create_spfile.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/create_spfile.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         CREATE SPFILE FROM PFILE;
         exit
    mode:                              '0755'
  when:
    - node_tier == 'oracle'

- name:                                "Oracle Data Guard for ASM - Preparation: create create_spfile.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/create_spfilesecondary.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         CREATE SPFILE='+DATA/{{ db_sid | upper }}_STDBY/PARAMETERFILE/spfile{{ db_sid | upper }}.ora' from pfile='/oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/init{{ db_sid | upper }}.ora';
         exit
    mode:                              '0755'
  when:
    - node_tier == 'oracle-asm'

- name:                                "Oracle Data Guard for ASM - Preparation: create asmsecondary_startup.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/asmsecondary_startup.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
              STARTUP MOUNT;
              exit
    mode:                              '0755'
  when:
    - node_tier == 'oracle-asm'

# orasecondary_startup.sql
- name:                                "Oracle Data Guard  - Preparation: create orasecondary_startup.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/orasecondary_startup.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
              STARTUP MOUNT;
              exit
    mode:                              '0755'
  when:
    - node_tier == 'oracle'

- name:                                "Oracle Data Guard - Preparation: create secondary_startup.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/secondary_startup.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         STARTUP NOMOUNT PFILE=$ORACLE_HOME/dbs/init{{ db_sid | upper }}.ora;
         exit
    mode:                              '0755'

- name:                                "Oracle Data Guard - Preparation: create asmsecondary_startup.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/asmsecondary_startup.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         STARTUP MOUNT;
         exit
    mode:                              '0755'

- name:                                "Oracle Data Guard - Preparation: create dataguard_status.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/dataguard_status.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         SELECT INSTANCE_NAME, STATUS, DATABASE_ROLE FROM v$database, v$instance;
         exit
    mode:                              '0755'

- name:                                "Oracle Data Guard - Preparation: create enable_dataguard_broker.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create: true
    path: /etc/sap_deployment_automation/dataguard_scripts/enable_dataguard_broker.sql
    marker_begin: "-- BEGIN"
    marker_end:   "-- END"
    block: |
         ALTER SYSTEM SET dg_broker_start=true;
         exit
    mode:                              '0755'


# Set Primary and Secondary node names.
- name:                                "Oracle Data Guard - Preparation: Setting the primary and Secondary DB names"
  ansible.builtin.set_fact:
    ora_primary:                       "{{ ansible_play_hosts_all[0] }}"         # Oracle Primary Host
    ora_secondary:                     "{{ ansible_play_hosts_all[1] }}"         # Oracle Secondary Host
    current_host:                      "{{ ansible_hostname }}"

# Debug for testing
- name:                                "Oracle Data Guard - Preparation: Debug: installer prechecks output"
  ansible.builtin.debug:
    msg:
      - "primary host is {{ ora_primary }}"
      - "secondary host is {{ ora_secondary }}"
      - "host is {{ current_host }}"
    verbosity:                         2

# Create Listener for primary node.

- name:                               "Oracle Data Guard - Preparation: Create the Listener file for Primary"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              listener_primary.j2
    dest:                             "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/listener.ora"
    mode:                             '0644'
    force:                            true
  vars:
    hostname:  "{{ ora_primary }}"
  when:  current_host == ora_primary

# Create Listener for secondary node.

- name:                               "Oracle Data Guard - Preparation: Create the Listener file for Secondary"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              listener_secondary.j2
    dest:                             "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/listener.ora"
    mode:                             '0644'
    force:                            true
  vars:
    hostname:  "{{ ora_secondary }}"
  when:  current_host == ora_secondary

# Create tnsnames.ora for primary node.

- name:                               "Oracle Data Guard - Preparation: Create the tnsnames file for Primary"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              tnsnames_primary.j2
    dest:                             "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/tnsnames.ora"
    mode:                             '0644'
    force:                            true
  vars:
    hostname:  "{{ ora_primary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"
  when:  current_host == ora_primary

# tnsnames for observer

- name:                               "Oracle Data Guard - Preparation: Create the tnsnames file for Observer"
  become:                             true
  become_user:                        root
  ansible.builtin.template:
    backup:                           true
    src:                              tnsnames_primary.j2
    dest:                             "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/tnsnames.ora"
    mode:                             '0644'
    force:                            true
  vars:
    hostname:                          "{{ ora_primary }}"
    sap_dbp_hostname:                  "{{ ora_primary }}"
    sap_dbs_hostname:                  "{{ ora_secondary }}"
  when:  current_host == ora_primary
# Create tnsnames.ora for secondary node.

- name:                               "Oracle Data Guard - Preparation: Create the tnsnames file for Secondary"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              tnsnames_secondary.j2
    dest:                             "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/tnsnames.ora"
    mode:                             '0644'
    force:                            true
  vars:
    hostname:  "{{ ora_secondary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"
  when:  current_host == ora_secondary


# Create sqlnet.ora for secondary node.

- name:                               "Oracle Data Guard - Preparation: Create the sqlnet.ora for Secondary"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              sqlnet.ora.j2
    dest:                             "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/sqlnet.ora"
    mode:                             '0644'
    force:                            true
  vars:
    hostname:  "{{ ora_secondary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"
  when:  current_host != ora_primary

- name:                               "Oracle Data Guard - Preparation: Create the sqlnet.ora for Observer"
  become:                             true
  become_user:                        root
  ansible.builtin.template:
    backup:                           true
    src:                              sqlnet.ora.j2
    dest:                             "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/sqlnet.ora"
    mode:                             '0644'
    force:                            true
  vars:
    hostname:  "{{ ora_primary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"
  when:  current_host != ora_primary


# Create the sql script for updating the data guard specific parameters for Primary node.

- name:                               "Oracle Data Guard - Preparation: Create the SQL for Dataguard parameters on Primary"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              db_parameters_for_dataguard.j2
    dest:                             "/etc/sap_deployment_automation/dataguard_scripts/db_parameters_for_dataguard.sql"
    mode:                             '0644'
    force:                            true
  vars:
    hostname:  "{{ ora_primary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"
  when:  current_host == ora_primary


# Create the tnsnames.ora for SAP.

- name:                               "Oracle Data Guard - Create TNSNAMES.ORA for SAP Application servers"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              tnsnamesforsap.j2
    dest:                             "/etc/sap_deployment_automation/dataguard_scripts/tnsnames.ora"
    mode:                             '0644'
    force:                            true
  vars:
    hostname:  "{{ ora_primary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"


# Create DB trigger sql for SAP HA Setup

- name:                               "Oracle Data Guard - Preparation: Create the SQL for  DBTrigger on  Primary"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              db_trigger.j2
    dest:                             "/etc/sap_deployment_automation/dataguard_scripts/db_trigger.sql"
    mode:                             '0644'
    force:                            true
  when:  current_host == ora_primary


- name:                               "Oracle Data Guard - Preparation: create dataguard_config.sh"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              dataguard_config.j2
    dest:                             "/etc/sap_deployment_automation/dataguard_scripts/dataguard_config.dgmgrl"
    mode:                             '0644'
    force:                            true
  when:  current_host == ora_primary

- name:                               "Oracle Data Guard - Preparation: create rman-restore.rman"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              rman-restore.j2
    dest:                             "/etc/sap_deployment_automation/dataguard_scripts/rman-restore.rman"
    mode:                             '0644'
    force:                            true
  when:
    - current_host == ora_secondary
    - node_tier == 'oracle'

- name:                               "Oracle Data Guard - Preparation: create rman-restore.rman for oracle-asm"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              rman-restore-asm.j2
    dest:                             "/etc/sap_deployment_automation/dataguard_scripts/rman-restore.rman"
    mode:                             '0644'
    force:                            true
  when:
    - current_host == ora_secondary
    - node_tier == 'oracle-asm'


- name:                                "Oracle Data Guard - Preparation: create secondary_startup.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create: true
    path: /etc/sap_deployment_automation/dataguard_scripts/secondary_startup.sql
    marker_begin: "-- BEGIN"
    marker_end:   "-- END"
    block: |
         STARTUP NOMOUNT PFILE=$ORACLE_HOME/dbs/init{{ db_sid | upper }}.ora;
         exit
    mode: '0755'
  when: current_host == ora_secondary

#  Update the Local_Listener value for Secondary Node.
- name:                                "Oracle Local Listener Update - Preparation: create listener_update.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create: true
    path: /etc/sap_deployment_automation/dataguard_scripts/listener_update.sql
    marker_begin: "-- BEGIN"
    marker_end:   "-- END"
    block: |
         alter system set LOCAL_LISTENER="(ADDRESS=(PROTOCOL=TCP)(HOST={{ ora_secondary }})(PORT=1521))" SCOPE=both;
         exit
    mode: '0755'
  when: current_host == ora_secondary


#  Update the Local_Listener value for Primary Node.
- name:                                "Oracle Local Listener Update - Preparation: create listener_update.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create: true
    path: /etc/sap_deployment_automation/dataguard_scripts/listener_update.sql
    marker_begin: "-- BEGIN"
    marker_end:   "-- END"
    block: |
         alter system set LOCAL_LISTENER="(ADDRESS=(PROTOCOL=TCP)(HOST={{ ora_primary }})(PORT=1521))" SCOPE=both;
         exit
    mode: '0755'
  when: current_host == ora_primary

# Enable Flashback for Secondary Node.

- name:                                "Oracle Local Listener Update - Preparation: create listener_update.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create: true
    path: /etc/sap_deployment_automation/dataguard_scripts/secondary_flashback_secondary.sql
    marker_begin: "-- BEGIN"
    marker_end:   "-- END"
    block: |
         ALTER DATABASE RECOVER MANAGED STANDBY DATABASE CANCEL;
         ALTER DATABASE FLASHBACK ON;
         ALTER DATABASE RECOVER MANAGED STANDBY DATABASE DISCONNECT FROM SESSION THROUGH LAST SWITCHOVER;
         exit
    mode: '0755'
  when: current_host == ora_secondary

# Create Directories for RESTORE on Secondary

- name:                                "ORACLE: Create directories"
  when:                                current_host == ora_secondary
  ansible.builtin.file:
    path:                              "{{ item.path }}"
    state:                             directory
    owner:                             oracle
    group:                             oinstall
    mode:                              "{{ item.mode }}"
  loop:
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/oraarch/{{ db_sid | upper }}arch' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/oraarch/standbylog' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/oraflash' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saptrace' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saparch' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/sapprof' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/sapcheck' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saptrace/audit' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saptrace/background' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saptrace/diag' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saptrace/usertrace' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/orawallet' }

- name:                                "Oracle Data Guard - Rescue create shutdown_secondary.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/shutdown_secondary.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
        SHUTDOWN ABORT;
        exit
    mode:                              '0755'

- name:                               "Oracle Data Guard - Preparation: Create ASM Directories for Secondary System"
  become:                             true
  become_user:                        oracle
  ansible.builtin.template:
    backup:                           true
    src:                              asmfilesystems-secondary.j2
    dest:                             "/etc/sap_deployment_automation/dataguard_scripts/asmfilesystems_secondary.sh"
    mode:                             '0755'
    force:                            true
  when:
    - current_host == ora_secondary
    - node_tier == "oracle-asm"

