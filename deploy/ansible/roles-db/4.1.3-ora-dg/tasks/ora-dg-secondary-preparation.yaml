---

# - name:                     Setting the primary and Secondary DB names
#   ansible.builtin.set_fact:
#     ora_primary:           "{{ ansible_play_hosts_all[0] }}"         # Oracle Primary Host
#     ora_secondary:         "{{ ansible_play_hosts_all[1] }}"         # Oracle Secondary Host
#     current_host:          "{{ ansible_hostname }}"
#   when:                     node_tier == "oracle"

- name:                                "Oracle Data Guard - Preparation (Secondary): Create sap_deployment_automation folder"
  become:                              true
  become_user:                         "root"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts
    mode:                              '0755'
    state:                             directory
    owner:                             oracle
    group:                             oinstall

- name:                                "Oracle Data Guard - Preparation (Secondary): create create_pfile.sql"
  become:                              true
  become_user:                         "root"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/create_pfile.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         CREATE PFILE FROM SPFILE;
         exit;
    mode:                              '0755'

- name:                                "Oracle Data Guard - Preparation (Secondary): Create PFILE on Primary DB to COPY it on SECONDARY"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell:               sqlplus / as sysdba @create_pfile.sql
  register:                            create_pfile_results
  failed_when:                         create_pfile_results.rc >= 2
  args:
    creates:                           /etc/sap_deployment_automation/dataguard_scripts/create_pfile.txt
    chdir:                             /etc/sap_deployment_automation/dataguard_scripts
    executable:                        /bin/csh
  # when:  current_host == ora_primary

- name:                                "Oracle Data Guard - Preparation (Secondary): Create create_pfile.txt"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts/create_pfile.txt
    state:                             touch
    mode:                              '0755'
  when:
    - create_pfile_results.rc >= 2
  # when:  current_host == ora_primary

# Copy the initSID.ora from primary to secondary

- name:                                "Oracle Data Guard - Preparation (Secondary): Copy initSID.ora to temp location"
  become:                              true
  become_user:                         "root"
  ansible.builtin.copy:
    src:                               "/oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/init{{ db_sid | upper }}.ora"
    dest:                              "{{ target_media_location }}/downloads/{{ db_sid | upper }}/init{{ db_sid | upper }}.ora"
    remote_src:                        true
    owner:                             oracle
    group:                             oinstall
    force:                             true
    mode:                              "{{ '0777' | int - (custom_umask | default('022') | int) }}"
#  when: current_host == ora_primary

- name:                                "Oracle Data Guard - Preparation (Secondary): Copy orapwSID to temp location"
  become:                              true
  become_user:                         "root"
  ansible.builtin.copy:
    src:                               /oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/orapw{{ db_sid | upper }}
    dest:                              "{{ target_media_location }}/downloads/{{ db_sid | upper }}/orapw{{ db_sid | upper }}"
    remote_src:                        true
    force:                             true
    owner:                             oracle
    group:                             dba
    mode:                              "{{ '0777' | int - (custom_umask | default('022') | int) }}"
#   when: current_host == ora_primary

- name:                                "Oracle Data Guard - Preparation (Secondary): Copy dbs folder to temp location"
  become:                              true
  become_user:                         "root"
  ansible.builtin.copy:
    src:                               /oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs
    dest:                              "{{ target_media_location }}/downloads/{{ db_sid | upper }}/dbs"
    remote_src:                        true
    owner:                             oracle
    group:                             oinstall
    force:                             true
    mode:                              "{{ '0777' | int - (custom_umask | default('022') | int) }}"

- name:                                "Oracle Data Guard - Preparation (Secondary): Create dbscopied.txt"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts/dbscopied.txt
    state:                             touch
    mode:                              '0755'
...
