- name:                                "4.1.3 Oracle Data Guard - Verify Data Guard configuration"
  when:                                ansible_hostname == ora_secondary
  block:


    - name:                            "4.1.3 Oracle Data Guard - Verify Data Guard configuration"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       sqlplus -s / as sysdba << EOF
                                       SET HEADING OFF
                                       SET FEEDBACK OFF
                                       SELECT open_mode FROM v\$database;
                                       EXIT;
                                       EOF
      environment:
        ORACLE_SID:                    "{{ db_sid | upper }}"
        ORACLE_HOME:                   "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
      args:
        executable:                    /bin/csh
      register:                        secondary_open_mode
      failed_when:                     false
      changed_when:                    false

    - name:                            "4.1.3 Oracle Data Guard - Secondary - Post Processing: Ensure database is mounted (not open) on Secondary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       sqlplus -s / as sysdba << EOF
                                       SHUTDOWN IMMEDIATE;
                                       STARTUP MOUNT;
                                       EXIT;
                                       EOF
      environment:
        ORACLE_SID:                    "{{ db_sid | upper }}"
        ORACLE_HOME:                   "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
      args:
        executable:                    /bin/csh
      when:                            "'MOUNTED' not in secondary_open_mode.stdout"
      register:                        mount_secondary

    - name:                            "4.1.3 Oracle Data Guard - Secondary - Post Processing: Set Log apply on on Standby"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       dgmgrl / as sysdba << EOF
                                       EDIT DATABASE {{ db_sid | upper }}_STDBY set state ='ONLINE';
                                       exit
                                       EOF
      environment:
        ORACLE_SID:                    "{{ db_sid | upper }}"
        ORACLE_HOME:                   "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
      args:
        executable:                    /bin/csh
      register:                        logapply_secondary

...
