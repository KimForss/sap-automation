---

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create sap_deployment_automation folder"
  become:                              true
  become_user:                         "root"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts
    mode:                              '0755'
    state:                             directory
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall


# /*---------------------------------------------------------------------------8
# | Prepare the sql scripts for data guard initial configuration.              |
# |                                                                            |
# |                                                                            |
# | Step 1 create the SQL scripts for DG                                       |
# +------------------------------------4--------------------------------------*/

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create enable_archive_log.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/enable_archive_log.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
        SHUTDOWN IMMEDIATE;
        STARTUP MOUNT;
        ALTER DATABASE ARCHIVELOG;
        ALTER DATABASE OPEN;
        exit
    mode:                              '0755'

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create standby_redo_logs.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/standby_redo_logs.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
        ALTER DATABASE ADD STANDBY LOGFILE '/oracle/{{ db_sid | upper }}/oraarch/standbylog/srl1.dbf' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '/oracle/{{ db_sid | upper }}/oraarch/standbylog/srl2.dbf' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '/oracle/{{ db_sid | upper }}/oraarch/standbylog/srl3.dbf' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '/oracle/{{ db_sid | upper }}/oraarch/standbylog/srl4.dbf' size 400M reuse;
        exit
    mode:                              '0755'
  when:                                node_tier == "oracle"

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create enable_forced_logging.sql"
  become:                              true
  become_user:                         oracle
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/enable_forced_logging.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         ALTER DATABASE FORCE LOGGING;
         ALTER SYSTEM SWITCH LOGFILE;
         exit
    mode:                              '0755'

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create turn_on_flashback.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/turn_on_flashback.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         ALTER DATABASE FLASHBACK ON;
         ALTER SYSTEM SET STANDBY_FILE_MANAGEMENT=AUTO;
         exit
    mode:                              '0755'

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create create_pfile.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/create_pfile.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         CREATE PFILE FROM SPFILE;
         exit
    mode:                              '0755'

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create create_spfile.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/create_spfile.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         CREATE SPFILE FROM PFILE;
         exit
    mode:                              '0755'
  when:
    - node_tier == 'oracle'

# oracle_secondary_startup.sql
- name:                                "4.1.3 Oracle Data Guard - Preparation: Create oracle_secondary_startup.sql"
  when:
    - node_tier == 'oracle'
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/oracle_secondary_startup.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
              STARTUP MOUNT;
              exit
    mode:                              '0755'

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create secondary_startup.sql"
  when:
    - node_tier == 'oracle'
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/secondary_startup.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         STARTUP NOMOUNT PFILE=$ORACLE_HOME/dbs/init{{ db_sid | upper }}.ora;
         exit
    mode:                              '0755'

- name:                                "4.1.3 Oracle Data Guard ASM - Preparation: Create standby_redo_logs.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/standby_redo_logs.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
        ALTER DATABASE ADD STANDBY LOGFILE '+ARCH' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '+ARCH' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '+ARCH' size 400M reuse;
        ALTER DATABASE ADD STANDBY LOGFILE '+ARCH' size 400M reuse;
        exit
    mode:                              '0755'
  when:                                node_tier == "oracle-asm"

- name:                                "4.1.3 Oracle Data Guard ASM - Preparation: Create flash_recovery_area_logs.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/flash_recovery_area_logs.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |

        ALTER SYSTEM SET DB_RECOVERY_FILE_DEST_SIZE=400M SCOPE=BOTH;
        ALTER SYSTEM SET DB_RECOVERY_FILE_DEST='+RECO' SCOPE=BOTH;
        exit
    mode:                              '0755'
  when:                                node_tier == "oracle-asm"

- name:                                "4.1.3 Oracle Data Guard ASM - Preparation: Create create_spfile.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/create_spfilesecondary.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         CREATE SPFILE='+DATA/{{ db_sid | upper }}_STDBY/PARAMETERFILE/spfile{{ db_sid | upper }}.ora' from pfile='/oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/init{{ db_sid | upper }}.ora';
         exit
    mode:                              '0755'
  when:
    - node_tier == 'oracle-asm'

- name:                                "4.1.3 Oracle Data Guard ASM - Preparation: Create asm_oracle_secondary_startup.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/asm_oracle_secondary_startup.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
              STARTUP MOUNT;
              exit
    mode:                              '0755'
  when:
    - node_tier == 'oracle-asm'

- name:                                "4.1.3 Oracle Data Guard - Rescue Create shutdown_secondary.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/shutdown_secondary.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
        SHUTDOWN ABORT;
        exit
    mode:                              '0755'

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create dataguard_status.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/dataguard_status.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
         SELECT INSTANCE_NAME, STATUS, DATABASE_ROLE FROM v$database, v$instance;
         exit
    mode:                              '0755'

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create enable_dataguard_broker.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/enable_dataguard_broker.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block:  |
         ALTER SYSTEM SET dg_broker_start=true;
         exit
    mode:                              '0755'

# Create the sql script for updating the data guard specific parameters for Primary node.

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create the SQL for Dataguard parameters on Primary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               db_parameters_for_dataguard.j2
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/db_parameters_for_dataguard.sql"
    mode:                              '0644'
    force:                             true
  vars:
    hostname:  "{{ ora_primary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"
  when:  current_host == ora_primary

# Create DB trigger sql for SAP HA Setup

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create the SQL for DBTrigger on Primary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               db_trigger.j2
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/db_trigger.sql"
    mode:                              '0644'
    force:                             true
  when:  current_host == ora_primary

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create secondary_startup.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create: true
    path: /etc/sap_deployment_automation/dataguard_scripts/secondary_startup.sql
    marker_begin: "-- BEGIN"
    marker_end:   "-- END"
    block: |
         STARTUP NOMOUNT PFILE=$ORACLE_HOME/dbs/init{{ db_sid | upper }}.ora;
         exit
    mode: '0755'
  when:
    - current_host == ora_secondary
    - node_tier in  'oracle'

#  Update the Local_Listener value for Secondary Node.
- name:                                "4.1.3 Oracle Data Guard - Preparation: Create listener_update.sql for Secondary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create: true
    path: /etc/sap_deployment_automation/dataguard_scripts/listener_update.sql
    marker_begin: "-- BEGIN"
    marker_end:   "-- END"
    block: |
         alter system set LOCAL_LISTENER="(ADDRESS=(PROTOCOL=TCP)(HOST={{ ora_secondary }})(PORT=1521))" SCOPE=both;
         exit
    mode: '0755'
  when: current_host == ora_secondary


#  Update the Local_Listener value for Primary Node.
- name:                                "4.1.3 Oracle Data Guard - Preparation: Create listener_update.sql for Primary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create: true
    path: /etc/sap_deployment_automation/dataguard_scripts/listener_update.sql
    marker_begin: "-- BEGIN"
    marker_end:   "-- END"
    block: |
         alter system set LOCAL_LISTENER="(ADDRESS=(PROTOCOL=TCP)(HOST={{ ora_primary }})(PORT=1521))" SCOPE=both;
         exit
    mode: '0755'
  when: current_host == ora_primary

# Enable Flashback for Secondary Node.

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create secondary_flashback_secondary.sql"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create: true
    path: /etc/sap_deployment_automation/dataguard_scripts/secondary_flashback_secondary.sql
    marker_begin: "-- BEGIN"
    marker_end:   "-- END"
    block: |
         ALTER DATABASE RECOVER MANAGED STANDBY DATABASE CANCEL;
         ALTER DATABASE FLASHBACK ON;
         ALTER DATABASE RECOVER MANAGED STANDBY DATABASE DISCONNECT FROM SESSION THROUGH LAST SWITCHOVER;
         exit
    mode: '0755'
  when:
    - current_host == ora_secondary
    - node_tier == 'oracle'

- name:                                "4.1.3 Oracle Data Guard ASM - Preparation: Create Control File"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.blockinfile:
    create:                            true
    path:                              /etc/sap_deployment_automation/dataguard_scripts/create_control_file.sql
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    block: |
        ALTER DATABASE CREATE STANDBY CONTROLFILE AS '{{ target_media_location }}/downloads/{{ db_sid | upper }}/{{ db_sid | upper }}_stdby.ctl';
        EXIT;

        exit
    mode:                              '0755'
  when:                                node_tier == "oracle-asm"

- name:                                "4.1.3 Oracle Data Guard ASM - Preparation: Create rman-restore.rman"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               rman-restore-asm.j2
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/rman-restore.rman"
    mode:                              '0644'
    force:                             true
  when:
    - current_host == ora_secondary
    - node_tier == 'oracle-asm'

# Create Listener for primary node.

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create the Listener file for Primary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               listener_primary.j2
    dest:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/listener.ora"
    mode:                              '0644'
    force:                             true
  vars:
    hostname:  "{{ ora_primary }}"
  when:  current_host == ora_primary

# Create Listener for secondary node.

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create the Listener file for Secondary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               listener_secondary.j2
    dest:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/listener.ora"
    mode:                              '0644'
    force:                             true
  vars:
    hostname:  "{{ ora_secondary }}"
  when:  current_host == ora_secondary

# Create tnsnames.ora for primary node.

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create the tnsnames file for Primary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               tnsnames_primary.j2
    dest:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/tnsnames.ora"
    mode:                              '0644'
    force:                             true
  vars:
    hostname:  "{{ ora_primary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"
  when:  current_host == ora_primary

# tnsnames for observer

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create the tnsnames file for Observer"
  become:                              true
  become_user:                         root
  ansible.builtin.template:
    backup:                            true
    src:                               tnsnames_primary.j2
    dest:                              "{{ target_media_location }}/downloads/{{ db_sid | upper }}/tnsnames.ora"
    mode:                              '0644'
    force:                             true
  vars:
    hostname:                          "{{ ora_primary }}"
    sap_dbp_hostname:                  "{{ ora_primary }}"
    sap_dbs_hostname:                  "{{ ora_secondary }}"
  when:  current_host == ora_primary

# Create tnsnames.ora for secondary node.

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create the tnsnames file for Secondary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               tnsnames_secondary.j2
    dest:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/tnsnames.ora"
    mode:                              '0644'
    force:                             true
  vars:
    hostname:  "{{ ora_secondary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"
  when:  current_host == ora_secondary

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create the sqlnet.ora for Secondary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               sqlnet.ora.j2
    dest:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/sqlnet.ora"
    mode:                              '0644'
    force:                             true
  vars:
    hostname:  "{{ ora_secondary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"
  when:  current_host != ora_primary

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create the sqlnet.ora for Observer"
  become:                              true
  become_user:                         root
  ansible.builtin.template:
    backup:                            true
    src:                               sqlnet.ora.j2
    dest:                              "{{ target_media_location }}/downloads/{{ db_sid | upper }}/sqlnet.ora"
    mode:                              '0644'
    force:                             true
  vars:
    hostname:  "{{ ora_primary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"
  when:  current_host != ora_primary

# Create the tnsnames.ora for SAP.

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create TNSNAMES.ORA for SAP Application servers"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               tnsnamesforsap.j2
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/tnsnames.ora"
    mode:                              '0644'
    force:                             true
  vars:
    hostname:  "{{ ora_primary }}"
    sap_dbp_hostname: "{{ ora_primary }}"
    sap_dbs_hostname: "{{ ora_secondary }}"

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create dataguard_config.dgmgrl"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               dataguard_config.j2
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/dataguard_config.dgmgrl"
    mode:                              '0644'
    force:                             true
  when:  current_host == ora_primary

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create rman-restore.rman"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
    backup:                            true
    src:                               rman-restore.j2
    dest:                              "/etc/sap_deployment_aut  omation/dataguard_scripts/rman-restore.rman"
    mode:                              '0644'
    force:                             true
  when:
    - current_host == ora_secondary
    - node_tier == 'oracle'

# Create Directories for RESTORE on Secondary

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create directories"
  when:
                                       - current_host == ora_secondary
                                       - node_tier == 'oracle'
  ansible.builtin.file:
    path:                              "{{ item.path }}"
    state:                             directory
    owner:                             oracle
    group:                             oinstall
    mode:                              "{{ item.mode }}"
  loop:
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/oraarch/{{ db_sid | upper }}arch' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/oraarch/standbylog' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/oraflash' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/orawallet' }

- name:                                "4.1.3 Oracle Data Guard - Preparation: Create directories"
  when:
                                       - current_host == ora_secondary
  ansible.builtin.file:
    path:                              "{{ item.path }}"
    state:                             directory
    owner:                             oracle
    group:                             oinstall
    mode:                              "{{ item.mode }}"
  loop:
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saptrace' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saparch' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/sapprof' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/sapcheck' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saptrace/audit' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saptrace/background' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saptrace/diag' }
    - { mode: '0755', path: '/oracle/{{ db_sid | upper }}/saptrace/usertrace' }


- name:                                "4.1.3 Oracle Data Guard ASM - Preparation: Create ASM Directories for Secondary System"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  when:
                                       - node_tier == "oracle-asm"
                                       - current_host == ora_secondary
  ansible.builtin.shell: |
                                       setenv ORACLE_HOME "/oracle/GRID/{{ ora_version }}";
                                       setenv ORACLE_SID "+ASM";
                                       "/oracle/GRID/{{ ora_version }}/bin/asmcmd --privilege sysdba mkdir  {{ item.path }}";
  args:
    executable:                        /bin/csh
    creates:                           /etc/sap_deployment_automation/dataguard_scripts/asm_oraarch_created.txt
  loop:
    - { path: '+DATA/{{ db_sid | upper }}' }
    - { path: '+DATA/{{ db_sid | upper }}/CONTROLFILE' }
    - { path: '+ARCH/{{ db_sid | upper }}' }
    - { path: '+ARCH/{{ db_sid | upper }}/oraarch' }
    - { path: '+ARCH/{{ db_sid | upper }}/ARCHIVELOG' }
    - { path: '+ARCH/{{ db_sid | upper }}/CONTROLFILE' }
    - { path: '+ARCH/{{ db_sid | upper }}/ONLINELOG' }
    - { path: '+RECO/{{ db_sid | upper }}' }
    - { path: '+RECO/{{ db_sid | upper }}/AUTOBACKUP' }
    - { path: '+RECO/{{ db_sid | upper }}/CONTROLFILE' }
    - { path: '+RECO/{{ db_sid | upper }}/FLASHBACK' }
  register:                            asm_oraarch_folders_created_results
  failed_when:
                                       - asm_oraarch_folders_created_results.rc != 0
                                       - not asm_oraarch_folders_created_results.stderr is search('ORA-15032|ORA-15005')
  changed_when:                        asm_oraarch_folders_created_results.rc == 0


- name:                                "4.1.3 Oracle Data Guard ASM - Preparation: Create asm_oraarch_created.txt"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts/asm_oraarch_created.txt
    state:                             touch
    mode:                              '0755'
  when:
    - node_tier == "oracle-asm"
    - current_host == ora_secondary
    - asm_oraarch_folders_created_results is defined
    - (asm_oraarch_folders_created_results.rc | default(0) == 0) | bool

...
