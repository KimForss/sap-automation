---

# In dg_duplicate/tasks/main.yml

- name:                                "4.1.3 Oracle Data Guard - Duplicate - Check if standby already restored"
  when:                                node_tier == "oracle-asm"
  become_user:                         "{{ oracle_user_name }}"
  become:                              true
  ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       /oracle/{{ db_sid | upper }}/{{ ora_version }}/bin/sqlplus -S sys/'{{ main_password }}'@{{ db_sid | upper }}_STDBY as sysdba <<EOF
                                       SET PAGESIZE 0 FEEDBACK OFF
                                       SELECT COUNT(*) FROM v\$datafile WHERE name LIKE '+DATA/{{ db_sid | upper }}_STDBY%';
                                       EXIT;
                                       EOF
  register:                            datafile_count
  args:
    chdir:                             "/etc/sap_deployment_automation/dataguard_scripts/"
    executable:                        /bin/csh
  changed_when:                        false
  failed_when:                         false

- name:                                "4.1.3 Oracle Data Guard - Duplicate - Check if standby already restored"
  when:                                node_tier == "oracle"
  become_user:                         "{{ oracle_user_name }}"

  become:                              true
  ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       /oracle/{{ db_sid | upper }}/{{ ora_version }}/bin/sqlplus -S sys/'{{ main_password }}'@{{ db_sid | upper }}_STDBY as sysdba <<EOF
                                       SET PAGESIZE 0 FEEDBACK OFF
                                       SELECT COUNT(*) FROM v\$datafile;
                                       EXIT;
                                       EOF
  register:                            datafile_count
  args:
    chdir:                             "/etc/sap_deployment_automation/dataguard_scripts/"
    executable:                        /bin/csh
  changed_when:                        false
  failed_when:                         false

- name:                                "4.1.3 Oracle Data Guard - Duplicate - Determine if RMAN duplicate is required"
  ansible.builtin.set_fact:
    rman_duplicate_required:           "{%if not datafile_count.stdout is defined %}True{% else %} ((datafile_count.stdout | trim | int == 0) or (datafile_count.stdout is search('ORA-01507')) | bool) {% endif %}"

- name:                                "4.1.3 Oracle Data Guard - Duplicate - Startup standby if not 'Running'"
  when:
    - datafile_count.stdout is defined
    - datafile_count.stdout is search('ORA-01034')
  block:
    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Start standby instance in NOMOUNT using PFile"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       setenv ORACLE_HOME /oracle/{{ db_sid | upper }}/{{ ora_version }}
                                       /oracle/{{ db_sid | upper }}/{{ ora_version }}/bin/sqlplus -s sys/'{{ main_password }}'@{{ db_sid | upper }}_STDBY as sysdba <<EOF
                                       STARTUP NOMOUNT PFILE='/oracle/{{ db_sid | upper }}/{{ ora_version }}/dbs/init{{ db_sid | upper }}_STDBY.ora';
                                       EXIT;
                                       EOF
      register:                        startup_result
      failed_when:                     startup_result.rc != 0
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh

- name:                                "4.1.3 Oracle Data Guard - Duplicate - Show if rman run is required"
  ansible.builtin.debug:
    msg:
     - "Database duplication required: {{ rman_duplicate_required }}"


- name:                                "4.1.3 Oracle Data Guard - Configure Data Guard"
  when:
    - rman_duplicate_required
  block:

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Duplicate database using RMAN"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       rman TARGET sys/'{{ main_password }}'@{{ db_sid | upper }} AUXILIARY sys/'{{ main_password }}'@{{ db_sid | upper }}_STDBY <<EOF
                                       DUPLICATE TARGET DATABASE FOR STANDBY FROM ACTIVE DATABASE DORECOVER NOFILENAMECHECK;
                                       EXIT;
                                       EOF
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh
      register:                        rman_duplicate
      failed_when:                     rman_duplicate.rc != 0

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Show output from rman DUPLICATE"
      ansible.builtin.debug:
        msg:                           "rman DUPLICATE results: {{ rman_duplicate.stdout }}"
        verbosity:                     2
      when:
        - rman_duplicate.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Save RMAN log"
      ansible.builtin.copy:
        dest:                          /etc/sap_deployment_automation/dataguard_scripts/rman_duplicate_{{ ansible_date_time.epoch }}.log
        content:                       "{{ rman_duplicate.stdout }}"
        mode:                          '0777'
      when:                            rman_duplicate.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Verify DUPLICATE completion"
      ansible.builtin.assert:
        that:                          rman_duplicate.stdout is search("Finished Duplicate Db")
        fail_msg:                      "rman DUPLICATE did not complete successfully"
      when:
        - rman_duplicate.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard  - Duplicate - Restart standby database"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       setenv ORACLE_HOME /oracle/{{ db_sid | upper }}/{{ ora_version }}

                                       $ORACLE_HOME/bin/sqlplus -s sys/'{{ main_password }}'@{{ db_sid | upper }}_STDBY as sysdba <<EOF
                                       SET PAGESIZE 0 FEEDBACK OFF
                                       SHUTDOWN IMMEDIATE;
                                       STARTUP MOUNT;
                                       EXIT;
                                       EOF

      register:                        db_restart
      changed_when:                    false
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh
  rescue:

    - name:                            "4.1.3 Oracle Data Guard  - Duplicate - Rescue - Stop standby database"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       setenv ORACLE_HOME /oracle/{{ db_sid | upper }}/{{ ora_version }}

                                       $ORACLE_HOME/bin/sqlplus -s sys/'{{ main_password }}'@{{ db_sid | upper }}_STDBY as sysdba <<EOF
                                       SET PAGESIZE 0 FEEDBACK OFF
                                       SHUTDOWN IMMEDIATE;
                                       EXIT;
                                       EOF

      register:                        db_stop_rescue
      changed_when:                    false
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Rescue - Check for zombie standby processes"
      ansible.builtin.shell: |
                                       set -o pipefail
                                       ps -ef | grep ora_pmon_{{ db_sid }}_STDBY
      register:                        standby_pmon
      changed_when:                    false

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Rescue - Kill zombie standby processes"
      become:                          true
      become_user:                     root
      ansible.builtin.shell:           kill -9 {{ item.split()[1] }}
      loop:                            "{{ standby_pmon.stdout_lines }}"
      when:                            standby_pmon.stdout | length > 0
      failed_when:                     false

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Rescue - Clean orphaned shared memory segments"
      become:                          true
      become_user:                     root
      ansible.builtin.shell: |
                                       set -o pipefail
                                       for seg in $(ipcs -m | grep {{ oracle_user_name }} | awk '$6==0 {print $2}'); do
                                         ipcrm -m $seg
                                       done
      failed_when:                     false
      when:                            standby_pmon.stdout | length > 0

    - name:                            "4.1.3 Oracle Data Guard  - Duplicate - Rescue - Start standby database"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       setenv ORACLE_HOME /oracle/{{ db_sid | upper }}/{{ ora_version }}

                                       $ORACLE_HOME/bin/sqlplus -s sys/'{{ main_password }}'@{{ db_sid | upper }}_STDBY as sysdba <<EOF
                                       SET PAGESIZE 0 FEEDBACK OFF
                                       STARTUP NOMOUNT;
                                       EXIT;
                                       EOF

      register:                        db_restart_rescue
      changed_when:                    false
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Duplicate database using RMAN"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       rman TARGET sys/'{{ main_password }}'@{{ db_sid | upper }} AUXILIARY sys/'{{ main_password }}'@{{ db_sid | upper }}_STDBY <<EOF
                                       DUPLICATE TARGET DATABASE FOR STANDBY FROM ACTIVE DATABASE DORECOVER NOFILENAMECHECK;
                                       EXIT;
                                       EOF
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh
      register:                        rman_duplicate_rescue
      failed_when:                     rman_duplicate_rescue.rc != 0

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Show output from rman DUPLICATE"
      ansible.builtin.debug:
        msg:                           "rman DUPLICATE results: {{ rman_duplicate_rescue.stdout }}"
        verbosity:                     2
      when:
        - rman_duplicate_rescue.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Save RMAN log"
      ansible.builtin.copy:
        dest:                          /etc/sap_deployment_automation/dataguard_scripts/rman_duplicate_{{ ansible_date_time.epoch }}.log
        content:                       "{{ rman_duplicate_rescue.stdout }}"
        mode:                          '0777'
      when:                            rman_duplicate_rescue.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Verify DUPLICATE completion"
      ansible.builtin.assert:
        that:                          rman_duplicate_rescue.stdout is search("Finished Duplicate Db")
        fail_msg:                      "rman DUPLICATE did not complete successfully"
      when:
        - rman_duplicate_rescue.stdout is defined


    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Sleep after restart standby database"
      ansible.builtin.pause:
        seconds:                       30

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Check standby database mounted"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       setenv ORACLE_HOME /oracle/{{ db_sid | upper }}/{{ ora_version }}

                                       $ORACLE_HOME/bin/sqlplus -s sys/'{{ main_password }}'@{{ db_sid | upper }}_STDBY as sysdba <<EOF
                                       SET PAGESIZE 0 FEEDBACK OFF
                                       SELECT database_role || ':' || open_mode FROM v\$database;
                                       EXIT;
                                       EOF

      register:                        db_status
      changed_when:                    false
      failed_when:                     "'PHYSICAL STANDBY:MOUNTED' not in db_status.stdout"
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Show Check standby database mounted output"
      ansible.builtin.debug:
        msg:                           "Database mount information: {{ db_status.stdout }}"
        verbosity:                     2

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Save Check standby database mounted"
      ansible.builtin.copy:
        dest:                          /etc/sap_deployment_automation/dataguard_scripts/check_standby_database_mounted_{{ ansible_date_time.epoch }}.log
        content:                       "{{ db_status.stdout }}"
        mode:                          '0777'
      when:                            db_status.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Set Data Guard configuration status"
      ansible.builtin.set_fact:
        secondary_dg_configured:       "{{ 'PHYSICAL STANDBY:MOUNTED' in db_status.stdout }}"

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Display Data Guard status"
      ansible.builtin.debug:
        msg:
          - "Database instance:        {{ ansible_hostname }}"
          - "Data guard configured:    {{ secondary_dg_configured }}"

    - name:                            "4.1.3 Oracle Data Guard - Duplicate - Set Archive LOG on Oracle Secondary DB"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       setenv ORACLE_HOME /oracle/{{ db_sid | upper }}/{{ ora_version }}
                                       sqlplus -s sys/'{{ main_password }}'@{{ db_sid | upper }}_STDBY as sysdba << EOF
                                       WHENEVER SQLERROR EXIT SQL.SQLCODE
                                       ALTER DATABASE ARCHIVELOG;
                                       ALTER DATABASE OPEN;
                                       exit
                                       EOF
      environment:
        ORACLE_SID:                    "{{ db_sid | upper }}_STDBY"
        ORACLE_HOME:                   "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
      args:
        executable:                    /bin/csh
      register:                        archive_log_secondary
      failed_when:                     archive_log_secondary.rc != 0
      changed_when:                    archive_log_secondary.rc == 0

