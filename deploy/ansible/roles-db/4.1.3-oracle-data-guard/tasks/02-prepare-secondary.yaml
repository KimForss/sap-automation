---

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Deploy standby tnsnames.ora"
  ansible.builtin.template:
    src:                               tnsnames_secondary.ora.j2
    dest:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/tnsnames.ora"
    owner:                             "{{ oracle_user_name }}"
    group:                             "{{ oracle_group }}"
    mode:                              '0644'

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Create the sqlnet.ora for Secondary"
  ansible.builtin.template:
    src:                               secondary_sqlnet.ora.j2
    dest:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/network/admin/sqlnet.ora"
    owner:                             "{{ oracle_user_name }}"
    group:                             "{{ oracle_group }}"
    mode:                              '0644'
    force:                             true

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Configure static listener registration"
  ansible.builtin.template:
    src:                               listener_secondary.ora.j2
    dest:                              "/oracle/GRID/{{ ora_version }}/network/admin/listener.ora"
    owner:                             "{{ oracle_user_name }}"
    group:                             "{{ oracle_group }}"
    mode:                              '0644'
  register:                            listener_config

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Reload listener"
  become_user:                         "{{ oracle_user_name }}"
  become:                              true
  ansible.builtin.shell: |
                                       /oracle/GRID/{{ ora_version }}/bin/lsnrctl reload
  when:                                listener_config.changed
  environment:
    ORACLE_HOME:                       "/oracle/GRID/{{ ora_version }}"
    ORACLE_SID:                        "{{ db_sid | upper }}"
  args:
    chdir:                             "/oracle/GRID/{{ ora_version }}/bin"
    executable:                        /bin/csh

- name:                                "4.1.3 Oracle Data Guard - Set Variables"
  ansible.builtin.set_fact:
    pga_temp_l4tb_std:                 "{{ ((ansible_memory_mb.real.total * 0.60 ) * 0.2) | round | int }}"
    pga_temp_l4tb_dis:                 "{{ ((ansible_memory_mb.real.total * 0.80 ) * 0.2) | round | int }}"

- name:                                "4.1.3 Oracle Data Guard - Set the SGA and PGA Sizes for RAM < 4TB"
  ansible.builtin.set_fact:
    main_mem1:                         "{{ ansible_memory_mb.real.total }}"
    ora_sga:                           "{{ (ansible_memory_mb.real.total * 0.60) | round | int }}"
    ora_pga:                           "{{ [(pga_temp_l4tb_std | int), 4194304] | min }}"
  when:
    - ansible_memory_mb.real.total < 4194304

- name:                                "4.1.3 Oracle Data Guard - Set the SGA and PGA Sizes for RAM > 4TB"
  ansible.builtin.set_fact:
    ora_sga:                           "{{ (ansible_memory_mb.real.total * 0.65) | round | int }}"
    ora_pga:                           "{{ ((ansible_memory_mb.real.total*0.65)*0.2) | round | int }}"
  when:
    - ansible_memory_mb.real.total > 4194304

- name:                                "4.1.3 Oracle Data Guard - Show Main Memory"
  ansible.builtin.debug:
      msg:
      - "Total memory:         {{ main_mem1 }}"
      - "sga_max_size:         {{ ora_sga }}"
      - "pga_aggregate_target: {{ ora_pga }}"

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Create standby initialization file"
  ansible.builtin.template:
    src:                               init_standby.ora.j2
    dest:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/dbs/init{{ db_sid | upper }}_STDBY.ora"
    owner:                             "{{ oracle_user_name }}"
    group:                             "{{ oracle_group }}"
    mode:                              '0644'
  vars:
    sga_max_size:                      "{{ ora_sga }}M"
    pga_aggregate_target:              "{{ ora_pga }}M"

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Check for zombie standby processes"
  ansible.builtin.shell: |
                                       set -o pipefail
                                       ps -ef | grep ora_pmon_{{ db_sid }}_STDBY | grep -v 'grep' || true
  register:                            standby_pmon
  changed_when:                        false

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Kill zombie standby processes"
  become:                              true
  become_user:                         root
  ansible.builtin.shell:               kill -9 {{ item.split()[1] }}
  loop:                                "{{ standby_pmon.stdout_lines }}"
  when:                                standby_pmon.stdout | length > 0
  failed_when:                         false

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Clean orphaned shared memory segments"
  become:                              true
  become_user:                         root
  ansible.builtin.shell: |
                                       set -o pipefail
                                       for seg in $(ipcs -m | grep {{ oracle_user_name }} | awk '$6==0 {print $2}'); do
                                         ipcrm -m $seg
                                       done
  failed_when:                         false
  when:                                standby_pmon.stdout | length > 0

  ###################################
  #
  # WHENEVER SQLERROR EXIT SQL.SQLCODE
  # STARTUP NOMOUNT PFILE='/oracle/{{ db_sid | upper }}/{{ ora_version }}/dbs/init{{ db_sid | upper }}_STDBY.ora';
  # ALTER SYSTEM REGISTER;
  # EXIT;
  #
  ###################################

- name:                                "4.1.3 Oracle Data Guard -  Configure Start standby instance in NOMOUNT SQL script"
  ansible.builtin.template:
    src:                               start_standby_instance.sql.j2
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/start_standby_instance.sql"
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall
    mode:                              '0644'

  ###################################
  #
  # Start the standby instance in NOMOUNT
  #
  # WHENEVER SQLERROR EXIT SQL.SQLCODE
  # STARTUP NOMOUNT PFILE='/oracle/{{ db_sid | upper }}/{{ ora_version }}/dbs/init{{ db_sid | upper }}_STDBY.ora';
  # ALTER SYSTEM REGISTER;
  # EXIT;
  #
  ###################################

- name:                                "4.1.3 Oracle Data Guard - Start standby instance in NOMOUNT"
  block:
    - name:                            "4.1.3 Oracle Data Guard - Prepare Secondary - Start standby instance in NOMOUNT"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       /oracle/{{ db_sid | upper }}/{{ ora_version }}/bin/sqlplus -s / as sysdba @start_standby_instance.sql
      register:                        startup_result
      failed_when:                     startup_result.rc != 0
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/standby_started.txt
  rescue:
    - name:                            "4.1.3 Oracle Data Guard - Prepare Secondary - Shutdown standby instance after failed startup attempt"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       /oracle/GRID/{{ ora_version }}/bin/sqlplus -s / as sysdba <<EOF
                                       SHUTDOWN IMMEDIATE;
                                       EXIT;
                                       EOF
      register:                        shutdown_result
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Show Shutdown Result"
      ansible.builtin.debug:
        msg:                           shutdown_result.stdout
        verbosity:                     2

    - name:                            "4.1.3 Oracle Data Guard - Prepare Secondary - Start standby instance in NOMOUNT"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       /oracle/{{ db_sid | upper }}/{{ ora_version }}/bin/sqlplus -s / as sysdba @start_standby_instance.sql
      register:                        startup_result
      failed_when:                     startup_result.rc != 0
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/standby_started.txt

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Verify standby instance running"
  ansible.builtin.shell: |
                                       set -o pipefail
                                       ps -ef | grep ora_pmon_{{ db_sid | upper }}_STDBY
  register:                            verify_pmon
  changed_when:                        false
  failed_when:                         verify_pmon.stdout | length == 0

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Verify standby instance running"
  ansible.builtin.debug:
    msg:                               verify_pmon.stdout
    verbosity:                         2

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Verify standby instance running"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts/standby_started.txt
    state:                             touch
    owner:                             "{{ oracle_user_name }}"
    mode:                              '0644'
    group:                             oinstall

...
