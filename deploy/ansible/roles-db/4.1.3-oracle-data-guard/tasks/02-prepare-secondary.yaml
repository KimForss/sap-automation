- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Verify standby instance running"
  ansible.builtin.shell: |
                                       set -o pipefail
                                       ps -ef | grep ora_pmon_{{ db_sid | upper }}
  register:                            verify_pmon
  changed_when:                        false
  failed_when:                         verify_pmon.stdout | length == 0

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Verify standby instance running"
  ansible.builtin.debug:
    msg:                               verify_pmon.stdout
    verbosity:                         2

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Reload listener"
  become_user:                         "{{ oracle_user_name }}"
  become:                              true
  ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       /oracle/{{ db_path }}/{{ ora_version }}/bin/lsnrctl reload
  environment:
    ORACLE_HOME:                       "/oracle/{{ db_path }}/{{ ora_version }}"
    ORACLE_SID:                        "{{ db_sid | upper }}_STDBY"
  args:
    chdir:                             "/oracle/{{ db_path }}/{{ ora_version }}/bin"
    executable:                        /bin/csh
  register:                            listener_reload_results
  failed_when:
                                      - listener_reload_results.rc not in [0, 1]

- name:                                "4.1.3 Oracle Data Guard - Prepare Secondary - Ensure listener is started"
  become_user:                         "{{ grid_user_name }}"
  become:                              true
  ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       setenv ORACLE_HOME /oracle/{{ db_path | upper }}/{{ ora_version }}

                                       /oracle/{{ db_path }}/{{ ora_version }}/bin/lsnrctl start
  environment:
    ORACLE_HOME:                       "/oracle/{{ db_path }}/{{ ora_version }}"
    ORACLE_SID:                        "{{ db_sid | upper }}_STDBY"
  args:
    chdir:                             "/oracle/{{ db_path }}/{{ ora_version }}/bin"
    executable:                        /bin/csh
  register:                            listener_start_results
  failed_when:
                                      - listener_start_results.rc not in [0, 1]
                                      - "'TNS-01106' not in listener_start_results.stdout"

...
