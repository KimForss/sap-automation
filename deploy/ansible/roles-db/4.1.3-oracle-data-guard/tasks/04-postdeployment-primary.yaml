---


- name:                                "4.1.3 Oracle Data Guard - Post deployment on Primary - Configure Data Guard parameters on primary for Oracle ASM"
  when:                                node_tier == "oracle-asm"
  become_user:                         "{{ oracle_user_name }}"
  become:                              true
  ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                       $ORACLE_HOME/bin/sqlplus -s / as sysdba <<EOF
                                       WHENEVER SQLERROR EXIT SQL.SQLCODE
                                       ALTER SYSTEM SET DB_RECOVERY_FILE_DEST_SIZE='{{ db_recovery_file_dest_size }}';
                                       ALTER SYSTEM SET DG_BROKER_CONFIG_FILE1 = '+DATA/DG_CONFIG/dg_broker1.dat' SCOPE=BOTH;
                                       ALTER SYSTEM SET DG_BROKER_CONFIG_FILE2 = '+DATA/DG_CONFIG/dg_broker2.dat' SCOPE=BOTH;

                                       ALTER SYSTEM SET DG_BROKER_START = true;
                                       EXIT;
                                       EOF
  register:                            dg_standby_config_asm
  failed_when:                         dg_standby_config_asm.rc != 0
  args:
      chdir:                           "/etc/sap_deployment_automation/dataguard_scripts/"
      executable:                      /bin/csh

- name:                                "4.1.3 Oracle Data Guard - Post deployment on Primary - Ensure database is open on Primary"
  become_user:                         "{{ oracle_user_name }}"
  become:                              true
  ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}
                                       $ORACLE_HOME/bin/sqlplus -s / as sysdba <<EOF
                                       WHENEVER SQLERROR EXIT SQL.SQLCODE
                                       ALTER DATABASE OPEN;
                                       EXIT;
                                       EOF
  register:                            open_database
  failed_when:                         open_database.rc != 0 and 'ORA-01531' not in open_database.stdout
  args:
    chdir:                             "/etc/sap_deployment_automation/dataguard_scripts/"
    executable:                        /bin/csh

- name:                                "4.1.3 Oracle Data Guard - Post deployment on Primary - Enable log shipping on primary"
  become_user:                         "{{ oracle_user_name }}"
  become:                              true
  ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}
                                       $ORACLE_HOME/bin/sqlplus -s / as sysdba <<EOF
                                       WHENEVER SQLERROR EXIT SQL.SQLCODE
                                       ALTER SYSTEM SET LOG_ARCHIVE_DEST_STATE_2='ENABLE' SCOPE=BOTH;
                                       ALTER SYSTEM SWITCH LOGFILE;
                                       EXIT;
                                       EOF
  register:                            enable_shipping
  failed_when:                         enable_shipping.rc != 0
  args:
    chdir:                             "/etc/sap_deployment_automation/dataguard_scripts/"
    executable:                        /bin/csh

- name:                                "4.1.3 Oracle Data Guard - Post deployment on Primary - Show enable log shipping on primary"
  ansible.builtin.debug:
    var:                               enable_shipping.stdout_lines
    verbosity:                         2

- name:                                "4.1.3 Oracle Data Guard - Post deployment on Primary - Save enable log shipping on primary results"
  ansible.builtin.copy:
    dest:                              /etc/sap_deployment_automation/dataguard_scripts/enable_shipping_{{ ansible_date_time.epoch }}.log
    content:                           "{{ enable_shipping.stdout }}"
    mode:                              '0777'
  when:                                enable_shipping.stdout is defined

- name:                                "4.1.3 Oracle Data Guard - Post deployment on Primary - Verify Data Guard configuration"
  when:                                ansible_hostname == ora_primary
  block:

    - name:                            "4.1.3 Oracle Data Guard - Post deployment on Primary - Check if database is open on Primary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       sqlplus -s / as sysdba << EOF
                                       SET HEADING OFF
                                       SET FEEDBACK OFF
                                       SELECT open_mode FROM v\$database;
                                       EXIT;
                                       EOF
      environment:
        ORACLE_SID:                    "{{ db_sid | upper }}"
        ORACLE_HOME:                   "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
      args:
        executable:                    /bin/csh
      register:                        primary_open_mode
      failed_when:                     "'READ WRITE' not in primary_open_mode.stdout"
      changed_when:                    false

    - name:                            "4.1.3 Oracle Data Guard - Post deployment on Primary - Ensure database is open on Primary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       sqlplus -s / as sysdba << EOF
                                       ALTER DATABASE OPEN;
                                       EXIT;
                                       EOF
      environment:
        ORACLE_SID:                    "{{ db_sid | upper }}"
        ORACLE_HOME:                   "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
      args:
        executable:                    /bin/csh
      when:                            "'READ WRITE' not in primary_open_mode.stdout"
      register:                        open_primary
      failed_when:                     open_primary.rc != 0 and 'ORA-01531' not in open_primary.stderr

    - name:                            "4.1.3 Oracle Data Guard - Post deployment on Primary - Check if Data Guard Broker configuration exists on Primary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       dgmgrl / as sysdba << EOF
                                       SHOW CONFIGURATION
                                       EOF
      failed_when:                     false
      changed_when:                    false
      register:                        dgconfig_check
      args:
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Post deployment on Primary - Create Data Guard Configuration on Primary"
      when:                            "'ORA-16532' in dgconfig_check.stdout or 'ORA-16596' in dgconfig_check.stdout"
      # ORA-16532: Oracle Data Guard broker configuration does not exist
      # ORA-16596: member not part of the Oracle Data Guard broker configuration
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       dgmgrl / as sysdba << EOF
                                       CREATE CONFIGURATION {{ db_sid | upper }}_dg_config AS PRIMARY DATABASE IS {{ db_sid | upper }} CONNECT IDENTIFIER IS {{ db_sid | upper }};
                                       ENABLE CONFIGURATION;

                                       exit;
                                       EOF
      register:                        dgconfig_results
      failed_when:                     dgconfig_results.rc > 0
      args:
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Post deployment on Primary - Enable Data Guard Broker on Primary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       sqlplus -s / as sysdba << EOF
                                       ALTER SYSTEM SET dg_broker_start=true;
                                       EXIT;
                                       EOF
      register:                        dg_broker_primary_results
      failed_when:                     dg_broker_primary_results.rc > 0
      args:
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Post deployment on Primary - Create HA Service on Primary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       sqlplus -s / as sysdba << EOF

                                       EXEC DBMS_SERVICE.CREATE_SERVICE(service_name=>'{{ db_sid | upper }}_HA',network_name=>'{{ db_sid | upper }}_HA');
                                       EXEC DBMS_SERVICE.START_SERVICE('{{ db_sid | upper }}_HA');
                                       EXIT;
                                       EOF
      register:                        dg_broker_primary_results
      failed_when:                     dg_broker_primary_results.rc > 0
      args:
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Post deployment on Primary - Create Database Trigger"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
                                       sqlplus -s / as sysdba << EOF

                                       CREATE OR REPLACE TRIGGER {{ db_sid | lower }}_HA_SERVICE
                                         after startup on database
                                         DECLARE
                                         role VARCHAR(30);
                                         BEGIN
                                           SELECT DATABASE_ROLE INTO role FROM V\$DATABASE;
                                           IF role = 'PRIMARY' THEN
                                             DBMS_SERVICE.START_SERVICE('{{ db_sid | upper }}_HA');
                                           END IF;
                                         END;
                                       /
                                       EXIT;
                                       EOF
      register:                        dg_broker_primary_results
      failed_when:                     dg_broker_primary_results.rc > 0
      args:
        executable:                    /bin/csh

...
