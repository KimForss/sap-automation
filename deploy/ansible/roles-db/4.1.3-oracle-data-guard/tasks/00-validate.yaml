---

- name:                                "4.1.3 Oracle Data Guard - Setup Primary: - Test network connectivity to peer"
  ansible.builtin.wait_for:
    host:                              "{{ hostvars[item]['ansible_host'] }}"
    port:                              "{{ listener_port }}"
    timeout:                           10
  loop:                                 "{{ ansible_play_hosts_all }}"
  when:                                item != inventory_hostname
  delegate_to:                         localhost

- name:                                "4.1.3 Oracle Data Guard - Create ASM status SQL script"
  ansible.builtin.template:
    src:                               check_asm_status.j2
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/01_check_asm_status.sql"
    owner:                             "{{ grid_user_name }}"
    group:                             oinstall
    mode:                              '0644'

- name:                                "4.1.3 Oracle Data Guard - Check ASM status"
  become_user:                         "{{ grid_user_name }}"
  become:                              true
  ansible.builtin.shell: |
                                       setenv ORACLE_HOME /oracle/GRID/{{ ora_version }}
                                       setenv ORACLE_SID +ASM
                                       setenv PATH /oracle/GRID/{{ ora_version }}/bin:$PATH
                                       $ORACLE_HOME/bin/sqlplus / as sysasm @01_check_asm_status.sql
  register:                            asm_status
  changed_when:                        false
  args:
    chdir:                             "/etc/sap_deployment_automation/dataguard_scripts/"
    executable:                        /bin/csh

- name:                                "4.1.3 Oracle Data Guard - Setup Primary: -Validate ASM diskgroups mounted"
  ansible.builtin.debug:
    var:                               asm_status

  when:
    - asm_status is defined

- name:                                "4.1.3 Oracle Data Guard - Setup Primary: -Validate ASM diskgroups mounted"
  ansible.builtin.assert:
    that:                              "'MOUNTED' in asm_status.stdout"
    fail_msg:                          "ASM diskgroups not mounted"
  when:
    - asm_status is defined

- name:                                "4.1.3 Oracle Data Guard - Configure verify Data Guard configuration SQL script"
  ansible.builtin.template:
    src:                               verify_data_guard_configuration.sql.j2
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/16_verify_data_guard_configuration.sql"
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall
    mode:                              '0644'

- name:                                "4.1.3 Oracle Data Guard -  Check if Data Guard is configured"
  when:                                ansible_hostname == ora_primary
  block:
    - name:                            "4.1.3 Oracle Data Guard - Verify Data Guard configuration on Primary {{ ansible_hostname }}"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                      setenv ORACLE_SID {{ item.sid }}
                                      $ORACLE_HOME/bin/sqlplus -s / as sysdba @16_verify_data_guard_configuration.sql
      loop:
        - { sid: "{{ db_sid | upper }}", host: "primary" }
      register:                        dg_status
      changed_when:                    false
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Display Data Guard status"
      ansible.builtin.debug:
        msg:                           "{{ item.stdout_lines }}"
      loop:                            "{{ dg_status.results }}"
      when:                            item.skipped is not defined


- name:                                "4.1.3 Oracle Data Guard -  Check if Data Guard is configured"
  when:                                ansible_hostname == ora_secondary
  block:
    - name:                            "4.1.3 Oracle Data Guard - Verify Data Guard configuration on Secondary {{ ansible_hostname }}"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                      setenv ORACLE_SID {{ item.sid }}
                                      $ORACLE_HOME/bin/sqlplus -s / as sysdba @16_verify_data_guard_configuration.sql
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh
      loop:
        - { sid: "{{ db_sid | upper }}_STDBY", host: "standby" }
      register:                        dg_status
      changed_when:                    false

    - name:                            "4.1.3 Oracle Data Guard - Display Data Guard status"
      ansible.builtin.debug:
        msg:                           "{{ item.stdout_lines }}"
      loop:                            "{{ dg_status.results }}"
      when:                            item.skipped is not defined

- name:                            "4.1.3 Oracle Data Guard - Verify Data Guard configuration on Secondary {{ ansible_hostname }}"
  ansible.builtin.fail:
    msg:                               "Data Guard configuration verification failed on {{ ansible_hostname }}"

...
