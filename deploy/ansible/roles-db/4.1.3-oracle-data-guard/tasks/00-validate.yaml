---

- name:                                "4.1.3 Oracle Data Guard - Setup Primary: - Test network connectivity to peer"
  ansible.builtin.wait_for:
    host:                              "{{ hostvars[item]['ansible_host'] }}"
    port:                              "{{ listener_port }}"
    timeout:                           10
  loop:                                 "{{ ansible_play_hosts_all }}"
  when:                                item != inventory_hostname
  delegate_to:                         localhost

- name:                                "4.1.3 Oracle Data Guard - Check ASM status"
  become_user:                         "{{ grid_user_name }}"
  become:                              true
  ansible.builtin.shell: |
                                       setenv ORACLE_HOME /oracle/GRID/{{ ora_version }}
                                       setenv ORACLE_SID +ASM
                                       $ORACLE_HOME/bin/sqlplus -S / as sysasm @01_check_asm_status.sql <<EOF
                                       SET PAGESIZE 0 FEEDBACK OFF
                                       SELECT name || ':' || state FROM v\$asm_diskgroup;
                                       EXIT;
                                       EOF

  register:                            asm_status
  changed_when:                        false
  args:
    chdir:                             "/etc/sap_deployment_automation/dataguard_scripts/"
    executable:                        /bin/csh

- name:                                "4.1.3 Oracle Data Guard - Setup Primary: -Validate ASM diskgroups mounted"
  ansible.builtin.debug:
    var:                               asm_status

  when:
    - asm_status is defined

- name:                                "4.1.3 Oracle Data Guard - Setup Primary: -Validate ASM diskgroups mounted"
  ansible.builtin.assert:
    that:                              "'MOUNTED' in asm_status.stdout"
    fail_msg:                          "ASM diskgroups not mounted"
  when:
    - asm_status is defined

- name:                                "4.1.3 Oracle Data Guard -  Check if Data Guard is configured"
  when:                                ansible_hostname == ora_primary
  block:

    - name:                            "4.1.3 Oracle Data Guard - Set Data Guard configuration status"
      ansible.builtin.set_fact:
        db_sid_primary:                "{{ db_sid | upper }}"

    - name:                            "4.1.3 Oracle Data Guard - Verify Data Guard configuration on Primary {{ ansible_hostname }}"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                       setenv ORACLE_SID {{ db_sid | upper }}
                                       $ORACLE_HOME/bin/sqlplus -S / as sysdba <<EOF
                                       SET PAGESIZE 0 FEEDBACK OFF HEADING OFF
                                       SELECT database_role || ',' || open_mode || ',' || db_unique_name FROM v\$database;
                                       EXIT;
                                       EOF

      register:                        dg_status
      changed_when:                    false
      failed_when:                     false
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Set Data Guard configuration status"
      ansible.builtin.set_fact:
        primary_dg_configured:         "{{ (dg_status.stdout | default('UNKNOWN')) is search('PRIMARY') }}"

    - name:                            "4.1.3 Oracle Data Guard - Display Data Guard status"
      ansible.builtin.debug:
        msg:
          - "Database instance:        {{ ansible_hostname }}"
          - "Database role:            {{ dg_status.stdout | default('UNKNOWN') }}"

- name:                                "4.1.3 Oracle Data Guard -  Check if Data Guard is configured"
  when:                                ansible_hostname == ora_secondary
  block:
    - name:                            "4.1.3 Oracle Data Guard - Set Data Guard configuration status"
      ansible.builtin.set_fact:
        db_sid_secondary:               "{{ db_sid | upper }}_STDBY"

    - name:                            "4.1.3 Oracle Data Guard - Verify Data Guard configuration on Secondary {{ ansible_hostname }}"
      become_user:                     "{{ oracle_user_name }}"
      become:                          true
      ansible.builtin.shell: |
                                      setenv ORACLE_SID {{ db_sid | upper }}_STDBY
                                      $ORACLE_HOME/bin/sqlplus -S / as sysdba <<EOF
                                       SET PAGESIZE 0 FEEDBACK OFF HEADING OFF
                                       SELECT database_role || ',' || open_mode || ',' || db_unique_name FROM v\$database;
                                       EXIT;
                                       EOF
      args:
        chdir:                         "/etc/sap_deployment_automation/dataguard_scripts/"
        executable:                    /bin/csh
      register:                        dg_status
      changed_when:                    false
      failed_when:                     false

    - name:                            "4.1.3 Oracle Data Guard - Display Data Guard status"
      ansible.builtin.debug:
        msg:                           "Database role: {{ dg_status.stdout | default('UNKNOWN') }}"

    - name:                            "4.1.3 Oracle Data Guard - Set Data Guard configuration status"
      ansible.builtin.set_fact:
        secondary_dg_configured:       "{{ (dg_status.stdout | default('UNKNOWN')) is search('PHYSICAL STANDBY')  }}"

    - name:                            "4.1.3 Oracle Data Guard - Display Data Guard status"
      ansible.builtin.debug:
        msg:
          - "Database instance:        {{ ansible_hostname }}"
          - "Database role:            {{ dg_status.stdout }}"
          - "Data guard configured:    {{ secondary_dg_configured }}"

...
