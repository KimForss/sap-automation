# /*---------------------------------------------------------------------------8
# |                                                                            |
# |       Execute the SQL scripts for Oracle Data Guard configuration.         |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

# Set Primary and Secondary node names.
- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Setting the primary and Secondary DB names"
  ansible.builtin.set_fact:
    ora_primary:           "{{ ansible_play_hosts_all[0] }}"         # Oracle Primary Host
    ora_secondary:         "{{ ansible_play_hosts_all[1] }}"         # Oracle Secondary Host
    current_host:                  "{{ ansible_hostname }}"

# Configuration on the Secondary DB

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Copy initSID.ora to Secondary"
  become:                              true
  become_user:                         "root"
  ansible.builtin.copy:
    src:                               "{{ target_media_location }}/downloads/{{ db_sid | upper }}/init{{ db_sid | upper }}.ora"
    dest:                              /oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/init{{ db_sid | upper }}.ora
    remote_src:                        true
    owner:                             oracle
    group:                             oinstall
    mode:                              "{{ '0777' | int - (custom_umask | default('022') | int) }}"
  when: current_host == ora_secondary

# - name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Copy orapwSID to Secondary"
#   become:                              true
#   become_user:                         "root"
#   ansible.builtin.copy:
#     src:                               "{{ target_media_location }}/downloads/{{ db_sid | upper }}/orapw{{ db_sid | upper }}"
#     dest:                              /oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/orapw{{ db_sid | upper }}
#     remote_src:                        true
#     owner:                             oracle
#     group:                             dba
#     mode:                              "{{ '0777' | int - (custom_umask | default('022') | int) }}"
#   when: current_host == ora_secondary

# Add additional parameters for Oracle ASM to match the file locations of Primary in secondary.
# This has to be done to prevent rman shooting file systems all over the disk groups.

- name:                                "4.1.3 Oracle Data Guard ASM - Setup Secondary: Update the initSID.ora for changing the control file location"
  ansible.builtin.replace:
    path:                              /oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/init{{ db_sid | upper }}.ora
    regexp:                            '/{{ db_sid | upper }}/c'
    replace:                           '/{{ db_sid | upper }}_STDBY/c'
    backup:                            true
  when:
    - node_tier == "oracle-asm"

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: File update wait for 15 sec to avoid multiple locks"
  ansible.builtin.wait_for:
    timeout:                           15

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Update the initSID.ora for adopting oraarch location"
  ansible.builtin.replace:
    path:                              /oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/init{{ db_sid | upper }}.ora
    regexp:                            '{{ db_sid | upper }}/oraarch'
    replace:                           '{{ db_sid | upper }}_STDBY/oraarch'
  when:
    - node_tier == "oracle-asm"
#  You can also use "sed" to replace the string. sed -i 's|/DBSID/c|/DBSID_STDBY/c|g'

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: File update wait for 15 sec to avoid multiple locks"
  ansible.builtin.wait_for:
    timeout:                           15

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Update the initSID.ora to delete the old local_listener value"
  become:                              true
  become_user:                         "root"
  ansible.builtin.lineinfile:
    path:                              /oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/init{{ db_sid | upper }}.ora
    regexp:                            '^local_listener='
    state:                             absent

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: File update wait for 15 sec to avoid multiple locks"
  ansible.builtin.wait_for:
    timeout:                           15


- name:                                "4.1.3 Oracle Data Guard ASM - Setup Secondary: Replace the local listener entires in initSID.ora"
  ansible.builtin.blockinfile:
    path:                              /oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/init{{ db_sid | upper }}.ora
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    insertafter:                       ".db_name='{{ db_sid | upper }}'"
    block: |
                *.db_create_file_dest='+DATA'
                *.db_unique_name ='{{ db_sid | upper }}_STDBY'
                *.log_file_name_convert='{{ db_sid | upper }}','{{ db_sid | upper }}'
                *.db_create_online_log_dest_1='+DATA'
                *.db_create_online_log_dest_2='+DATA'

  when:
    - node_tier == "oracle-asm"

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Replace the local listener entires in initSID.ora"
  ansible.builtin.blockinfile:
    path:                              /oracle/{{ db_sid | upper }}/{{ ora_release }}/dbs/init{{ db_sid | upper }}.ora
    marker_begin:                      "-- BEGIN"
    marker_end:                        "-- END"
    insertafter:                       ".db_name='{{ db_sid | upper }}'"
    block: |
                *.db_unique_name ='{{ db_sid | upper }}_STDBY'
                *.log_file_name_convert='{{ db_sid | upper }}','{{ db_sid | upper }}'
                *.local_listener='(Address=(Protocol=TCP)(Host={{ ora_secondary }})(Port=1521))'

  when:
    - node_tier == "oracle"

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: start lsnrctl on Secondary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell:               lsnrctl start
  register:                            lsnrctl_start_secondary_results
  failed_when:                         lsnrctl_start_secondary_results.rc > 0
  args:
    chdir:                             /etc/sap_deployment_automation/dataguard_scripts
    executable:                        /bin/csh
  when:
    - current_host == ora_secondary
    - node_tier == "oracle"

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Show lsnrctl_start_secondary output"
  ansible.builtin.debug:
    var:                               lsnrctl_start_secondary_results.stdout_lines
    verbosity:                         2
  when:
    - lsnrctl_start_secondary_results.stdout is defined
    - current_host == ora_secondary
    - node_tier == "oracle"

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Save lsnrctl_start_secondary output"
  ansible.builtin.copy:
    dest:                              /etc/sap_deployment_automation/lsnrctl_start_secondary.log
    content:                           "{{ lsnrctl_start_secondary_results.stdout }}"
    mode:                              '0777'
  when:
    - current_host == ora_secondary
    - lsnrctl_start_secondary_results.stdout is defined
    - node_tier == "oracle"

