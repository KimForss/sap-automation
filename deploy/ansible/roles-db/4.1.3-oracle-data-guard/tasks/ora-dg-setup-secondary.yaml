- name:                                "4.1.3 Oracle Data Guard - ASM Listener Starting: Sleep for 40 seconds and continue with play"
  ansible.builtin.wait_for:
    timeout:                           40

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Startup secondary DB using pfile"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell: |
      sqlplus / as sysdba @secondary_startup.sql
  register:                            secondary_startup_results
  failed_when:                         secondary_startup_results.rc > 0
  args:
    creates:                           /etc/sap_deployment_automation/dataguard_scripts/secondary_startup.txt
    chdir:                             /etc/sap_deployment_automation/dataguard_scripts
    executable:                        /bin/csh
  when:
    - current_host == ora_secondary
    - node_tier == "oracle"

- name:                                "4.1.3 Oracle Data Guard ASM - Setup Secondary: Startup secondary DB using pfile"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell: |
      sqlplus / as sysdba @asm_secondary_startup.sql
  register:                            secondary_startup_results
  failed_when:                         secondary_startup_results.rc > 0
  args:
    creates:                           /etc/sap_deployment_automation/dataguard_scripts/secondary_startup.txt
    chdir:                             /etc/sap_deployment_automation/dataguard_scripts
    executable:                        /bin/csh
  when:
    - current_host == ora_secondary
    - node_tier == "oracle"

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Show secondary_startup_results output (Debug)"
  ansible.builtin.debug:
    var:                               secondary_startup_results.stdout_lines
    verbosity:                         2
  when: current_host == ora_secondary

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Copy secondary_startup_results output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/secondary_startup.log"
    content:                           "{{ secondary_startup_results.stdout }}"
    mode:                              '0777'
  when:                                secondary_startup_results.stdout is defined

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: startup DG Broker on Secondary (save output)"
  ansible.builtin.copy:
    dest:                              /etc/sap_deployment_automation/dataguard_scripts/secondary_startup.log
    content:                           "{{ secondary_startup_results.stdout }}"
    mode:                              '0777'
  when:                                secondary_startup_results.stdout is defined

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Create secondary_startup.txt"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts/secondary_startup.txt
    state:                             touch
    mode:                              '0755'
  when:
    - current_host == ora_secondary
    - secondary_startup_results.rc == 0

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Duplicate Secondary DB from Primary DB using RMAN"
  block:

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Duplicate Secondary DB from Primary DB using RMAN"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell:           rman TARGET sys/{{ main_password }}@{{ db_sid | upper }} AUXILIARY sys/{{ main_password }}@{{ db_sid | upper }}_STDBY @rman-restore.rman
      register:                        rman_results
      failed_when:                     rman_results.rc > 1
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/restore_completed.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh
  rescue:

  #####################################################################
  #
  # If this fails remove the contents from the directories and try again
  #
  #####################################################################
    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Duplicate Secondary DB from Primary DB using RMAN (Debug)"
      ansible.builtin.debug:
        var:                           rman_results.stdout_lines

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Shutdown secondary DB"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell:           sqlplus / as sysdba @shutdown_secondary.sql
      register:                        secondary_shutdown_results
      failed_when:                     secondary_shutdown_results.rc > 0
      args:
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Remove files"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.file:
        path:                          "{{ item.directory_to_empty }}"
        state:                         absent
      loop:
        - { directory_to_empty: '/oracle/{{ db_sid | upper }}/sapdata1' }
        - { directory_to_empty: '/oracle/{{ db_sid | upper }}/sapdata2' }
        - { directory_to_empty: '/oracle/{{ db_sid | upper }}/sapdata3' }
        - { directory_to_empty: '/oracle/{{ db_sid | upper }}/sapdata4' }
        - { directory_to_empty: '/oracle/{{ db_sid | upper }}/origlogA' }
        - { directory_to_empty: '/oracle/{{ db_sid | upper }}/origlogB' }
        - { directory_to_empty: '/oracle/{{ db_sid | upper }}/mirrlogA' }
        - { directory_to_empty: '/oracle/{{ db_sid | upper }}/mirrlogB' }
      tags:
        - skip_ansible_lint

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Startup secondary DB"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell:           sqlplus / as sysdba @secondary_startup.sql
      register:                        secondary_startup_results2
      args:
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: startup DG Broker on Secondary (Debug)"
      ansible.builtin.debug:
        var:                           secondary_startup_results2.stdout_lines
        verbosity:                     2
      when: current_host == ora_secondary

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: startup DG Broker on Secondary (save output)"
      ansible.builtin.copy:
        dest:                          /etc/sap_deployment_automation/dataguard_scripts/secondary_startup2.log
        content:                       "{{ secondary_startup_results2.stdout }}"
        mode:                          '0777'
      when:                            secondary_startup_results.stdout2 is defined

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Duplicate Secondary DB from Primary DB using RMAN"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell:           rman TARGET sys/{{ main_password }}@{{ db_sid | upper }} AUXILIARY sys/{{ main_password }}@{{ db_sid | upper }}_STDBY @rman-restore.rman
      register:                        rman_results
      failed_when:                     rman_results.rc > 1
      args:
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

  when: current_host == ora_secondary

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Duplicate Secondary DB from Primary DB using RMAN (Debug)"
  ansible.builtin.debug:
    var:                               rman_results.stdout_lines
    verbosity:                         2

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Duplicate Secondary DB from Primary DB using RMAN (save output)"
  ansible.builtin.copy:
    dest:                              /etc/sap_deployment_automation/dataguard_scripts/restore.log
    content:                           "{{ rman_results.stdout }}"
    mode:                              '0777'
  when:                                rman_results.stdout is defined

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Create flag for post-processing on Primary DB"
  become:                              true
  become_user:                         "root"
  ansible.builtin.file:
    path:                              /usr/sap/install/downloads/{{ db_sid | upper }}/restore_completed.txt
    state:                             touch
    mode:                              '0755'
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall
  when:                                rman_results.rc == 0

# Work around for Oracle Bug Duplicate for Standby fails with RMAN-05535 even when LOG_FILE_NAME_CONVERT is set (Doc ID 2756315.1)
# Collecting the required regolog file and renaming and creating in the correct directories as Primary.
# Renaming the Broken redo files to the correct names and creating the required directories.
# RUn the redolog clear to physical creation of files.

- name:                                "Oracle Data Guard - Oracle Secondary Redo log rename using template"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.template:
   backup:                             true
   src:                                standbyredolog.j2
   dest:                               "/etc/sap_deployment_automation/dataguard_scripts/standbyredolog.sql"
   mode:                               '0644'
   force:                              true
  when:                                node_tier == "oracle"

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Rename the redolog files afer RMAN Restore"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell: |
      sqlplus / as sysdba @standbyredolog.sql
  register:                            redo_rename_results
  failed_when:                         redo_rename_results.rc > 0
  args:
    creates:                           /etc/sap_deployment_automation/dataguard_scripts/redo_rename.txt
    chdir:                             /etc/sap_deployment_automation/dataguard_scripts
    executable:                        /bin/csh
  when:
    - node_tier == "oracle"
    - current_host == ora_secondary


- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Rename the redolog files afer RMAN Restore (Debug)"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/dataguard_scripts/standbyredolog.log"
    content:                           "{{ redo_rename_results.stdout }}"
    mode:                              '0777'
  when:                                redo_rename_results.stdout is defined


- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Create redo_rename.txt"
  become:                              true
  become_user:                         "root"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts/redo_rename.txt
    state:                             touch
    mode:                              '0755'
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall
  when:
   - node_tier == "oracle"
   - redo_rename_results.rc == 0

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Create restore_completed.txt"
  become:                              true
  become_user:                         "root"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts/restore_completed.txt
    state:                             touch
    mode:                              '0755'
    owner:                             oracle
    group:                             oinstall
  when:                                rman_results.rc == 0

# Create the oraarch and spfile parameter folder on ASM for recovery

- name:                                "4.1.3. Oracle Data Guard - ASM - Create PARAMETERFILE folder"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell: |
                                       /oracle/GRID/{{ ora_version }}/bin/asmcmd --privilege sysdba mkdir +DATA/{{ db_sid | upper }}_STDBY
                                       /oracle/GRID/{{ ora_version }}/bin/asmcmd --privilege sysdba mkdir +DATA/{{ db_sid | upper }}_STDBY/PARAMETERFILE

  register:                            asm_oraarch_created_results
  failed_when:
    - asm_oraarch_created_results.rc > 0
    - not asm_oraarch_created_results.stderr is search("ORA-15005") # Already Exists
  args:
    executable:                        /bin/csh
    creates:                           /etc/sap_deployment_automation/dataguard_scripts/asm_oraarch_created.txt
  when:
    - node_tier == "oracle-asm"
    - current_host == ora_secondary

- name:                                "4.1.3. Oracle Data Guard - ASM - Create oraarch folder"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell: |

                                       /oracle/GRID/{{ ora_version }}/bin/asmcmd --privilege sysdba mkdir +ARCH/{{ db_sid | upper }}_STDBY/
                                       /oracle/GRID/{{ ora_version }}/bin/asmcmd --privilege sysdba mkdir +ARCH/{{ db_sid | upper }}_STDBY/oraarch

  register:                            asm_oraarch_created_results
  failed_when:
    - asm_oraarch_created_results.rc > 0
    - not asm_oraarch_created_results.stderr is search("ORA-15005") # Already Exists
  args:
    executable:                        /bin/csh
    creates:                           /etc/sap_deployment_automation/dataguard_scripts/asm_oraarch_created.txt
  when:
    - node_tier == "oracle-asm"
    - current_host == ora_secondary

- name:                                "Oracle Data Guard - ASM - Setup Secondary: Create asm_oraarch_created.txt"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts/asm_oraarch_created.txt
    state:                             touch
    mode:                              '0755'
  when:
    - node_tier == "oracle-asm"
    - current_host == ora_secondary
    - asm_oraarch_created_results.rc == 0
# ---------------------------------------------------------------------------------------------------------------

# Create the SPFILE from PFILE on Standby and Start the Standby Database using PFILE for non-ASM.
- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: non-ASM"
  when:
    - node_tier == "oracle"
    - current_host == ora_secondary
  block:

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Create spfile on non-ASM"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
          sqlplus / as sysdba @create_spfile.sql
      register:                        create_spfile_results
      failed_when:                     create_spfile_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/spfile_created.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Create spfile on non-ASM (Debug)"
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/dataguard_scripts/create_spfile.log"
        content:                       "{{ create_spfile_results.stdout }}"
        mode:                          '0777'
      when:                            create_spfile_results.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Create spfile_created.txt"
      become:                          true
      become_user:                     "root"
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/spfile_created.txt
        state:                         touch
        mode:                          '0755'
        owner:                         "{{ oracle_user_name }}"
        group:                         oinstall
      when:
        - create_spfile_results.rc == 0

    # Backup the PFILE and Create new PFILE refering to SPFILE.
    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Backup and remove pfile"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
          mv init{{ db_sid | upper}}.ora init{{ db_sid | upper}}.ora_backup_after_restore
      register:                        backup_pfile_results
      failed_when:                     backup_pfile_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/pfile_backup_created.txt
        chdir:                         /oracle/{{ db_sid |upper }}/{{ ora_release}}/dbs
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Create pfile_backup_created.txt"
      become:                          true
      become_user:                     "root"
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/pfile_backup_created.txt
        state:                         touch
        mode:                          '0755'
        owner:                         "{{ oracle_user_name }}"
        group:                         oinstall
      when:
        - backup_pfile_results.rc == 0

    - name:                            "4.1.3 Oracle Data Guard - Update the Local_Listener Value on secondary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell:           sqlplus / as sysdba @listener_update.sql
      register:                        local_listener_on_secondary_results
      failed_when:                     local_listener_on_secondary_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/local_listener_on_secondary.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Create local_listener_on_secondary on secondary"
      become:                          true
      become_user:                     root
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/local_listener_on_secondary.txt
        state:                         touch
        mode:                          '0755'
        owner:                         "{{ oracle_user_name }}"
        group:                         oinstall
      when:
        - local_listener_on_secondary_results.rc  == 0

    # Stop the Secondary Database.
    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Stop secondary DB for spfile"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
          sqlplus / as sysdba @shutdown_secondary.sql
      register:                        secondary_shutdown_results
      failed_when:                     secondary_shutdown_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/ora_secondary_shutdown.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Stop secondary DB for spfile (Debug)"
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/dataguard_scripts/ora_secondary_shutdown.log"
        content:                       "{{ secondary_shutdown_results.stdout }}"
        mode:                          '0777'
      when:                            secondary_shutdown_results.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Create ora_secondary_shutdown.txt"
      become:                          true
      become_user:                     "root"
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/ora_secondary_shutdown.txt
        state:                         touch
        mode:                          '0755'
        owner:                         oracle
        group:                         oinstall
      when:
        - secondary_shutdown_results.rc == 0

    # Create new PFILE with SPFILE Details for NON-ASM.
    - name:                            "4.1.3 Oracle Data Guard - Preparation: create create_spfile"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.blockinfile:
        create:                        true
        path:                          /oracle/{{ db_sid |upper }}/{{ ora_release}}/dbs/init{{ db_sid | upper }}.ora
        marker_begin:                  "-- BEGIN"
        marker_end:                    "-- END"
        block: |
                  spfile='/oracle/{{ db_sid |upper }}/{{ ora_release}}/dbs/spfile{{ db_sid | upper }}.ora'
        mode:                              '0755'

    #  Start the Secondary Database with the new SPFILE;
    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Start secondary DB with spfile"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
          sqlplus / as sysdba @oracle_secondary_startup.sql
      register:                        ora_secondary_startup_spfile_results
      failed_when:                     ora_secondary_startup_spfile_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/ora_secondary_startup_spfile.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Start secondary DB with spfile (Debug)"
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/dataguard_scripts/ora_secondary_startup_spfile.log"
        content:                       "{{ ora_secondary_startup_spfile_results.stdout }}"
        mode:                          '0777'
      when:                            ora_secondary_startup_spfile_results.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard - Setup Secondary: Create ora_secondary_startup_spfile.txt"
      become:                          true
      become_user:                     "root"
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/ora_secondary_startup_spfile.txt
        state:                         touch
        mode:                          '0755'
        owner:                         oracle
        group:                         oinstall
      when:
        - ora_secondary_startup_spfile_results.rc == 0

# ---------------------------------------------------------------------------------------------------------------
# Create the SPFILE from PFILE on Standby and Start the Standby Database using PFILE.
- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: ASM"
  when:
    - node_tier == "oracle-asm"
    - current_host == ora_secondary
  block:
    - name:                            "4.1.3 Oracle Data Guard ASM - Setup Secondary: Create spfile on ASM"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
          sqlplus / as sysdba @create_spfilesecondary.sql
      register:                        create_spfile_results
      failed_when:                     create_spfile_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/spfile_created.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard ASM - Setup Secondary: Create spfile on ASM (Debug)"
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/dataguard_scripts/create_spfile.log"
        content:                       "{{ create_spfile_results.stdout }}"
        mode:                          '0777'
      when:                            create_spfile_results.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard ASM - Setup Secondary: Create spfile_created.txt"
      become:                          true
      become_user:                     "root"
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/spfile_created.txt
        state:                         touch
        mode:                          '0755'
        owner:                         oracle
        group:                         oinstall
      when:
        - create_spfile_results.rc == 0

    # Backup the PFILE and Create new PFILE refering to SPFILE.
    - name:                            "4.1.3 Oracle Data Guard ASM - Setup Secondary: Backup and remove pfile"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
          set -o pipefail
          mv init{{ db_sid | upper}}.ora init{{ db_sid | upper}}.ora_backup_after_restore
      register:                        backup_pfile_results
      failed_when:                     backup_pfile_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/pfile_backup_created.txt
        chdir:                         /oracle/{{ db_sid |upper }}/{{ ora_release}}/dbs
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard ASM - Setup Secondary: Create pfile_backup_created.txt"
      become:                          true
      become_user:                     "root"
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/pfile_backup_created.txt
        state:                         touch
        mode:                          '0755'
        owner:                         "{{ oracle_user_name }}"
        group:                         oinstall
      when:
        - backup_pfile_results.rc == 0
    - name:                            "4.1.3 Oracle Data Guard ASM - Update the Local_Listener Value on secondary"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell:           sqlplus / as sysdba @listener_update.sql
      register:                        local_listener_on_secondary_results
      failed_when:                     local_listener_on_secondary_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/local_listener_on_secondary.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard ASM - Create local_listener_on_secondary on secondary"
      become:                          true
      become_user:                     root
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/local_listener_on_secondary.txt
        state:                         touch
        mode:                          '0755'
        owner:                         "{{ oracle_user_name }}"
        group:                         oinstall
      when:
        - local_listener_on_secondary_results.rc  == 0

    # Stop the Secondary Database.
    - name:                            "4.1.3 Oracle Data Guard ASM - Setup Secondary: Stop secondary DB for spfile"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
          sqlplus / as sysdba @shutdown_secondary.sql
      register:                        secondary_shutdown_results
      failed_when:                     secondary_shutdown_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/asm_secondary_shutdown.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard ASM - Setup Secondary: Stop secondary DB for spfile (Debug)"
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/dataguard_scripts/asm_secondary_shutdown.log"
        content:                       "{{ secondary_shutdown_results.stdout }}"
        mode:                          '0777'
      when:                            secondary_shutdown_results.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard ASM - Setup Secondary: Create asm_secondary_shutdown.txt"
      become:                          true
      become_user:                     "root"
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/asm_secondary_shutdown.txt
        state:                         touch
        mode:                          '0755'
        owner:                         "{{ oracle_user_name }}"
        group:                         oinstall
      when:
        - secondary_shutdown_results.rc == 0

    # Create new PFILE with SPFILE Details for ASM.
    - name:                            "4.1.3 Oracle Data Guard ASM - Preparation: create create_spfile"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.blockinfile:
        create:                        true
        path:                          /oracle/{{ db_sid |upper }}/{{ ora_release}}/dbs/init{{ db_sid | upper }}.ora
        marker_begin:                  "-- BEGIN"
        marker_end:                    "-- END"
        block: |
                  spfile='+DATA/{{ db_sid | upper }}_STDBY/PARAMETERFILE/spfile{{ db_sid | upper }}.ora'
        mode:                              '0755'

    #  Start the Secondary Database with the new SPFILE;
    - name:                            "4.1.3 Oracle Data Guard ASM - Setup Secondary: Start secondary DB with spfile"
      become:                          true
      become_user:                     "{{ oracle_user_name }}"
      ansible.builtin.shell: |
          set -o pipefail
          sqlplus / as sysdba @asm_secondary_startup.sql
      register:                        asm_secondary_startup_spfile_results
      failed_when:                     asm_secondary_startup_spfile_results.rc > 0
      args:
        creates:                       /etc/sap_deployment_automation/dataguard_scripts/asm_secondary_startup_spfile.txt
        chdir:                         /etc/sap_deployment_automation/dataguard_scripts
        executable:                    /bin/csh

    - name:                            "4.1.3 Oracle Data Guard ASM - Setup Secondary: Save startup (Debug)"
      ansible.builtin.copy:
        dest:                          "/etc/sap_deployment_automation/dataguard_scripts/asm_secondary_startup_spfile.log"
        content:                       "{{ asm_secondary_startup_spfile_results.stdout }}"
        mode:                          '0777'
      when:                            asm_secondary_startup_spfile_results.stdout is defined

    - name:                            "4.1.3 Oracle Data Guard - ASM - Setup Secondary: Create asm_secondary_startup_spfile.txt"
      become:                          true
      become_user:                     "root"
      ansible.builtin.file:
        path:                          /etc/sap_deployment_automation/dataguard_scripts/asm_secondary_startup_spfile.txt
        state:                         touch
        mode:                          '0755'
        owner:                         "{{ oracle_user_name }}"
        group:                         oinstall
      when:
        - asm_secondary_startup_spfile_results.rc == 0

# Enable the DataGuard Broker
- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: startup DG Broker on Secondary"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell:               sqlplus / as sysdba @enable_dataguard_broker.sql
  register:                            secondary_startup_results
  failed_when:                         secondary_startup_results.rc > 0
  args:
    creates:                           /etc/sap_deployment_automation/dataguard_scripts/enable_dg_broker.txt
    chdir:                             /etc/sap_deployment_automation/dataguard_scripts
    executable:                        /bin/csh
  when:                                current_host == ora_secondary

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: startup DG Broker on Secondary (Debug)"
  ansible.builtin.debug:
    var:                               secondary_startup_results.stdout_lines
    verbosity:                         2

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: startup DG Broker on Secondary (save output)"
  ansible.builtin.copy:
    dest:                              /etc/sap_deployment_automation/dataguard_scripts/secondary_startup.log
    content:                           "{{ secondary_startup_results.stdout }}"
    mode:                              '0777'
  when:                                secondary_startup_results.stdout is defined

- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Create enable_dg_broker.txt"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/dataguard_scripts/enable_dg_broker.txt
    state:                             touch
    mode:                              '0755'
  when:
    - current_host == ora_secondary
    - secondary_startup_results.rc == 0

