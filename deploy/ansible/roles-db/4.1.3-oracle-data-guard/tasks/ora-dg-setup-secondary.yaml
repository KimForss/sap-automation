    chdir:                             /etc/sap_deployment_automation/dataguard_scripts
    executable:                        /bin/csh
  when:
    - node_tier == "oracle-asm"
    - current_host == ora_secondary


- name:                                "4.1.3 Oracle Data Guard - Setup Secondary: Show lsnrctl_start_secondary results on Secondary (save output)"
  ansible.builtin.debug:
    var:                               lsnrctl_asm_start_secondary_results.stdout_lines
