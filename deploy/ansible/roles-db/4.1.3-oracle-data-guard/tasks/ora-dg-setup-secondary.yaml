    dest:                              /etc/sap_deployment_automation/lsnrctl_start_secondary.log
    content:                           "{{ lsnrctl_asm_start_secondary_results.stdout }}"
    mode:                              '0777'
  when:                                lsnrctl_asm_start_secondary_results.stdout is defined

