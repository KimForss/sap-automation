# /*---------------------------------------------------------------------------8
# |                                                                            |
# |                Perform the Oracle Instance ASM installation                    |
# |                  SAP: Register BOM                                         |
# |                  create .params directory                                  |
# |                  Export environment variables for Oracle Installation      |
# |                  Run the Oracle universal installer in silent mode.        |
# |                   SAP Note : 2660017 Oracle Software Installation on Unix  |
# |                                                                            |
# +------------------------------------4--------------------------------------*/


---

- name:                                "ORACLE GRID UPDATE: - Validate ORACLE parameters"
  ansible.builtin.assert:
    that:
      - item_to_check.parameter is defined                    # Has the variable been defined
      - item_to_check.parameter | type_debug != 'NoneType'    # and given a value
      - item_to_check.parameter | trim | length > 1
    fail_msg:                      item_to_check.error
  loop:
    - { parameter: 'ora_release', error: 'Oracle deployments requires that ora_release is provided' }
    - { parameter: 'ora_version', error: 'Oracle deployments requires that ora_version is provided' }
    - { parameter: 'oracle_grid_sbp_patch', error: 'Oracle grid deployments requires that oracle_grid_sbp_patch is provided' }
  loop_control:
    loop_var: item_to_check

- name:                                "ORACLE GRID UPDATE: Register BoM"
  ansible.builtin.include_role:
    name:                              roles-sap/3.3.1-bom-utility
    tasks_from:                        bom-register
  vars:
    bom_name:                          "{{ bom_base_name }}"
    task_prefix:                       "ORACLE GRID UPDATE: "
    sa_enabled:                        true
  when:
                                       - bom is undefined

# +------------------------------------4--------------------------------------*/
# |                                                                            |
# |           Oracle Grid: Patch GRID                                          |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                "ORACLE GRID UPDATE: remove old OPatch"
  ansible.builtin.file:
    path:                              "/oracle/GRID/{{ ora_version }}/OPatch"
    state:                             absent

- name:                                "ORACLE GRID UPDATE: remove old MOPatch"
  ansible.builtin.file:
    path:                              "/oracle/GRID/{{ ora_version }}/MOPatch"
    state:                             absent

- name:                                "ORACLE GRID UPDATE: copy OPatch for GRID from downloads"
  ansible.builtin.copy:
    src:                               "{{ target_media_location }}/SBP/OPATCH/OPatch"
    dest:                              "/oracle/GRID/{{ ora_version }}"
    remote_src:                        true
    mode:                              '0755'
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall

- name:                                "ORACLE GRID UPDATE: Find MOPatch"
  ansible.builtin.find:
    paths:                             "{{ target_media_location }}/SBP/SAPSBP"
    patterns:                          ["MOPatch"]
    file_type:                         directory
    recurse:                           true
  register:                            mopatch_directory

- name:                                "ORACLE GRID UPDATE: Find MOPatch"
  ansible.builtin.fail:
    msg:                               "Too many MOPatches found"
  when:                                mopatch_directory.matched != 1

- name:                                "ORACLE GRID UPDATE: MOPatch path"
  ansible.builtin.set_fact:
    mopatch_path:                      "{{ mopatch_directory.files[0].path }}"
  when:                                mopatch_directory.matched == 1

- name:                                "ORACLE GRID UPDATE: Patch ID for GRID"
  become:                              true
  become_user:                         root
  ansible.builtin.find:
    paths:                             "{{ target_media_location }}/SBP/GIRU19P"
    patterns:                          ["bundle.xml"]
    file_type:                         file
    recurse:                           true
  register:                            patch_grid_id_directory

- name:                                "ORACLE GRID UPDATE: Find Patch ID for GRID"
  ansible.builtin.fail:
    msg:                               "No Patch Ids"
  when:                                patch_grid_id_directory.matched != 1

- name:                                "ORACLE GRID UPDATE: OPatch ID"
  ansible.builtin.set_fact:
    patch_grid_path:                   "{{ patch_grid_id_directory.files[0].path | dirname }}"
  when:                                patch_grid_id_directory.matched == 1

- name:                                "ORACLE GRID UPDATE: OPatch ID"
  ansible.builtin.debug:
    msg:                               "Patch GRID path {{ patch_grid_path }}"

- name:                                "ORACLE GRID UPDATE: set STAGE_SBP_OCWRU"
  ansible.builtin.set_fact:
    STAGE_SBP_OCWRU:                   "{{ patch_grid_path }}/{{ bom.patch.SBP_OCWRU }}"
  when:                                patch_grid_path is defined and bom.patch.SBP_OCWRU is defined

- name:                                "ORACLE GRID UPDATE: Set Runtime Variables"
  ansible.builtin.set_fact:
    is_UEK6:                           "{{ ansible_kernel is version('5.5', '<') }}"
    CV_ASSUME_DISTID:                  "{% if ansible_kernel is version('5.5', '<') %} OEL7 {% else %} OL8 {% endif %}"

- name:                                "ORACLE GRID UPDATE: copy MOPatch from {{ mopatch_path }} to /oracle/{{ db_sid | upper }}/{{ ora_version }}"
  ansible.builtin.copy:
    src:                               "{{ mopatch_path }}"
    dest:                              "/oracle/GRID/{{ ora_version }}"
    remote_src:                        true
    mode:                              0777
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall

- name:                                "ORACLE GRID UPDATE: Check if backup exists for GRID"
  ansible.builtin.stat:
    path:                              "/oracle/GRID/{{ ora_version }}/bin/oradism"
  register:                            oradism_stat

- name:                                "ORACLE GRID UPDATE: Pre Processing set permissions"
  when:                                oradism_stat.stat.exists
  ansible.builtin.file:
    path:                              "/oracle/GRID/{{ ora_version }}/bin/oradism"
    state:                             file
    mode:                              '0750'
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall

# Step 2

- name:                                "ORACLE GRID UPDATE: Stop all CRS-managed resources associated with the RDBMS home"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell: |
                                       env ORACLE_HOME=$OHRDBMS ORACLE_BASE=$OHRDBMS.dummybase $OHRDBMS/bin/srvctl stop home -o $OHRDBMS -s $OHRDBMS.srvctlstatus
  register:                            srvctlstatus_results
  environment:
    OHRDBMS:                           "/oracle/{{ db_sid | upper }}/{{ ora_release }}"
  args:
    executable:                        /bin/csh
    chdir:                             "/oracle/{{ db_sid | upper }}"
    creates:                           /oracle/{{ db_sid | upper }}/{{ ora_release }}.srvctlstatus

- name:                                "ORACLE GRID UPDATE: Pre Processing set permissions"
  when:                                oradism_stat.stat.exists
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/grid/srvctlstatus.txt"
    state:                             touch
    mode:                              '0755'

# Step 5
- name:                                "ORACLE GRID UPDATE: Shut down the grid stack and unlock the grid home for patching"
  become:                              true
  become_user:                         root
  ansible.builtin.shell: |
                                       $OHGRID/crs/install/roothas.sh -prepatch
  register:                            grid_roothas_results
  environment:
    OHGRID:                            "/oracle/GRID/{{ ora_version }}"
  args:
    executable:                        /bin/csh
    creates:                           "/etc/sap_deployment_automation/grid/gridupdate_roothas.txt"

- name:                                "ORACLE GRID UPDATE: Debug: GRID roothas.sh output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/grid/grid_roothas.log"
    content:                           "{{ grid_roothas_results.stdout }}"
    mode:                              0777
  when:                                grid_roothas_results.stdout is defined

- name:                                "ORACLE GRID UPDATE: creates after a successful post processing script execution"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/grid/gridupdate_roothas.txt"
    state:                             touch
    mode:                              '0755'

# Step 6
- name:                                "ORACLE GRID UPDATE: pre processing reset permissions"
  when:                                oradism_stat.stat.exists
  ansible.builtin.file:
    path:                              "/oracle/GRID/{{ ora_version }}/bin/oradism"
    state:                             file
    mode:                              'u+rw'
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall

# Step 7
- name:                                "ORACLE GRID UPDATE: Post Processing - SBP Patching - progress"
  ansible.builtin.debug:
    msg:                               "Running SBP Patching, env ORACLE_HOME=$OHGRID $OHGRID/MOPatch/mopatch.sh -v -s {{ target_media_location }}/SBP/{{ oracle_grid_sbp_patch }}, please wait"

- name:                                "ORACLE GRID UPDATE: Post Processing - SBP Patching"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell:               "env ORACLE_HOME=$OHGRID $OHGRID/MOPatch/mopatch.sh -v -s {{ target_media_location }}/SBP/{{ oracle_sbp_grid_patch }} -F mopatch_patchgen"
  environment:
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
    OHGRID:                            "/oracle/GRID/{{ ora_version }}"
  register:                            sbpscript_results
  failed_when:                         sbpscript_results.rc >= 2
  args:
    creates:                           "/etc/sap_deployment_automation/grid/grid_mopatch_installed.txt"
    chdir:                             "{{ target_media_location }}/SBP"
    executable:                        /bin/csh

- name:                                "ORACLE GRID UPDATE: Post processing installer output"
  ansible.builtin.debug:
    var:                               sbpscript_results.stdout_lines
    verbosity:                         2

- name:                                "ORACLE GRID UPDATE: Post processing installer output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/grid/grid_mopatch.log"
    content:                           "{{ sbpscript_results.stdout }}"
    mode:                              '0777'
  when:                                sbpscript_results.stdout is defined

- name:                                "ORACLE GRID UPDATE: Create grid_mopatch_installed.txt"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/grid/grid_mopatch_installed.txt"
    state:                             touch
    mode:                              '0755'
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall

# Step 8
- name:                                "ORACLE GRID UPDATE: pre processing reset permissions"
  when:                                oradism_stat.stat.exists
  ansible.builtin.file:
    path:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/bin/oradism"
    state:                             file
    mode:                              '4750'
    owner:                             root
    group:                             oinstall

# Step 9.1
- name:                                "ORACLE GRID UPDATE: complete installation in the grid home"
  become:                              true
  become_user:                         root
  ansible.builtin.shell: |
                                       $OHGRID/rdbms/install/rootadd_rdbms.sh
  register:                            rootadd_rdbms_results
  environment:
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
    OHGRID:                            "/oracle/GRID/{{ ora_version }}"
  args:
    executable:                        /bin/csh
    creates:                           "/etc/sap_deployment_automation/grid/gridupdate_rootadd_rdbms.txt"

- name:                                "ORACLE GRID UPDATE: Debug: GRID rootadd_rdbms.sh output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/grid/grid_roothas.log"
    content:                           "{{ grid_roothas_results.stdout }}"
    mode:                              0777
  when:                                grid_roothas_results.stdout is defined

- name:                                "ORACLE GRID UPDATE: creates after a successful post processing script execution"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/grid/gridupdate_rootadd_rdbms.txt"
    state:                             touch
    mode:                              '0755'

# Step 9.2
- name:                                "ORACLE GRID UPDATE: Run rootcrs.sh -postpatch"
  become:                              true
  become_user:                         root
  ansible.builtin.shell: |
                                       $OHGRID/crs/install/rootcrs.sh -postpatch -nonrolling
  register:                            rootcrs_postpatch_results
  environment:
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
    OHGRID:                            "/oracle/GRID/{{ ora_version }}"
  args:
    executable:                        /bin/csh
    creates:                           "/etc/sap_deployment_automation/grid/gridupdate_rootcrs_postpatch.txt"

- name:                                "ORACLE GRID UPDATE: Debug: GRID rootcrs.sh postpatch output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/grid/grid_rootcrs_postpatch.log"
    content:                           "{{ rootcrs_postpatch_results.stdout }}"
    mode:                              0777
  when:                                rootcrs_postpatch_results.stdout is defined

- name:                                "ORACLE GRID UPDATE: creates after a successful post processing script execution"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/grid/gridupdate_rootcrs_postpatch.txt"
    state:                             touch
    mode:                              '0755'

# Step 9.3
- name:                                "ORACLE GRID UPDATE: Work-around for Oracle bug 28352017"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell: |
                                       $OHGRID/bin/cluutil \
                                       -ckpt -oraclebase `env ORACLE_HOME=$OHGRID $OHGRID/bin/orabase` \
                                       -writeckpt -name ROOTCRS_PREPATCH -state START
  register:                            cluutil_results
  environment:
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
    OHGRID:                            "/oracle/GRID/{{ ora_version }}"
  args:
    executable:                        /bin/csh
    creates:                           "/etc/sap_deployment_automation/grid/gridupdate_cluutil.txt"

- name:                                "ORACLE GRID UPDATE: Debug: GRID cluutil output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/grid/grid_cluutil.log"
    content:                           "{{ cluutil_results.stdout }}"
    mode:                              0777
  when:                                cluutil_results.stdout is defined

- name:                                "ORACLE GRID UPDATE: creates after a successful post processing script execution"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/grid/gridupdate_cluutil.txt"
    state:                             touch
    mode:                              '0755'

- name:                                "ORACLE GRID UPDATE: Remove {{ ora_release }}.srvctlstatus"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.file:
    path:                              "/oracle/{{ db_sid | upper }}/{{ ora_release }}.srvctlstatus"
    state:                             absent

# Step 10
- name:                                "ORACLE GRID UPDATE: Run the pre-installation script for the database component of Grid Infrastructure Release Update 19.28.0.0.250715"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell: |
                                       {{ STAGE_SBP_OCWRU }}/custom/scripts/prepatch.sh -dbhome $IHRDBMS

  register:                            prepatch_results
  environment:
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
    IHRDBMS:                           "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
  args:
    executable:                        /bin/csh
    creates:                           "/etc/sap_deployment_automation/grid/gridupdate_prepatch.txt"

- name:                                "ORACLE GRID UPDATE: Debug: GRID prepatch output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/grid/grid_update_prepatch.log"
    content:                           "{{ prepatch_results.stdout }}"
    mode:                              0777
  when:                                prepatch_results.stdout is defined

- name:                                "ORACLE GRID UPDATE: creates after a successful post processing script execution"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/grid/gridupdate_prepatch.txt"
    state:                             touch
    mode:                              '0755'

# Step 11
- name:                                "ORACLE GRID DB UPDATE: pre processing reset permissions"
  when:                                oradism_stat.stat.exists
  ansible.builtin.file:
    path:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/bin/oradism"
    state:                             file
    mode:                              'u+rw'
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall

# Step 12
- name:                                "ORACLE GRID DB UPDATE: Post Processing - DB SBP Patching - progress"
  ansible.builtin.debug:
    msg:                               "Running SBP Patching, env ORACLE_HOME=$IHRDBMS  $IHRDBMS /MOPatch/mopatch.sh -v -s {{ target_media_location }}/SBP/{{ oracle_grid_sbp_patch }}, please wait"

- name:                                "ORACLE GRID DB UPDATE: Post Processing - SBP Patching"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell:               "env ORACLE_HOME=$IHRDBMS $IHRDBMS/MOPatch/mopatch.sh -v -s {{ target_media_location }}/SBP/{{ oracle_grid_sbp_patch }} -F mopatch_patchgen"
  environment:
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
    IHRDBMS :                          "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
  register:                            sbpscriptdb_results
  failed_when:                         sbpscriptdb_results.rc >= 2
  args:
    creates:                           "/etc/sap_deployment_automation/grid/grid_mopatch_db_installed.txt"
    chdir:                             "{{ target_media_location }}/SBP"
    executable:                        /bin/csh

- name:                                "ORACLE GRID DB UPDATE: Post processing installer output"
  ansible.builtin.debug:
    var:                               sbpscriptdb_results.stdout_lines
    verbosity:                         2

- name:                                "ORACLE GRID DB UPDATE: Post processing installer output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/grid/grid_mopatch_db.log"
    content:                           "{{ sbpscriptdb_results.stdout }}"
    mode:                              '0777'
  when:                                sbpscriptdb_results.stdout is defined

- name:                                "ORACLE GRID DB UPDATE: Create grid_mopatch_db_installed.txt"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/grid/grid_mopatch_db_installed.txt"
    state:                             touch
    mode:                              '0755'
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall

# Step 13
- name:                                "ORACLE DB UPDATE: pre processing reset permissions"
  when:                                oradism_stat.stat.exists
  ansible.builtin.file:
    path:                              "/oracle/{{ db_sid | upper }}/{{ ora_version }}/bin/oradism"
    state:                             file
    mode:                              '4750'
    owner:                             "{{ oracle_user_name }}"
    group:                             oinstall


# Step 14
- name:                                "ORACLE GRID UPDATE: Run the post-installation script for the database component of Grid Infrastructure Release Update 19.28.0.0.250715"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell: |
                                       {{ STAGE_SBP_OCWRU }}/custom/scripts/postpatch.sh -dbhome $IHRDBMS
  register:                            postpatch_results
  environment:
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
    IHRDBMS:                           "/oracle/{{ db_sid | upper }}/{{ ora_version }}"
  args:
    executable:                        /bin/csh
    creates:                           "/etc/sap_deployment_automation/grid/gridupdate_postpatch.txt"

- name:                                "ORACLE GRID UPDATE: Debug: GRID postpatch output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/grid/grid_update_postpatch.log"
    content:                           "{{ postpatch_results.stdout }}"
    mode:                              0777
  when:                                postpatch_results.stdout is defined

- name:                                "ORACLE GRID UPDATE: creates after a successful post processing script execution"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/grid/gridupdate_postpatch.txt"
    state:                             touch
    mode:                              '0755'

# Step 16
- name:                                "ORACLE GRID UPDATE: Start all CRS-managed resources associated with the RDBMS home"
  become:                              true
  become_user:                         "{{ oracle_user_name }}"
  ansible.builtin.shell: |
                                       env ORACLE_HOME=$OHRDBMS ORACLE_BASE=$OHRDBMS.dummybase $OHRDBMS/bin/srvctl start home -o $OHRDBMS \
                                       -s $OHRDBMS.`hostname`.srvctlstatus -n `hostname`

  register:                            srvctl_start_results
  environment:
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
    OHRDBMS:                           "/oracle/{{ db_sid | upper }}/{{ ora_release }}"
  args:
    executable:                        /bin/csh
    creates:                           "/etc/sap_deployment_automation/grid/gridupdate_srvctl_start.txt"

- name:                                "ORACLE GRID UPDATE: Debug: GRID prepatch output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/grid/grid_update_prepatch.log"
    content:                           "{{ srvctl_start_results.stdout }}"
    mode:                              0777
  when:                                srvctl_start_results.stdout is defined

- name:                                "ORACLE GRID UPDATE: creates gridupdate_srvctl_start.txt after a successful post processing script execution"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/grid/gridupdate_srvctl_start.txt"
    state:                             touch
    mode:                              '0755'


...
# /*---------------------------------------------------------------------------8
# |                                   END                                      |
# +------------------------------------4--------------------------------------*/
