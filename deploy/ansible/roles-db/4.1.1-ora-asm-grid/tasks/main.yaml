# +------------------------------------4--------------------------------------*/
# |                                                                            |
# |           Oracle Grid: Create ARCH and RECO disk groups using ASMCA        |
# |                                                                            |
# +------------------------------------4--------------------------------------*/


- name:                                "ORACLE ASM: Configure ASM"
  become:                              true
  become_user:                         oracle
  ansible.builtin.shell: |
                                       "./asmca -silent -configureASM -sysAsmPassword {{ main_password }} -asmsnmpPassword {{ main_password }} \
                                        -createDiskGroup -diskGroupName DATA -redundancy EXTERNAL -diskList '{{ asm_datadisklist }}'"
  register:                            asm_creation_results
  environment:
    DB_SID:                            "{{ db_sid | upper }}"
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
  args:
    executable:                        /bin/csh
    chdir:                             "/oracle/GRID/{{ ora_version }}/bin"
    creates:                           /etc/sap_deployment_automation/oracle/asm_created.txt

- name:                                "ORACLE ASM: Created after ASM creation"
  ansible.builtin.file:
    path:                             "/etc/sap_deployment_automation/oracle/asm_created.txt"
    state:                            touch
    mode:                             '0755'

# - name:                                "ORACLE ASM: Create ASM Disk groups DATA"
#   become:                              true
#   become_user:                         oracle
#   ansible.builtin.shell: |
#                                        ./asmca -silent -createDiskGroup -diskGroupName DATA -redundancy EXTERNAL -diskList '{{ asm_datadisklist }}'
#   register:                            data_diskgroup_creation_results
#   environment:
#     DB_SID:                            "{{ db_sid | upper }}"
#     CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
#   args:
#     executable:                        /bin/csh
#     chdir:                             "/oracle/GRID/{{ ora_version }}/bin"
#     creates:                           /etc/sap_deployment_automation/oracle/diskgroups_created.txt

- name:                                "ORACLE ASM: Create ASM Disk groups ARCH"
  become:                              true
  become_user:                         oracle
  ansible.builtin.shell: |
                                       ./asmca -silent -createDiskGroup -diskGroupName ARCH -redundancy EXTERNAL -diskList '{{ asm_archdisklist }}'
  register:                            arch_diskgroup_creation_results
  environment:
    DB_SID:                            "{{ db_sid | upper }}"
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
  args:
    executable:                        /bin/csh
    chdir:                             "/oracle/GRID/{{ ora_version }}/bin"
    creates:                           /etc/sap_deployment_automation/oracle/diskgroups_created.txt

- name:                                "ORACLE ASM: Create ASM Disk groups RECO"
  become:                              true
  become_user:                         oracle
  ansible.builtin.shell: |
                                       set -o errexit
                                       ./asmca -silent -createDiskGroup -diskGroupName RECO -redundancy EXTERNAL -diskList '{{ asm_recodisklist }}'
  register:                            reco_diskgroup_creation_results
  environment:
    DB_SID:                            "{{ db_sid | upper }}"
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
  args:
    executable:                        /bin/csh
    chdir:                             "/oracle/GRID/{{ ora_version }}/bin"
    creates:                           /etc/sap_deployment_automation/oracle/diskgroups_created.txt

- name:                                "ORACLE ASM: Created after a successful disk group creation"
  ansible.builtin.file:
    path:                             "/etc/sap_deployment_automation/oracle/diskgroups_created.txt"
    state:                            touch
    mode:                             '0755'

- name:                               "SAP Oracle DB ASM: Update ASM Disk groups ARCH and RECO for DBLOAD"
  become:                             true
  become_user:                        oracle
  ansible.builtin.shell: |
                                      set -o errexit
                                      ./asmca -silent -editDiskGroupAttributes -diskGroupName DATA -attribute compatible.rdbms={{ ora_version }}
                                      ./asmca -silent -editDiskGroupAttributes -diskGroupName ARCH -attribute compatible.rdbms={{ ora_version }}
                                      ./asmca -silent -editDiskGroupAttributes -diskGroupName RECO -attribute compatible.rdbms={{ ora_version }}
  register:                           diskgroupupdate_results
  failed_when:                        diskgroupupdate_results.rc >= 1
  environment:
    DB_SID:                           "{{ db_sid }}"
    CV_ASSUME_DISTID:                 "{{ CV_ASSUME_DISTID }}"
  args:
    executable:                       /bin/csh
    chdir:                            /oracle/GRID/{{ ora_version }}/bin
    creates:                          /etc/sap_deployment_automation/oracle/diskgroupupdated.txt

- name:                               "SAP Oracle DB ASM: Create flag after a sucessfull change"
  ansible.builtin.file:
    path:                             /etc/sap_deployment_automation/oracle/diskgroupupdated.txt
    state:                            touch
    mode:                             '0755'


