# /*---------------------------------------------------------------------------8
# |                                                                            |
# |                Perform the Oracle Instance ASM installation                    |
# |                  SAP: Register BOM                                         |
# |                  create .params directory                                  |
# |                  Export environment variables for Oracle Installation      |
# |                  Run the Oracle universal installer in silent mode.        |
# |                   SAP Note : 2660017 Oracle Software Installation on Unix  |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

# TODO: Considerations
#         15G+ swap space for Oracle DB installation.
#         MAke the installer more version independent
#

---

- name:                                "ORACLE ASM: - Validate ORACLE parameters"
  ansible.builtin.assert:
    that:
      - item_to_check.parameter is defined                    # Has the variable been defined
      - item_to_check.parameter | type_debug != 'NoneType'    # and given a value
      - item_to_check.parameter | trim | length > 1
    fail_msg:                      item_to_check.error
  loop:
    - { parameter: 'ora_release', error: 'Oracle deployments requires that ora_release is provided' }
    - { parameter: 'ora_version', error: 'Oracle deployments requires that ora_version is provided' }
    - { parameter: 'oracle_sbp_patch', error: 'Oracle deployments requires that oracle_sbp_patch is provided' }
  loop_control:
    loop_var: item_to_check

- name:                                "ORACLE ASM: Register BoM"
  ansible.builtin.include_role:
    name:                              roles-sap/3.3.1-bom-utility
    tasks_from:                        bom-register
  vars:
    bom_name:                          "{{ bom_base_name }}"
    task_prefix:                       "ORACLE ASM: "
    sa_enabled:                        true
  when:
                                       - bom is undefined

- name:                                "ORACLE ASM: Load the disk configuration settings"
  ansible.builtin.include_vars:        disks_config_asm.yml

- name:                                "Create hidden directory"
  ansible.builtin.file:
    path:                              "{{ item.path }}"
    state:                             directory
    mode:                              '0755'
  loop:
    - { state: 'directory', mode: '0755', path: '/etc/sap_deployment_automation/' }

- name:                                "ORACLE ASM: Permissions"
  ansible.builtin.file:
    path:                              /etc/sap_deployment_automation/oracle
    state:                             directory
    mode:                              '0755'
    owner:                             oracle
    group:                             oinstall

# - name:                                "ORACLE ASM: Create Grid extract software directory"
#   ansible.builtin.file:
#     path:                              /oracle/GRID/{{ ora_version }}
#     state:                             directory
#     owner:                             oracle
#     group:                             oinstall
#     mode:                              0755

- name:                                "ORACLE ASM: Create Grid software directory"
  ansible.builtin.file:
    path:                              /oracle/GRID/{{ ora_version }}
    state:                             directory
    owner:                             oracle
    group:                             oinstall
    mode:                              '0755'

# - fail:
#     msg:   "check before grid post processing"

# +------------------------------------4--------------------------------------*/
# |                                                                            |
# |                       Oracle Grid: Response file                           |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                "ORACLE ASM: Setting the primary and Secondary DB names"
  ansible.builtin.set_fact:
    # ora_primary:                       "{{ ansible_play_hosts_all[0] }}"         # Oracle Primary Host
    # ora_secondary:                     "{{ ansible_play_hosts_all[1] }}"         # Oracle Secondary Host
    current_host:                      "{{ ansible_hostname }}"

- name:                               "ORACLE ASM: Get the List of Data disks"
  become:                             true
  become_user:                        root
  ansible.builtin.shell:              "set -o pipefail && oracleasm listdisks | grep DATA"
  register:                           asm_dlist

- name:                               "ORACLE ASM: Get the List of ARCH disks"
  become:                             true
  become_user:                        root
  ansible.builtin.shell:              "set -o pipefail && oracleasm listdisks | grep ARCH"
  register:                           asm_alist

- name:                               "ORACLE ASM: Get the List of RECO disks"
  become:                             true
  become_user:                        root
  ansible.builtin.shell:              "set -o pipefail && oracleasm listdisks |grep RECO"
  register:                           asm_rlist

# - name:                               "Get the List of OLOG disks"
#   become:                             true
#   become_user:                        root
#   ansible.builtin.shell:            "oracleasm listdisks |grep OLOG"
#   register:                          asm_olist


- name:                                "ORACLE ASM: Prepare the Data disk list"
  ansible.builtin.set_fact:
    asm_dlist1:                    "{{ asm_dlist.stdout_lines | list }}"
    asm_alist1:                    "{{ asm_alist.stdout_lines | list }}"
    asm_rlist1:                    "{{ asm_rlist.stdout_lines | list }}"


- name:                                "ORACLE ASM: DISPLAY Oracle lists"
  ansible.builtin.debug:
    msg:
      - "Data:     {{ asm_dlist1 }}"
      - "Archive:  {{ asm_alist1 }}"
      - "Recovery: {{ asm_rlist1 }}"

- name:                               "ORACLE ASM: Prepend /dev/oracleasm/disk to each of of the disk"
  ansible.builtin.set_fact:
    asm_datadisklist:     "{{ asm_dlist1 | map('regex_replace', '^(.*)$', '/dev/oracleasm/disks/\\1') | join(',') }}"
    asm_archdisklist:     "{{ asm_alist1 | map('regex_replace', '^(.*)$', '/dev/oracleasm/disks/\\1') | join(',') }}"
    asm_recodisklist:     "{{ asm_rlist1 | map('regex_replace', '^(.*)$', '/dev/oracleasm/disks/\\1') | join(',') }}"
  when:
    - is_UEK6

- name:                               "ORACLE ASM: Prepend /dev/disk/by-label to each of of the disk"
  ansible.builtin.set_fact:
    asm_datadisklist:     "{{ asm_dlist1 | map('regex_replace', '^(.*)$', '/dev/disk/by-label/\\1') | join(',') }}"
    asm_archdisklist:     "{{ asm_alist1 | map('regex_replace', '^(.*)$', '/dev/disk/by-label/\\1') | join(',') }}"
    asm_recodisklist:     "{{ asm_rlist1 | map('regex_replace', '^(.*)$', '/dev/disk/by-label/\\1') | join(',') }}"
  when:
    - not is_UEK6

- name:                               "ORACLE ASM: Store the disk lists as arrays"
  ansible.builtin.set_fact:
    data_disk_list:   "{{ asm_datadisklist | split(',') | list }}"
    arch_disk_list:   "{{ asm_archdisklist | split(',') | list }}"
    reco_disk_list:   "{{ asm_recodisklist | split(',') | list }}"

- name:                                "ORACLE ASM: DISPLAY Oracle lists with prefix"
  ansible.builtin.debug:
    msg:
      - "Data:     {{ data_disk_list }}"
      - "Archive:  {{ arch_disk_list }}"
      - "Recovery: {{ reco_disk_list }}"

- name:                                "ORACLE ASM: deploy Grid install response file"
  become:                              true
  become_user:                         oracle
  ansible.builtin.template:
    src:                               ORACLE_19c_00_ASM_v1_install.rsp.j2
    dest:                              "/oracle/GRID/{{ ora_version }}/{{ ansible_hostname }}_{{ db_sid }}_install.rsp"
    mode:                              '0644'
    force:                             true
  vars:
    _is_UEK6:                           "{{ is_UEK6 | default(false) }}"


# +------------------------------------4--------------------------------------*/
# |                                                                            |
# |                       Oracle Grid: Install software                        |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                "ORACLE ASM: Unzip the Grid software"
  become:                              true
  become_user:                         root
  ansible.builtin.unarchive:
    src:                               /usr/sap/install/oraserver/LINUX_X86_64/grid_home/LINUX.X64_193000_grid_home.zip
    dest:                              /oracle/GRID/{{ ora_version }}
    creates:                           /etc/sap_deployment_automation/oracle/grids_unzip.txt
    owner:                             oracle
    group:                             oinstall
    remote_src:                        true


- name:                                "ORACLE ASM: create after a successful unzip"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/oracle/grids_unzip.txt"
    state:                             touch
    mode:                              '0755'

- name:                                "ORACLE ASM: Install RPM Packages"
  ansible.builtin.dnf:
    name:
      - "/oracle/GRID/{{ ora_version }}/cv/rpm/cvuqdisk-1.0.10-1.rpm"
    state:                             present
    disable_gpg_check:                 true

# +------------------------------------4--------------------------------------*/
# |                                                                            |
# |                       Oracle Grid: Patch installation media                |
# |                                                                            |
# +------------------------------------4--------------------------------------*/


- name:                                "Oracle ASM: Find Patch ID for GRID"
  become:                              true
  become_user:                         root
  ansible.builtin.find:
    paths:                             "{{ target_media_location }}/SBP/GIRU19P"
    patterns:                          ["bundle.xml"]
    file_type:                         file
    recurse:                           true
  register:                            patch_grid_id_directory

- name:                                "Oracle ASM: Find Patch ID for GRID"
  ansible.builtin.fail:
    msg:                               "No Patch Ids"
  when:                                patch_grid_id_directory.matched != 1

- name:                                "Oracle ASM: OPatch ID"
  ansible.builtin.set_fact:
    patch_grid_path:                   "{{ patch_grid_id_directory.files[0].path | dirname }}"
  when:                                 patch_grid_id_directory.matched == 1

- name:                                "Oracle ASM: set STAGE_SBP_DBRU"
  ansible.builtin.set_fact:
    STAGE_SBP_DBRU:                    "{{ patch_grid_path }}/{{ bom.patch.SBP_DBRU }}"
  when:                                 patch_grid_path is defined and bom.patch.SBP_DBRU is defined

- name:                                "Oracle ASM: set STAGE_SBP_OCWRU"
  ansible.builtin.set_fact:
    STAGE_SBP_OCWRU:                    "{{ patch_grid_path }}/{{ bom.patch.SBP_OCWRU }}"
  when:                                 patch_grid_path is defined and bom.patch.SBP_OCWRU is defined

- name:                                "Oracle ASM: set STAGE_SBP_ACFSRU"
  ansible.builtin.set_fact:
    STAGE_SBP_ACFSRU:                    "{{ patch_grid_path }}/{{ bom.patch.SBP_ACFSRU }}"
  when:                                 patch_grid_path is defined and bom.patch.SBP_ACFSRU is defined

- name:                                "Oracle ASM: set OneOffs"
  ansible.builtin.set_fact:
    OneOffs:                           "{{ STAGE_SBP_OCWRU }},{{ STAGE_SBP_ACFSRU }}"
  when:
                                       - STAGE_SBP_DBRU is defined
                                       - STAGE_SBP_OCWRU is defined
                                       - STAGE_SBP_ACFSRU is defined

- name:                                "Oracle ASM: set OneOffs"
  ansible.builtin.set_fact:
    OPatchPath:                        "{{ target_media_location }}/SBP/OPATCH/OPatch"
    ApplyRU:                           "{{ STAGE_SBP_DBRU }}"

- name:                                "Oracle ASM: OPatch ID"
  ansible.builtin.debug:
    msg:                               "Patch GRID path {{ patch_grid_path }}"

- name:                                "Oracle ASM: Debug"
  ansible.builtin.debug:
    msg:
      - "STAGE_SBP_DBRU :  {{ STAGE_SBP_DBRU }}"
      - "STAGE_SBP_OCWRU:  {{ STAGE_SBP_OCWRU }}"
      - "STAGE_SBP_ACFSRU: {{ STAGE_SBP_ACFSRU }}"
      - "OneOffs:          {{ OneOffs }}"
      - "OPatchPath:       {{ OPatchPath }}"
      - "ApplyRU:          {{ ApplyRU }}"

# Backup the existing Opatch and then copy the new Opatch from the downloads folder

- name:                                "Oracle ASM: Copy name"
  ansible.builtin.set_fact:
    patch_copy_name:                   "/oracle/GRID/{{ ora_version }}/OPatch.{{ '%Y%m%d' | strftime(0) }}"

- name:                                "Oracle ASM: Check if backup exists for GRID"
  ansible.builtin.stat:
    path:                              "{{ patch_copy_name }}"
  register:                            opatchgrid_stat

- name:                                "Oracle ASM: backup OPatch"
  ansible.builtin.copy:
    src:                               "/oracle/GRID/{{ ora_version }}/OPatch"
    dest:                              "{{ patch_copy_name }}"
    remote_src:                        true
    mode:                              '0755'
    owner:                             oracle
    group:                             oinstall
  when:
    - not opatchgrid_stat.stat.exists

- name:                                "Oracle ASM: remove old OPatch"
  ansible.builtin.file:
    path:                              "/oracle/GRID/{{ ora_version }}/OPatch"
    state:                             absent
  when:
    - not opatchgrid_stat.stat.exists

- name:                                "Oracle ASM: copy OPatch for GRID"
  ansible.builtin.copy:
    src:                               "{{ target_media_location }}/SBP/OPATCH/OPatch"
    dest:                              "/oracle/GRID/{{ ora_version }}"
    remote_src:                        true
    mode:                              '0755'
    owner:                             oracle
    group:                             oinstall

# +------------------------------------4--------------------------------------*/
# |                                                                            |
# |                       Oracle Grid: Perform installation                    |
# |                                                                            |
# +------------------------------------4--------------------------------------*/

- name:                                "ORACLE ASM: Make oracle:oinstall are the owners for ASM Data Disks "
  become:                              true
  become_user:                         root
  ansible.builtin.file:
    path:                              '{{ item }}'
    owner:                             oracle
    group:                             oinstall
    mode:                              '755'
    state:                             link
  loop:                                '{{ data_disk_list }}'

- name:                                "ORACLE ASM: Make oracle:oinstall are the owners for ASM Archive Disks "
  become:                              true
  become_user:                         root
  ansible.builtin.file:
    path:                              '{{ item }}'
    owner:                             oracle
    group:                             oinstall
    mode:                              '755'
    state:                             link
  loop:                                '{{ arch_disk_list }}'

- name:                                "ORACLE ASM: Make oracle:oinstall are the owners for ASM Recovery Disks "
  become:                              true
  become_user:                         root
  ansible.builtin.file:
    path:                              '{{ item }}'
    owner:                             oracle
    group:                             oinstall
    mode:                              '755'
    state:                             link
  loop:                                '{{ reco_disk_list }}'

- name:                                "gridSetup command"
  ansible.builtin.debug:
    msg:                               "Running ./gridSetup.sh -silent -applyRU {{ ApplyRU }} -applyOneOffs {{ OneOffs }} -opatchlocation /oracle/GRID/{{ ora_version }}/OPatch -skipOpatchVersionCheck -responseFile ./{{ ansible_hostname }}_{{ db_sid }}_install.rsp"

- name:                                "ORACLE ASM: Install Execute gridSetup.sh"
  become:                              true
  become_user:                         oracle
  ansible.builtin.shell: |
                                       ./gridSetup.sh -silent -applyRU {{ ApplyRU }} -applyOneOffs {{ OneOffs }} -opatchlocation /oracle/GRID/{{ ora_version }}/OPatch -skipOpatchVersionCheck -responseFile ./{{ ansible_hostname }}_{{ db_sid }}_install.rsp
  register:                            gridinstaller_results
  failed_when:                         gridinstaller_results.rc >= 2              # installer returns rc=1 (exited with warning) by default when run is silent mode as the oratab file is created only after running the root.sh
  environment:
    CV_ASSUME_DISTID:                  "{{ CV_ASSUME_DISTID }}"
    ORACLE_SID:                        "{{ db_sid | upper }}"
    ORACLE_BASE:                       /oracle/BASE
    ORACLE_HOME:                       /oracle/GRID/{{ ora_version }}
    DB_SID:                            "{{ db_sid | upper }}"
  args:
    executable:                        /bin/csh
    chdir:                             "/oracle/GRID/{{ ora_version }}"
    creates:                           /etc/sap_deployment_automation/oracle/grid_install.txt

- name:                                "ORACLE ASM: Debug: gridSetup.sh output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/oracle/grid_install.log"
    content:                           "{{ gridinstaller_results.stdout }}"
    mode:                              0777
  when:                                gridinstaller_results.stdout is defined

- name:                                "ORACLE ASM: Create after a successful GRID install"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/oracle/grid_install.txt"
    state:                             touch
    mode:                              '0755'


- name:                                "ORACLE ASM: Check before grid post processing"
  ansible.builtin.fail:
    msg:   "check before grid post processing run: /oracle/oraInventory/orainstRoot.sh and /oracle/GRID/{{ ora_version }}/root.sh and /oracle/GRID/{{ ora_version }}/crs/install/roothas.sh and ./asmca -silent -configureASM -sysAsmPassword {{ main_password }} -asmsnmpPassword {{ main_password }} \
                                        -createDiskGroup -diskGroupName DATA -redundancy EXTERNAL -diskList '{{ asm_datadisklist }}'"

# +------------------------------------4--------------------------------------*/
# |                                                                            |
# |                       Oracle Grid: Post processing                         |
# |                                                                            |
# +------------------------------------4--------------------------------------*/


- name:                                "ORACLE ASM: Oracle Post Processing - Run root.sh"
  become:                              true
  become_user:                         root
  ansible.builtin.shell: |
                                       /oracle/oraInventory/orainstRoot.sh
  register:                            orainstRoot_results
  args:
    executable:                        /bin/csh
    creates:                           "/etc/sap_deployment_automation/oracle/orainstRoot_rootscript.txt"

- name:                                "ORACLE ASM: Debug: root.sh output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/oracle/orainst.log"
    content:                           "{{ orainstRoot_results.stdout }}"
    mode:                              0777
  when:                                orainstRoot_results.stdout is defined

- name:                                "ORACLE ASM: creates after a successful post processing script execution"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/oracle/orainstRoot_rootscript.txt"
    state:                             touch
    mode:                              '0755'

- name:                                "ORACLE ASM: Oracle Post Processing - Run GRID root.sh"
  become:                              true
  become_user:                         root
  ansible.builtin.shell: |
                                       /oracle/GRID/{{ ora_version }}/root.sh
  register:                            grid_rootscript_results
  args:
    executable:                        /bin/csh
    creates:                           "/etc/sap_deployment_automation/oracle/gridinstall_rootscript.txt"

- name:                                "ORACLE ASM: Debug: GRID root.sh output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/oracle/gridrootexec.log"
    content:                           "{{ grid_rootscript_results.stdout }}"
    mode:                              0777
  when:                                grid_rootscript_results.stdout is defined

- name:                                "ORACLE ASM: creates after a successful post processing script execution"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/oracle/gridinstall_rootscript.txt"
    state:                             touch
    mode:                              '0755'

- name:                                "Oracle ASM: Run roothas"
  become:                              true
  become_user:                         "root"
  ansible.builtin.shell:               /oracle/GRID/{{ ora_version }}/crs/install/roothas.sh
  register:                            gridroothas_results
  args:
    creates:                           /etc/sap_deployment_automation/{{ sap_sid | upper }}/gridroothas.txt

- name:                                "ORACLE ASM: Debug: roothas.sh output"
  ansible.builtin.copy:
    dest:                              "/etc/sap_deployment_automation/oracle/roothas.log"
    content:                           "{{ gridroothas_results.stdout }}"
    mode:                              0777
  when:                                gridroothas_results.stdout is defined

- name:                                "ORACLE ASM: creates after a successful roothas execution"
  ansible.builtin.file:
    path:                              "/etc/sap_deployment_automation/oracle/gridroothas.txt"
    state:                             touch
    mode:                              '0755'


